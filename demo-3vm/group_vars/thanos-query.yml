---
# ============================================================================
#  group_vars/thanos-query.example.yml —— 中央 Thanos Query 設定範本
# ============================================================================
#
#  啟用:複製成『真實 inventory 旁邊』的 group_vars/thanos-query.yml
#    cp group_vars/thanos-query.example.yml <inventory 目錄>/group_vars/thanos-query.yml
#
#  對應 spec:docs/verification/thanos-query.md
#  每站角色的 spec:docs/verification/prometheus.md
#  ——套用時會自動讀 inventory 的 `prometheus` group 組出 --store 清單,
#    不需要在這裡手動維護站台 IP 清單。
# ============================================================================

# 備份目的地(SeaweedFS S3 gateway)的 IP 或 FQDN —— **必須跟每一站
# prometheus.example.yml 指到同一個 S3 服務**,否則 Store Gateway 讀不到
# 站台上傳的資料。二擇一必填,見 spec §1.5。
thanos_s3_target_host: ""

# 走外部 S3 時,取消註解並覆寫(此時上面的 thanos_s3_target_host 留空即可):
# thanos_s3_endpoint: "s3.internal.example.com:443"

# S3 credentials —— 必須跟每一站 prometheus.example.yml 用同一組,一律用
# ansible-vault 加密檔帶入(拋棄式沙盒測試除外)。
# thanos_aws_access_key_id: ""
# thanos_aws_secret_access_key: ""

# bucket 名稱 —— 必須跟每一站 prometheus.example.yml 用同一個值。
# thanos_s3_bucket: pilot-thanos-metrics

# 要自動探索哪個 inventory group 當作站台清單,通常不用改:
# thanos_query_store_group: prometheus
# thanos_query_sidecar_grpc_port: 10901

# 沒有任何站台套用完成時(prometheus group 是空的)一樣可以套用本
# playbook,只是 docs/verification/thanos-query.md 的 C9/C10 會 fail——
# 這是「站台還沒接上」的正常狀態,不是 bug,等至少一站 apply 完再重新套用
# 本 playbook 即可補上(見 spec §1.5、§5)。
