---
# ============================================================================
#  group_vars/wazuh-fim.example.yml —— Wazuh agent(FIM+who-data)設定範本
# ============================================================================
#
#  啟用:複製成『真實 inventory 旁邊』的 group_vars/wazuh-fim.yml
#    cp group_vars/wazuh-fim.example.yml <inventory 目錄>/group_vars/wazuh-fim.yml
#  (.example.yml 不會被自動載入;檔名要等於 group 名才生效。)
#
#  對應 spec:docs/verification/wazuh-fim.md
#  註冊目標(wazuh-manager 角色)的 spec:docs/verification/wazuh-manager.md
#  ——wazuh-manager 是另一個獨立角色,要先另外 apply,見 inventory.example.yml
#    的 `wazuh-manager` group。
# ============================================================================

# 中央 Wazuh manager(wazuh-manager 角色)的 IP 或 FQDN。
#
# 選填 —— 留白/不填的話,這個 group 的機器仍會裝好本機 FIM 規則
# (預設 /etc、/boot 的 whodata 監控,搭配 auditd 取得 who-data),只是不會向
# manager 註冊(spec C7-C9 不適用,屬設計如此,見 spec §5 已知偏差)。等
# wazuh-manager 就緒後,把這裡填上它的 IP/FQDN、重新套用即可補上註冊,不需要
# 重裝 agent 或重套 FIM 規則。
wazuh_manager_host: ""

# 這個 group 全部主機共用的 FIM 監控目錄(選填,預設 ["/etc", "/boot"])。
# wazuh_fim_directories: ["/etc", "/boot"]

# 想讓「同一個 group 底下不同主機監控不同路徑」,不要在這裡改——這個檔案是
# 整個 group 共用的。改成在 inventory 旁邊建 host_vars/<主機短名>.yml,只放
# 這一個變數,針對特定主機覆寫:
#
#   # host_vars/web-1.yml(web 主機:多盯網站目錄)
#   wazuh_fim_directories: ["/etc", "/boot", "/var/www"]
#
#   # host_vars/db-1.yml(DB 主機:多盯資料庫設定)
#   wazuh_fim_directories: ["/etc", "/boot", "/etc/mysql"]
#
# ansible 的 host_vars 優先權高於這份 group_vars,單一主機的覆寫不影響同
# group 其他主機。驗證時 docs/verification/wazuh-fim.md 的 C5 只檢查「至少
# 一個目錄設定了 whodata」,不綁定特定路徑字面值,所以不同主機即使清單不同
# 也都能用同一份 spec 驗證(見 spec §1.5 的設計說明)。

# 以下通常不用填,會沿用 playbook 內建預設:
# wazuh_repo_channel: "4.x"
