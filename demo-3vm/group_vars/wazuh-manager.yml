---
# ============================================================================
#  group_vars/wazuh-manager.example.yml —— Wazuh 中央伺服器設定範本
# ============================================================================
#
#  啟用:複製成『真實 inventory 旁邊』的 group_vars/wazuh-manager.yml
#    cp group_vars/wazuh-manager.example.yml <inventory 目錄>/group_vars/wazuh-manager.yml
#  (.example.yml 不會被自動載入;檔名要等於 group 名才生效。)
#
#  對應 spec:docs/verification/wazuh-manager.md(v2.0,Docker 部署)
#  轉送目標(log-server 角色)的 spec:docs/verification/log-server.md
#  ——log-server 是另一個獨立角色,要先另外 apply,見 inventory.example.yml
#    的 `log-server` group。
#
#  ⚠️ 前置依賴:目標主機要先過 docker preflight(docker.io + docker.service
#  + compose v2 plugin),即 core-infra-provider-apply.yml -e infra_role=docker
#  ——見 docs/verification/docker.md。
#
#  ⚠️ 資源需求(v1.0 實測踩過的雷,見 docs/runbooks/wazuh-manager.md §5):
#  CVE 弱點掃描 feed 常駐磁碟用量 ~7-9GB(位於 wazuh_queue named volume,
#  Docker 不改變磁碟壓力),再加三個官方 image ~3-4GB;磁碟不足會讓所有告警
#  (含 FIM)靜默停止產生、且容器狀態仍顯示 running。目標主機至少要有
#  4 vCPU / 8GB RAM / 50GB 磁碟(官方建議值,1-25 agents)。
#
#  ⚠️ 官方 compose 的管理者密碼是出廠預設值(indexer admin/SecretPassword
#  等),sandbox/demo 可接受;正式站台上線前必須照官方文件手動變更,見
#  docs/verification/wazuh-manager.md §5。
# ============================================================================

# 中央 SIEM 接收端(log-server 角色)的 IP 或 FQDN。
#
# 選填 —— 留白/不填的話,這台主機仍會裝好完整的 Wazuh single-node
# (manager + indexer + dashboard 三個官方容器,含 CVE 弱點掃描),只是不會
# 把告警轉送出去(spec C10-C11 不適用,屬設計如此,見 spec §5 已知偏差)。
# 等 log-server 就緒後,把這裡填上它的 IP/FQDN、重新套用即可補上轉送——
# 只是改設定 + 重啟 manager 容器,不需要重建容器或重新產生憑證。
siem_forward_host: ""

# 以下通常不用填,會沿用 playbook 內建預設:
# siem_forward_port: "514"
# wazuh_docker_version: "4.14.1"
