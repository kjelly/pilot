schemaVersion: 1
id: keycloak
role: keycloak
specs:
  - path: docs/verification/keycloak.md
    rows: {all: true}
playbooks:
  apply: playbooks/apply/keycloak-apply.yml
regressionTests:
  - internal/spec/keycloak_regression_test.go
  - cmd/pilot/cmd/tag_coverage_test.go
dependencies:
  - {component: docker, required: true, relation: sameHosts}
  - {component: keycloak-db, required: true, relation: providerEndpoint}
bindings:
  - input: keycloak_db_host
    requiredWhenDependencySelected: true
    sourceSelection: exactlyOne
    from: {component: keycloak-db, endpoint: postgres}
hostCardinality: exactly-one
resources: {minCPU: 2, minRAMMiB: 4096, minDiskGiB: 10}
groupVars:
  - {name: keycloak_db_host, type: string, required: true, secret: false}
  - {name: keycloak_db_password, type: string, required: true, secret: true}
  - {name: keycloak_admin_password, type: string, required: true, secret: true}
endpoints:
  - {name: oidc, scheme: http, port: 8080}
stagePolicy: {variable: stage, default: sandbox}
evidenceRequirement: {targetTest: topology, idempotency: required}
traceability:
  mode: rowTags
  tag: {kind: rolePrefixed, prefix: keycloak}
verification: {autoDeploy: false}
site: {include: true, order: 70, vars: {}, tags: [keycloak], optIn: false}
