schemaVersion: 1
id: freeipa-client
role: freeipa-client
specs:
  - path: docs/verification/freeipa-client.md
    rows: {all: true}
playbooks:
  apply: playbooks/apply/freeipa-client-apply.yml
regressionTests:
  - internal/spec/freeipa_client_regression_test.go
  - cmd/pilot/cmd/tag_coverage_test.go
dependencies:
  - {component: freeipa-server, required: true, relation: providerEndpoint}
bindings:
  - input: freeipa_server_ip
    requiredWhenDependencySelected: true
    sourceSelection: exactlyOne
    from: {component: freeipa-server, endpoint: https}
hostCardinality: one-or-more
resources: {minCPU: 1, minRAMMiB: 1024, minDiskGiB: 5}
groupVars:
  - {name: freeipa_server_ip, type: string, required: true, secret: false}
  - {name: ipa_admin_password, type: string, required: true, secret: true}
stagePolicy: {variable: stage, default: sandbox}
evidenceRequirement: {targetTest: topology, idempotency: required}
traceability:
  mode: rowTags
  tag: {kind: bare}
  exemptions:
    "docs/verification/freeipa-client.md#C4": {kind: derived, tags: [C1], reason: host keytab is produced by ipa-client-install}
    "docs/verification/freeipa-client.md#C5": {kind: derived, tags: [C1], reason: SSSD account resolution is configured by ipa-client-install}
    "docs/verification/freeipa-client.md#C6": {kind: derived, tags: [C1], reason: SSSD access provider is configured by ipa-client-install}
    "docs/verification/freeipa-client.md#C10": {kind: verifyOnly, reason: kernel auditing functional probe}
verification: {autoDeploy: false}
site: {include: true, order: 50, vars: {}, tags: [freeipa, freeipa-client], optIn: false}
