schemaVersion: 1
id: keycloak-db
role: keycloak-db
specs:
  - path: docs/verification/core-infra-provider-db.md
    rows: {all: true}
playbooks:
  apply: playbooks/apply/keycloak-db-apply.yml
regressionTests:
  - internal/spec/core_infra_provider_db_regression_test.go
  - cmd/pilot/cmd/tag_coverage_test.go
dependencies:
  - {component: docker, required: true, relation: sameHosts}
hostCardinality: exactly-one
resources: {minCPU: 2, minRAMMiB: 2048, minDiskGiB: 20}
groupVars:
  - {name: keycloak_db_password, type: string, required: true, secret: true}
endpoints:
  - {name: postgres, scheme: tcp, port: 5432}
stagePolicy: {variable: stage, default: sandbox}
evidenceRequirement: {targetTest: vm, idempotency: required}
traceability:
  mode: rowTags
  tag: {kind: rolePrefixed, prefix: db}
  exemptions:
    "docs/verification/core-infra-provider-db.md#C4": {kind: derived, tags: [db-C1], reason: database is created by the container bootstrap}
    "docs/verification/core-infra-provider-db.md#C5": {kind: derived, tags: [db-C1], reason: role is created by the container bootstrap}
    "docs/verification/core-infra-provider-db.md#C6": {kind: derived, tags: [db-C1], reason: ownership follows container bootstrap variables}
    "docs/verification/core-infra-provider-db.md#C11": {kind: verifyOnly, reason: database capacity guard}
verification: {autoDeploy: false}
site: {include: true, order: 60, vars: {}, tags: [keycloak, db], optIn: false}
