schemaVersion: 1
id: prometheus
role: prometheus
specs:
  - path: docs/verification/prometheus.md
    rows: {all: true}
playbooks:
  apply: playbooks/apply/prometheus-apply.yml
regressionTests:
  - internal/spec/prometheus_regression_test.go
  - cmd/pilot/cmd/tag_coverage_test.go
dependencies:
  - {component: docker, required: true, relation: sameHosts}
  - {component: seaweedfs-s3, required: true, relation: providerEndpoint}
  - {component: alertmanager, required: true, relation: providerEndpoint}
bindings:
  - input: thanos_s3_target_host
    requiredWhenDependencySelected: true
    sourceSelection: exactlyOne
    from: {component: seaweedfs-s3, endpoint: s3}
  - input: alertmanager_target_host
    requiredWhenDependencySelected: true
    sourceSelection: exactlyOne
    from: {component: alertmanager, endpoint: api}
hostCardinality: one-or-more
resources: {minCPU: 2, minRAMMiB: 2048, minDiskGiB: 20}
groupVars:
  - {name: thanos_s3_target_host, type: string, required: true, secret: false}
  - {name: alertmanager_target_host, type: string, required: true, secret: false}
endpoints:
  - {name: prometheus, scheme: http, port: 9090}
  - {name: sidecar, scheme: grpc, port: 10901}
stagePolicy: {variable: stage, default: sandbox}
evidenceRequirement: {targetTest: topology, idempotency: required}
traceability:
  mode: rowTags
  tag: {kind: bare}
verification: {autoDeploy: false}
site: {include: false, order: 0, vars: {}, tags: [], optIn: true}
