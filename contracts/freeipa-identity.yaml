schemaVersion: 1
id: freeipa-identity
role: freeipa-server
specs:
  - path: docs/verification/freeipa-identity.md
    rows: {all: true}
playbooks:
  apply: playbooks/apply/freeipa-identity-apply.yml
regressionTests:
  - cmd/pilot/cmd/tag_coverage_test.go
dependencies:
  - {component: freeipa-server, required: true, relation: sameHosts}
hostCardinality: exactly-one
resources: {minCPU: 1, minRAMMiB: 512, minDiskGiB: 1}
groupVars:
  - {name: ipa_admin_password, type: string, required: true, secret: true}
stagePolicy: {variable: stage, default: sandbox}
evidenceRequirement: {targetTest: topology, idempotency: required}
traceability:
  mode: mapped
  rows:
    "docs/verification/freeipa-identity.md#C1": {tags: [users, groups], reason: reconcile declared membership}
    "docs/verification/freeipa-identity.md#C2": {tags: [users, groups], reason: revoke stale membership}
    "docs/verification/freeipa-identity.md#C3": {tags: [hbac], reason: reconcile HBAC categories}
    "docs/verification/freeipa-identity.md#C4": {tags: [hbac], reason: reconcile HBAC group membership}
    "docs/verification/freeipa-identity.md#C5": {tags: [sudo], reason: reconcile sudo command category}
    "docs/verification/freeipa-identity.md#C6": {tags: [sudo], reason: reconcile sudo group membership}
    "docs/verification/freeipa-identity.md#C7": {tags: [hostgroups], reason: reconcile hostgroup attributes}
    "docs/verification/freeipa-identity.md#C8": {tags: [users], reason: reconcile user attributes}
verification: {autoDeploy: false}
site: {include: false, order: 0, vars: {}, tags: [], optIn: true}
