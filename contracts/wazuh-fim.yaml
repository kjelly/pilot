schemaVersion: 1
id: wazuh-fim
role: wazuh-fim
specs:
  - path: docs/verification/wazuh-fim.md
    rows: {all: true}
playbooks:
  apply: playbooks/apply/wazuh-fim-apply.yml
regressionTests:
  - internal/spec/wazuh_fim_regression_test.go
  - cmd/pilot/cmd/tag_coverage_test.go
dependencies:
  - {component: wazuh-manager, required: true, relation: providerEndpoint}
bindings:
  - input: wazuh_manager_host
    requiredWhenDependencySelected: true
    sourceSelection: exactlyOne
    from: {component: wazuh-manager, endpoint: agent}
hostCardinality: one-or-more
resources: {minCPU: 1, minRAMMiB: 1024, minDiskGiB: 5}
groupVars:
  - {name: wazuh_manager_host, type: string, required: true, secret: false}
stagePolicy: {variable: stage, default: sandbox}
evidenceRequirement: {targetTest: topology, idempotency: required}
traceability:
  mode: rowTags
  tag: {kind: bare}
verification: {autoDeploy: false}
site: {include: true, order: 110, vars: {}, tags: [security, wazuh-fim], optIn: false}
