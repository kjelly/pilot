name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install Python (for ansible_callback tests)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Go modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: Install PyYAML
        run: python3 -m pip install pyyaml

      - name: ansible_callback unit tests
        working-directory: ansible_callback
        run: python3 -m unittest test_pilot_diagnose.py -v

      - name: Duplicate YAML key check (repo-wide)
        run: python3 scripts/check-yaml-duplicate-keys.py

  playbook-lint:
    # L1 syntax (blocking) + duplicate-key check + L2 ansible-lint (advisory)
    # over every playbook — mirrors `make playbook-lint`, which local dev only
    # runs via the opt-in pre-commit hook (make install-hooks). Same
    # ansible-core + collections set Dockerfile.pilot-cli bakes into the
    # delivery image.
    name: Playbook lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ansible toolchain
        run: |
          python3 -m pip install ansible-core ansible-lint pyyaml
          ansible-galaxy collection install ansible.posix community.docker community.postgresql

      - name: make playbook-lint
        run: make playbook-lint

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.1
          args: --timeout=5m
