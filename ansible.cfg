# ansible.cfg — repo-local defaults for the pilot playbook dev/test loop.
#
# ansible-playbook auto-loads this file when run from the repo root (the
# usual cwd for `pilot vm-target run/test` and the `make pb-*` targets).
# Everything here is about making the edit→apply→verify loop faster; none
# of it changes what the playbooks *do*.
#
# Precedence reminder: ANSIBLE_CONFIG env > ./ansible.cfg > ~/.ansible.cfg
# > /etc/ansible/ansible.cfg. A world-writable cwd makes ansible ignore
# this file — the repo dir is not world-writable, so it applies.

[defaults]
# Facts are gathered once and cached, so the verify + idempotency
# double-run in `vm-target test` doesn't re-SSH to re-gather every time.
gathering                = smart
fact_caching             = jsonfile
fact_caching_connection  = ~/.ansible/pilot-factcache
fact_caching_timeout     = 3600

# Skip Python interpreter discovery chatter; cloud images ship python3.
interpreter_python       = auto_silent

# Connection timeout (also bounds how long become waits for the privilege-
# escalation prompt/marker). Default 10s is too tight right after a host
# enrolls into FreeIPA: the first sudo runs through a cold pam_sss stack and
# can take >10s once, then it's cached. That single cold call otherwise
# fails a rerun with "Timeout (12s) waiting for privilege escalation prompt".
# 30s absorbs it without meaningfully slowing healthy tasks.
timeout                  = 30

# The VM inventory already disables host-key prompts via ssh args; set it
# here too so ad-hoc runs against other inventories don't stall on prompts.
host_key_checking        = False

# Uncomment after `make install-callback-user` to get pilot's per-task
# failure diagnosis inline (see Makefile / ansible_callback/).
# callbacks_enabled      = pilot

[ssh_connection]
# Pipelining collapses each task to one SSH round-trip (no per-task sftp
# of the module). Biggest single win on the many small tasks in a
# hardening playbook. Safe because cloud images have no sudoers
# `requiretty`. Mirrored in the generated VM inventory so it also applies
# when ansible runs from a staged temp inventory in a different cwd.
pipelining               = true

# Reuse one SSH connection across tasks/plays instead of reconnecting.
ssh_args                 = -o ControlMaster=auto -o ControlPath=~/.ansible/cp/pilot-%r@%h:%p -o ControlPersist=60s
