---
# ============================================================================
#  group_vars/prometheus.example.yml —— 每站 Prometheus + Thanos Sidecar 範本
# ============================================================================
#
#  啟用:複製成『真實 inventory 旁邊』的 group_vars/prometheus.yml
#    cp group_vars/prometheus.example.yml <inventory 目錄>/group_vars/prometheus.yml
#  (.example.yml 不會被自動載入;檔名要等於 group 名才生效。)
#
#  對應 spec:docs/verification/prometheus.md
#  中央全局查詢角色的 spec:docs/verification/thanos-query.md
#  ——thanos-query 是另一個獨立角色,要另外 apply,見 inventory.example.yml
#    的 `thanos-query` group。
#  備份目的地(SeaweedFS S3 gateway)的 spec:docs/verification/seaweedfs-s3.md
# ============================================================================

# 這一站的站名,寫進 Prometheus external_labels.site,thanos-query 的全局
# 查詢靠這個欄位分辨資料來自哪一站。**必填、沒有預設值**(見 spec §1.5 —
# 每一站都不同,寫死預設會讓忘記覆寫的第二站悄悄跟第一站標籤撞名)。
# 這個值天生就是「每站不同」,建議直接放進 host_vars/<主機短名>.yml,而不是
# 這份 group 共用檔案:
#
#   # host_vars/site-a.yml
#   prometheus_site_label: site-a
#
#   # host_vars/site-b.yml
#   prometheus_site_label: site-b
prometheus_site_label: ""

# 備份目的地(SeaweedFS S3 gateway)的 IP 或 FQDN。
#
# 二擇一必填(見 spec §1.5):填這個變數(走預設 repository,指向本專案自建
# 的 SeaweedFS S3 gateway),或改用下面註解的 thanos_s3_endpoint 完全覆寫成
# 外部/獨立 S3。兩者都不填,apply 會在任何 mutation 前直接 fail。
#
# **必須跟 thanos-query.example.yml 那台指到同一個 S3 服務、同一個
# thanos_s3_bucket**,否則中央的 Store Gateway 讀不到這一站上傳的資料。
thanos_s3_target_host: ""

# 走外部 S3 時,取消註解並覆寫(此時上面的 thanos_s3_target_host 留空即可):
# thanos_s3_endpoint: "s3.internal.example.com:443"

# S3 credentials —— 全部必填、沒有預設值,一律用 ansible-vault 加密檔帶入,
# 不要明文寫在這裡或用 -e 帶(除了拋棄式沙盒測試)。必須跟
# thanos-query.example.yml 用同一組憑證。
# thanos_aws_access_key_id: ""
# thanos_aws_secret_access_key: ""
#
# 注意:走本專案自建 SeaweedFS 目的地時,首次套用前要先手動建好
# thanos_s3_bucket(預設 pilot-thanos-metrics)這個 bucket、且 SeaweedFS S3
# gateway 要掛 -e seaweedfs_s3_config_path=<s3.json>(簽章模式)——理由跟
# restic-backup.example.yml 的同一段註解一致,實測見
# docs/runbooks/restic-backup.md §5 Bug 5:
#   docker exec pilot-seaweedfs sh -c "echo 's3.bucket.create -name pilot-thanos-metrics' | weed shell"

# 這個 bucket 名稱**必須**跟 thanos-query.example.yml 用同一個值,否則中央
# 的 Store Gateway 讀不到這一站上傳的歷史資料。
# thanos_s3_bucket: pilot-thanos-metrics

# 這一站要 scrape 什麼(選填,預設只 scrape Prometheus 自己)。想加其他
# exporter(例:node_exporter)時,整段覆寫成完整的 scrape_configs 內容,
# 放進 host_vars/<主機短名>.yml,不要改這份 group 共用檔案:
#
#   # host_vars/site-a.yml
#   prometheus_scrape_configs: |
#     - job_name: prometheus
#       static_configs:
#         - targets: ["localhost:9090"]
#     - job_name: node
#       static_configs:
#         - targets: ["localhost:9100"]

# 本機 TSDB 保留時間、scrape 間隔,通常不用改,會沿用 playbook 內建預設:
# prometheus_retention_time: "6h"
# prometheus_scrape_interval: "15s"
