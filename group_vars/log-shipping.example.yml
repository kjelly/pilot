---
# ============================================================================
#  group_vars/log-shipping.example.yml —— Promtail 轉送到 dashboard Loki 範本
# ============================================================================
#
#  啟用:因為 log-shipping 疊在 log-server group 上，請把本檔內容合併到
#  『真實 inventory 旁邊』的 group_vars/log-server.yml，或在執行 site.yml
#  時以 -e loki_target_host=<dashboard IP/FQDN> 提供。
#  (.example.yml 不會被自動載入;檔名要等於實際 inventory group 名才生效。)
#
#  對應 spec:docs/verification/log-shipping.md
#  這是疊在 log-server.md 之上的角色,inventory 用同一個 group/同一批主機
#  即可(見 inventory.example.yml 的 log-server group),不需要另開新 group。
# ============================================================================

# dashboard 主機(Loki 所在地)的 IP 或 FQDN。留空也能套用成功——Promtail
# 照樣起來,只是 push 不到中央(spec C6 預期 fail),等 dashboard.md 上線
# 後補填、重新套用即可(見 spec §1.5)。
loki_target_host: ""

# 通常不用改。siem_log_root 留白(預設)時會自動判斷:這台主機如果有跑
# wazuh-manager 容器,直接讀它真正在寫的 alerts.log 所在的 host 路徑(用
# `docker inspect` 動態解析,不假設 docker-compose 產生的 volume 名稱);
# 否則退回 log-server.md 的 /var/log/siem。只有要覆寫成別的路徑時才需要
# 手動填(且必須跟 log-server.md 用同一個值,否則 tail 不到東西):
# siem_log_root: /var/log/siem
# loki_alias: pilot-loki-backend
# loki_port: 3100
# promtail_job_label: pilot-siem
