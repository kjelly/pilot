---
# ============================================================================
#  group_vars/freeipa.example.yml —— FreeIPA realm 設定範本(SCHEMA,非真實資料)
# ============================================================================
#
#  這是「角色設定」放 group_vars 的範例。啟用方式:
#    1. 在你的 inventory 裡讓 freeipa-server 與 freeipa-client 都成為
#       一個共同父群組 `freeipa` 的 children(見 inventory.example.yml)。
#       這樣「一個 domain 值」server / client 兩邊共用,不會各填一份而不同步。
#    2. 把本檔複製成『真實 inventory 旁邊』的 group_vars/freeipa.yml:
#         mkdir -p <你的 inventory 目錄>/group_vars
#         cp group_vars/freeipa.example.yml <你的 inventory 目錄>/group_vars/freeipa.yml
#    3. 填入下面的值。不填 = 沿用 playbook 內建預設(ipa.pilot.internal)。
#
#  注意:副檔名 .example.yml「不會」被 ansible 自動載入;一定要複製成
#        group_vars/freeipa.yml(檔名等於 group 名)才會生效。
# ============================================================================

# 你的 realm/domain。server 與 client 必須一致——放這裡設定「一次」即可。
freeipa_domain: ipa.pilot.internal

# FreeIPA server 的 LAN IP。
# freeipa-server-apply.yml 需要它來執行 --ip-address=... (ipa-server-install)，
# freeipa-client-apply.yml 需要它來寫入 client 的 /etc/hosts (pin server FQDN → 此 IP)。
# 【必填】不可省略。請填入與 inventory 裡 freeipa-server host 的 ansible_host 相同 IP。
#
# Example placeholder only:
# freeipa_server_ip: "192.0.2.10"

# 以下三個通常「不用填」,會自動從 freeipa_domain 推導:
#   realm         = 大寫的 domain             → IPA.PILOT.INTERNAL
#   server_fqdn   = ipa1.<domain>             → ipa1.ipa.pilot.internal
#   server_ip     = 預設等於 freeipa_server_ip
# 只有當你的 realm 名稱、伺服器主機名或 IP 不照這個慣例時才覆寫:
# freeipa_realm: IPA.PILOT.INTERNAL
# freeipa_server_fqdn: ipa1.ipa.pilot.internal

# 原生 FreeIPA DNS/NTP(--setup-dns/--ntp-server),EL9 host 一律用這個,
# 已經預設 true,通常不用填。只有主機已經有外部管理的 DNS/NTP、不想讓
# FreeIPA 自己再起 named/chronyd 時才需要覆寫成 false:
# freeipa_setup_dns: true
# freeipa_setup_ntp: true

# FreeIPA 自己的 named 用的上游 DNS forwarder(--forwarder=...),讓 FreeIPA
# host 的 DNS 仍能解析公網(例如自己 yum/dnf 裝套件用)。預設 8.8.8.8;
# 不想要任何 forwarder(改用 --no-forwarders)才需要覆寫成空字串或空陣列。
# freeipa_dns_forwarders: 8.8.8.8

# ipa-server-install 用的 --ntp-server 清單。預設是台灣的公開時間伺服器;
# 其他地區請覆寫成該地區慣用的 NTP server。
# freeipa_ntp_servers: [tock.stdtime.gov.tw, watch.stdtime.gov.tw]
