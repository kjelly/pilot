---
# ============================================================================
#  site.yml —— 全站入口:先 preflight,再依序套用各元件
# ============================================================================
#
#  用法(全套):
#    ansible-playbook -i inventory.yml playbooks/site.yml
#
#  用法(只跑某元件,用 tag 篩選;preflight 靜態檢查一律先跑):
#    ansible-playbook -i inventory.yml playbooks/site.yml --tags freeipa
#    ansible-playbook -i inventory.yml playbooks/site.yml --tags keycloak
#
#  ── 運作方式(重要)────────────────────────────────────────────────────
#   * 第一步一定先跑 playbooks/preflight.yml。inventory 沒填對 / 連不上,
#     preflight 會讓所有 host 進入 failed,後面的 apply 自動拿不到 host → 全部跳過。
#     也就是「preflight 沒過,絕不會亂套用」。
#   * 每支 apply 各自 `hosts: <某 group>`。你的 inventory 裡『空的 group 會自動跳過』,
#     所以你只填了哪些角色、就只會跑哪些元件——沒填的元件連 secret 都不用給。
#   * 需要密碼的元件(Keycloak / FreeIPA identity)才需要額外帶 -e / vault 檔,
#     且『只有當該 group 有 host 時』才會被要求。見 DELIVERY.md。
#
#  ── 相依順序 ────────────────────────────────────────────────────────────
#     核心服務(dns/ntp)→ FreeIPA server → FreeIPA client
#                         → Keycloak DB → Keycloak → PAM-OIDC
#                         → log-server → audit-log-forwarding
#                         → wazuh-manager → wazuh-fim
#                         → seaweedfs-s3 → restic-backup → OS 補丁
#
#  注意:FreeIPA 使用者/權限(freeipa-identity-apply.yml)是「資料驅動的 day-2
#  維運」,需要 vault roster,刻意不放進 site.yml。單獨執行,見 DELIVERY.md。
#
#  注意:audit-log-forwarding 的 siem_forward_host、wazuh-manager 的
#  siem_forward_host、wazuh-fim 的 wazuh_manager_host 都是選填(分別見
#  group_vars/audit-log-forwarding.example.yml、
#  group_vars/wazuh-manager.example.yml、group_vars/wazuh-fim.example.yml)。
#  對應的目標 group(log-server、wazuh-manager)若還沒填機器,這些角色仍會
#  照常套用本機規則,只是不轉送/不註冊;之後目標就緒、把變數補上,重跑
#  site.yml(或單獨重跑對應的 apply playbook)即可補齊,不需要重裝任何東西。
#
#  注意:wazuh-manager 是 Docker 部署(官方 wazuh-docker single-node 三容器),
#  該主機要先過 docker preflight(core-infra-provider-apply.yml
#  -e infra_role=docker,同 keycloak-db 的前置;playbook 內建 docker info
#  fail-early gate)。且需要較大的資源(4 vCPU/8GB RAM/50GB 磁碟起跳,CVE
#  弱點掃描 feed 常駐 ~7-9GB)——磁碟不足會讓所有告警靜默停止產生且無明顯
#  服務層級失敗徵兆(容器仍顯示 running),見 docs/runbooks/wazuh-manager.md §5。
#
#  注意:restic-backup 的目的地(restic_s3_target_host,見
#  group_vars/restic-backup.example.yml)跟 audit-log-forwarding/wazuh 那組
#  「選填、沒填就退化成本機功能」不同——沒有目的地整個備份就沒有意義,
#  apply 會在 pre_tasks 直接 fail,不會靜默裝好排程卻永遠備份失敗。走本專案
#  自建的 seaweedfs-s3 gateway 時,該 gateway 必須先掛
#  -e seaweedfs_s3_config_path=<s3.json>(identity 設定)——SeaweedFS 預設的
#  匿名模式只接受完全不簽章的請求,restic 一律送簽章請求,兩者不相容,見
#  docs/runbooks/restic-backup.md §5。
#
#  注意:`target_group` 是每支 apply playbook「單獨」執行時的覆寫用途(例如對
#  vm-target 單機測試 -e target_group=all),所有 apply playbook 共用同一個
#  變數名稱。全站入口(這支 site.yml)因此**禁止**帶 -e target_group=——
#  它會同時覆寫下面每一支子 playbook 的目標 group,讓「沒填 hosts 的角色不會
#  被套用」這條保護整個失效(見下方安全閥)。要限定機器,改用 --limit <host>。
# ============================================================================

# ── -1. 安全閥:全站入口禁止帶 target_group(見上方說明)───────────────────
- name: "site.yml 安全閥:target_group 不能在全站入口使用"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "Gate: target_group must not be set when running the aggregate site.yml"
      ansible.builtin.assert:
        that:
          - target_group is not defined
        fail_msg: >-
          偵測到 -e target_group={{ target_group | default('') }}。target_group 是
          「單支 apply playbook」的覆寫用途,site.yml 全站套用時不能帶這個變數——
          它會同時覆寫全部子 playbook 的目標 group,讓「沒填 hosts 的角色不會被
          套用」這條保護整個失效(未填的角色也會被套用到不該套用的機器上)。要
          限定機器,改用 --limit <host>,或直接調整 inventory.yml 的角色 group
          成員;要單獨測試某支 playbook,直接執行該支 apply playbook 並在那裡
          帶 -e target_group=。
      tags: [always]

# ── 0. 前置檢查(一律先跑)───────────────────────────────────────────────
- import_playbook: preflight.yml

# ── 1. 核心基礎服務(同一支 playbook 以 infra_role 分別套 dns / ntp)──────
- import_playbook: apply/core-infra-provider-apply.yml
  vars:
    infra_role: dns
  tags: [infra, dns]
- import_playbook: apply/core-infra-provider-apply.yml
  vars:
    infra_role: ntp
  tags: [infra, ntp]
- import_playbook: apply/core-infra-provider-apply.yml
  vars:
    infra_role: docker
  tags: [infra, docker]

# ── 2. 身份 / AAA(FreeIPA)server 先於 client ───────────────────────────
- import_playbook: apply/freeipa-server-apply.yml
  tags: [freeipa, freeipa-server]
- import_playbook: apply/freeipa-client-apply.yml
  tags: [freeipa, freeipa-client]

# ── 3. Keycloak(DB 先於 IdP)────────────────────────────────────────────
- import_playbook: apply/keycloak-db-apply.yml
  tags: [keycloak, keycloak-db]
- import_playbook: apply/keycloak-apply.yml
  tags: [keycloak]

# ── 4. SSH 走 OIDC 登入(需先有 Keycloak)────────────────────────────────
- import_playbook: apply/pam-oidc-sshd-apply.yml
  tags: [pam, oidc, pam-oidc-sshd]

# ── 5. 中央稽核日誌接收(log-server)→ 主機稽核 + 轉送 ─────────────────
- import_playbook: apply/log-server-apply.yml
  tags: [audit, log-server]
- import_playbook: apply/audit-log-forwarding-apply.yml
  tags: [audit, audit-log-forwarding]

# ── 5a. Wazuh(FIM/who-data 告警引擎 + CVE 弱點掃描)→ agent 註冊 ─────────
- import_playbook: apply/wazuh-manager-apply.yml
  tags: [audit, wazuh, wazuh-manager]
- import_playbook: apply/wazuh-fim-apply.yml
  tags: [audit, wazuh, wazuh-fim]

# ── 5b. S3 相容物件儲存(SeaweedFS)→ 跨主機通用 restic 備份 ──────────────
#    restic-backup 需要 seaweedfs-s3 先起來(或 restic_repository 改覆寫成
#    外部 S3);兩個變數都選填但至少要有一個生效,否則 restic-backup-apply.yml
#    的 pre_tasks 會直接 fail(見 docs/verification/restic-backup.md §1.5)。
- import_playbook: apply/seaweedfs-s3-apply.yml
  tags: [backup, seaweedfs-s3]
- import_playbook: apply/restic-backup-apply.yml
  tags: [backup, restic-backup]

# ── 6. OS 補丁 SLA(day-2,放最後)──────────────────────────────────────
- import_playbook: apply/os-patch-sla-apply.yml
  tags: [patch]
