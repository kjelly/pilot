---
- name: Verification Spec — pam-oidc-sshd (kha7iq/kc-ssh-pam, Keycloak Device Flow)
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: "C1 — Go + `libpam0g-dev` + `build-essential` 已安裝"
      ansible.builtin.command: "sh -c 'dpkg-query -W -f=\"${Status}\" golang-go libpam0g-dev build-essential 2>/dev/null | awk \"/^ii/{c++} END{print c}\"'"
      become: true
      changed_when: false
      tags: [C1]
    - name: "C2 — PAM 模組 `/lib/security/pam_keycloak_device.so` 存在"
      ansible.builtin.stat:
        path: "/lib/security/pam_keycloak_device.so -o -f /lib/x86_64-linux-gnu/security/pam_keycloak_device.so"
      tags: [C2]
    - name: "C3 — sshd PAM 備份 `/etc/pam.d/sshd.kcsssh.bak` 存在"
      ansible.builtin.stat:
        path: "/etc/pam.d/sshd.kcsssh.bak"
      become: true
      tags: [C3]
    - name: "C4 — `/etc/pam.d/sshd` 含 `auth sufficient pam_keycloak_device.…"
      ansible.builtin.command: "grep -qE '^auth[[:space:]]+sufficient[[:space:]]+pam_keycloak_device\\.so' /etc/pam.d/sshd; echo $?"
      become: true
      changed_when: false
      tags: [C4]
    - name: "C5 — `sshd -T` 仍可解析 PAM 設定（未改到壞掉）"
      ansible.builtin.command: "sh -c 'sshd -T -f /etc/ssh/sshd_config >/dev/null 2>&1; echo $?'"
      become: true
      changed_when: false
      tags: [C5]
    - name: "C6 — `keycloak-ssh-monitor` 二進位存在"
      ansible.builtin.stat:
        path: "/usr/local/bin/keycloak-ssh-monitor"
      become: true
      tags: [C6]
    - name: "C7 — `keycloak-ssh-monitor.service` systemd unit 存在"
      ansible.builtin.stat:
        path: "/etc/systemd/system/keycloak-ssh-monitor.service"
      become: true
      tags: [C7]
    - name: "C8 — `/etc/keycloak-ssh/config.yaml` 含 `keycloak.server_url:` …"
      ansible.builtin.command: "grep -qE '^[[:space:]]*server_url:[[:space:]]*https?://' /etc/keycloak-ssh/config.yaml; echo $?"
      become: true
      changed_when: false
      tags: [C8]
    - name: "C9 — `/etc/keycloak-ssh/config.yaml` 含 `keycloak.realm:` 非空"
      ansible.builtin.command: "grep -qE '^[[:space:]]*realm:[[:space:]]+[^[:space:]]' /etc/keycloak-ssh/config.yaml"
      become: true
      changed_when: false
      tags: [C9]
