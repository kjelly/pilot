---
# Generated by: go run ./cmd/pilot spec docs/verification/pam-oidc-sshd.md --generate
# Upstream: https://github.com/kha7iq/kc-ssh-pam
# Source: https://github.com/omidiyanto/keycloak-ssh-pam-module
- name: "Verify pam-oidc-sshd (kha7iq/kc-ssh-pam)"
  hosts: linux-servers
  gather_facts: false

  tasks:
    # C1: Build deps (golang, libpam0g-dev, build-essential)
    - name: "C1 — build deps installed"
      ansible.builtin.command:
        cmd: >
          dpkg-query -W -f='${Status}' golang-go libpam0g-dev build-essential 2>/dev/null
          | awk '/^ii/{c++} END{print (c==3?0:1)}'
      become: true
      changed_when: false
      register: C1

    # C2: PAM module exists (search all known Debian/Ubuntu paths)
    - name: "C2 — pam_keycloak_device.so exists"
      ansible.builtin.shell:
        cmd: >
          for p in /lib/x86_64-linux-gnu/security /lib64/security /lib/security; do
            [ -f "$p/pam_keycloak_device.so" ] && echo "0" && exit 0
          done; echo "1"
      become: true
      changed_when: false
      register: C2

    # C3: Backup exists
    - name: "C3 — /etc/pam.d/sshd.kcsssh.bak backup exists"
      ansible.builtin.stat:
        path: /etc/pam.d/sshd.kcsssh.bak
      become: true
      register: C3

    # C4: PAM line in sshd
    - name: "C4 — pam_keycloak_device.so wired in /etc/pam.d/sshd"
      ansible.builtin.shell:
        cmd: >
          grep -qE '^auth[[:space:]]+sufficient[[:space:]]+pam_keycloak_device\.so' /etc/pam.d/sshd
          && echo 0 || echo 1
      become: true
      changed_when: false
      register: C4

    # C5: sshd -T parseable
    - name: "C5 — sshd -T parseable"
      ansible.builtin.shell:
        cmd: "sshd -T -f /etc/ssh/sshd_config >/dev/null 2>&1; echo $?"
      become: true
      changed_when: false
      register: C5

    # C6: Monitor binary
    - name: "C6 — keycloak-ssh-monitor binary exists"
      ansible.builtin.stat:
        path: /usr/local/bin/keycloak-ssh-monitor
      become: true
      register: C6

    # C7: systemd unit
    - name: "C7 — keycloak-ssh-monitor.service exists"
      ansible.builtin.stat:
        path: /etc/systemd/system/keycloak-ssh-monitor.service
      become: true
      register: C7

    # C8: server_url https in config
    - name: "C8 — server_url uses https in config"
      ansible.builtin.shell:
        cmd: >
          grep -qE '^[[:space:]]*server_url:[[:space:]]*https?://' /etc/keycloak-ssh/config.yaml
          && echo 0 || echo 1
      become: true
      changed_when: false
      register: C8

    # C9: realm non-empty
    - name: "C9 — realm non-empty in config"
      ansible.builtin.shell:
        cmd: >
          grep -qE '^[[:space:]]*realm:[[:space:]]+[^[:space:]]' /etc/keycloak-ssh/config.yaml
          && echo 0 || echo 1
      become: true
      changed_when: false
      register: C9
