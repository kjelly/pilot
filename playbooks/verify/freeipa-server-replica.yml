---
- name: Verification Spec — freeipa-server-replica (native EL9, HA 第二/後續台)
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: "C1 — FreeIPA 已設定完成（安裝產物存在）"
      ansible.builtin.stat:
        path: "/etc/ipa/default.conf"
      become: true
      tags: [C1]
    - name: "C2 — 所有 IPA 服務健康（`ipactl status` 全 RUNNING → \xe8…"
      ansible.builtin.command: "sudo ipactl status"
      changed_when: false
      tags: [C2]
    - name: "C3 — 主機 FQDN 正確（這台自己的，不是 primary 的）"
      ansible.builtin.command: "hostname -f"
      changed_when: false
      tags: [C3]
    - name: "C4 — LDAP 389/tcp 在 host listening"
      ansible.builtin.command: "ss -tlnH | grep -q \":389 \""
      become: true
      changed_when: false
      tags: [C4]
    - name: "C5 — LDAPS 636/tcp 在 host listening"
      ansible.builtin.command: "ss -tlnH | grep -q \":636 \""
      become: true
      changed_when: false
      tags: [C5]
    - name: "C6 — Kerberos 88/tcp 在 host listening"
      ansible.builtin.command: "ss -tlnH | grep -q \":88 \""
      become: true
      changed_when: false
      tags: [C6]
    - name: "C7 — Kerberos 88/udp 在 host listening"
      ansible.builtin.command: "ss -ulnH | grep -q \":88 \""
      become: true
      changed_when: false
      tags: [C7]
    - name: "C8 — kpasswd 464/udp 在 host listening"
      ansible.builtin.command: "ss -ulnH | grep -q \":464 \""
      become: true
      changed_when: false
      tags: [C8]
    - name: "C9 — HTTP 80/tcp 在 host listening"
      ansible.builtin.command: "ss -tlnH | grep -q \":80 \""
      become: true
      changed_when: false
      tags: [C9]
    - name: "C10 — HTTPS 443/tcp 在 host listening"
      ansible.builtin.command: "ss -tlnH | grep -q \":443 \""
      become: true
      changed_when: false
      tags: [C10]
    - name: "C11 — LDAP rootDSE 廣告的 namingContext = realm 後綴（跟 p…"
      ansible.builtin.command: "ldapsearch -x -H ldap://localhost -b \"\" -s base namingContexts"
      changed_when: false
      tags: [C11]
    - name: "C12 — CA 憑證 endpoint 可被抓（走這台自己的 FQDN，cl…"
      ansible.builtin.command: "curl -fsS -o /dev/null -w \"%{http_code}\" http://ipa2.ipa.pilot.internal/ipa/config/ca.crt"
      become: true
      changed_when: false
      tags: [C12]
    - name: "C13 — sudo 規則 LDAP 子樹存在（跟 primary 複寫過來，…"
      ansible.builtin.command: "ldapsearch -x -H ldap://localhost -b \"ou=sudoers,dc=ipa,dc=pilot,dc=internal\" -s base dn"
      changed_when: false
      tags: [C13]
    - name: "C14 — 這台看得到 **primary** 在 `cn=masters` 拓樸清單\xe8\xa3…"
      ansible.builtin.command: "sudo ldapsearch -Y EXTERNAL -H ldapi://%2Frun%2Fslapd-IPA-PILOT-INTERNAL.socket -b \"cn=masters,cn=ipa,cn=etc,dc=ipa,dc=pilot,dc=internal\" -s sub dn"
      changed_when: false
      tags: [C14, C15]
