# Apply playbook: FreeIPA identity & authorization management (DATA-DRIVEN)
#
# This playbook contains NO user names, group names, or sudo rules of its own.
# It is a generic reconciler that loops over lists supplied at runtime:
#
#   ipa_users        ŌĆö accounts to ensure exist (+ optional group membership)
#   ipa_groups       ŌĆö groups to ensure exist
#   ipa_hostgroups   ŌĆö host groups to ensure exist (+ member hosts)
#   ipa_hbac_rules   ŌĆö HBAC rules: who may LOG IN to which host(s)/service(s)
#   ipa_sudo_rules   ŌĆö sudo rules: what a logged-in user may run, and where
#
# Per-host authorization = two layers, both host-scoped via ipa_hostgroups:
#   HBAC   gates login itself (SSH/PAM). Without an explicit HBAC rule, IPA's
#          shipped "allow_all" rule lets every enrolled user log in to every
#          enrolled host ŌĆö set ipa_hbac_disable_allow_all: true once your own
#          HBAC rules cover the access you want, or narrow rules are moot.
#   sudo   gates what an already-logged-in user may run as root. A sudo rule
#          with no hosts/hostgroups defaults to hostcat=all (applies
#          everywhere); give it `hosts:` or `hostgroups:` to scope it.
#
# WHY THIS SHAPE ŌĆö secrets & roster stay OUT of git:
#   The *logic* (how to create a user / attach a sudo rule) lives here in git.
#   The *data* (who the users are, their initial passwords, what each rule
#   grants) lives in an ansible-vault-encrypted roster OUTSIDE the repo, e.g.
#   ~/.vault/ipa-identity.yaml, and is injected with `-e @<file>`. Anyone who
#   clones this repo gets the reconciler but none of your real accounts.
#   See playbooks/apply/freeipa-identity.roster.example.yaml for the schema.
#
# Idempotency: every task treats "already exists / already a member" as a
# no-op (changed_when/failed_when mirror freeipa-server-apply.yml). Passwords
# are set unconditionally when set at all (IPA has no "read" to diff
# against) but no_log keeps them out of Ansible output. `force_password`
# defaults to false ŌĆö a user's `password:` is only applied when that user
# also has `force_password: true` ŌĆö so a routine rerun never silently resets
# an already-onboarded user's password back to a forced-change state. Set
# force_password: true for a first-time onboard, or for a deliberate reset.
#
# Usage (against a pilot vm-target that hosts the IPA server in group `all`):
#
#   pilot vm-target run --name alma-vm \
#       playbooks/apply/freeipa-identity-apply.yml \
#       -e target_group=all \
#       -e @~/.vault/ipa-identity.yaml \
#       --vault-password-file ~/.vault/vault-pass
#
#   # or straight ansible-playbook against a real inventory:
#   ansible-playbook -i inventory-freeipa.yaml \
#       playbooks/apply/freeipa-identity-apply.yml \
#       -e @~/.vault/ipa-identity.yaml --ask-vault-pass --check --diff
#
# The roster file (~/.vault/ipa-identity.yaml) MUST also define ipa_admin_password.
#
# Stage gating (same convention as freeipa-server-apply.yml):
#   sandbox  default; runs immediately
#   staging  requires -e confirm_staging=true
#   prod     requires -e confirm_prod=true AND staging_attested_within_hours<=168
---
- name: FreeIPA identity & authorization apply
  hosts: "{{ target_group | default('freeipa-server') }}"
  become: false
  gather_facts: false
  vars:
    stage: sandbox
    confirm_staging: false
    confirm_prod: false
    staging_attested_within_hours: 168

    ipa_domain: ipa.pilot.internal
    ipa_realm: "{{ ipa_domain | upper }}"

    # Data lists default to empty so a partial roster (e.g. only users, no
    # sudo rules) is valid and each block below simply skips.
    ipa_users: []
    ipa_groups: []
    ipa_hostgroups: []
    ipa_hbac_rules: []
    ipa_sudo_rules: []

    # Once your own ipa_hbac_rules cover the access you want, set this true
    # to disable IPA's shipped "allow_all" rule ŌĆö otherwise it keeps granting
    # every user login to every host regardless of the rules above.
    ipa_hbac_disable_allow_all: false

  pre_tasks:
    - name: "Gate: admin credential present (fail early, before any mutation)"
      ansible.builtin.assert:
        that:
          - ipa_admin_password is defined and ipa_admin_password | length >= 8
        fail_msg: >-
          Missing ipa_admin_password. Pass an ansible-vault roster with the
          admin credential, e.g. -e @~/.vault/ipa-identity.yaml
      tags: [always]

    - name: "Gate: staging or prod requires explicit confirm"
      ansible.builtin.assert:
        that:
          - (stage == 'sandbox') or
            (stage == 'staging' and confirm_staging | bool) or
            (stage == 'prod' and confirm_prod | bool)
        fail_msg: "stage={{ stage }} requires confirm flag. Pass -e confirm_staging=true or confirm_prod=true."
      tags: [always]

    - name: "Gate: stage must match this host's inventory environment group"
      ansible.builtin.assert:
        that:
          - not ('prod' in group_names and stage != 'prod')
          - not ('staging' in group_names and stage != 'staging')
          - not (stage in ['staging', 'prod'] and stage not in group_names)
        fail_msg: >-
          stage={{ stage }} Ķłć {{ inventory_hostname }} ńÜä inventory ńÆ░Õóā group õĖŹõĖĆĶć┤
          (group_names: {{ group_names }})ŃĆéinventory ńÜä staging/prod group ÕÅ¬µś»ńĄ”
          target_group ń»®ķüĖńö©ńÜäµ©Öń▒ż,õĖŹµ£āĶć¬ÕŗĢµ▒║Õ«Ü stageŌĆöŌĆöÕ┐ģķĀłĶć¬ÕĘ▒ÕĖČÕ░ŹńÜä -e stage=,
          õĖöĶ”üĶĘ¤ķĆÖÕÅ░µ®¤ÕÖ©µēĆÕ▒¼ńÜäńÆ░Õóā group õĖĆĶć┤ŃĆé
      tags: [always]

    - name: "Gate: prod requires recent staging attestation"
      ansible.builtin.assert:
        that:
          - (staging_attested_within_hours | int) <= 168
        fail_msg: "prod gate: staging attestation missing or older than 168h."
      when: stage == 'prod'
      tags: [always]

  tasks:
    # ŌöĆŌöĆ Admin authentication ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    - name: "Kinit admin"
      ansible.builtin.shell:
        cmd: 'printf %s "{{ ipa_admin_password }}" | kinit admin@{{ ipa_realm }}'
      changed_when: false
      no_log: true
      tags: [identity]

    # ŌöĆŌöĆ Groups ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    - name: "Ensure IPA groups exist"
      ansible.builtin.command:
        argv:
          - ipa
          - group-add
          - "{{ item.name }}"
          - "--desc={{ item.desc | default(item.name) }}"
      loop: "{{ ipa_groups }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_group_add
      changed_when: "'Added group' in (ipa_group_add.stdout | default(''))"
      failed_when:
        - ipa_group_add.rc != 0
        - "'already exists' not in (ipa_group_add.stderr | default(''))"
      tags: [identity, groups]

    # `group-add` above no-ops on "already exists" ŌĆö an already-created
    # group's own `desc` never gets corrected by editing the roster and
    # rerunning without this. Unconditional declarative reconcile, same
    # idiom as the SSH-key task below.
    - name: "Reconcile IPA group descriptions"
      ansible.builtin.command:
        argv:
          - ipa
          - group-mod
          - "{{ item.name }}"
          - "--desc={{ item.desc | default(item.name) }}"
      loop: "{{ ipa_groups }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_group_mod
      changed_when: "'Modified group' in (ipa_group_mod.stdout | default(''))"
      failed_when:
        - ipa_group_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_group_mod.stderr | default(''))"
      tags: [identity, groups]

    # ŌöĆŌöĆ Users ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    - name: "Ensure IPA users exist"
      ansible.builtin.command:
        argv:
          - ipa
          - user-add
          - "{{ item.name }}"
          - "--first={{ item.first | default(item.name) }}"
          - "--last={{ item.last | default(item.name) }}"
      loop: "{{ ipa_users }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_user_add
      changed_when: "'Added user' in (ipa_user_add.stdout | default(''))"
      failed_when:
        - ipa_user_add.rc != 0
        - "'already exists' not in (ipa_user_add.stderr | default(''))"
      tags: [identity, users]

    # `user-add` above no-ops on "already exists" ŌĆö an already-created
    # user's own `first`/`last` never gets corrected by editing the roster
    # and rerunning without this. Unconditional declarative reconcile, same
    # idiom as the SSH-key task below.
    - name: "Reconcile user first/last names"
      ansible.builtin.command:
        argv:
          - ipa
          - user-mod
          - "{{ item.name }}"
          - "--first={{ item.first | default(item.name) }}"
          - "--last={{ item.last | default(item.name) }}"
      loop: "{{ ipa_users }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_user_mod
      changed_when: "'Modified user' in (ipa_user_mod.stdout | default(''))"
      failed_when:
        - ipa_user_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_user_mod.stderr | default(''))"
      tags: [identity, users]

    # Passwords are set unconditionally when run (no read-back to diff
    # against), and `ipa passwd` is an admin reset ŌĆö it always re-arms
    # FreeIPA's forced-password-change flag regardless of whether the value
    # is unchanged. `force_password` therefore defaults to false: a user's
    # `password:` only actually gets applied when that user ALSO sets
    # `force_password: true` (first-time onboard, or a deliberate reset) ŌĆö
    # a routine rerun of an already-onboarded roster no longer silently
    # resets everyone's password back to a forced-change state.
    #
    # That default flip alone still isn't enough for a roster entry that
    # deliberately KEEPS `force_password: true` set (e.g. to re-arm a test
    # scenario, or someone forgetting to flip it back after onboarding) ŌĆö
    # every rerun would still stomp a password the user has since
    # personalized. FreeIPA exposes a reliable signal for "has this
    # account's password been changed by the user since the last admin
    # reset?": `krbLastPwdChange` vs `krbPasswordExpiration` (confirmed
    # live, 2026-07-16). Right after `ipa passwd` (admin reset) the two are
    # IDENTICAL ŌĆö "must change immediately". Once the user completes their
    # own change (a real `kinit` + interactive forced-change prompt),
    # `krbPasswordExpiration` jumps ~90 days past `krbLastPwdChange` (per
    # password policy maxlife) ŌĆö a real future gap only exists once the
    # change was genuinely the user's own. Both are fixed-width
    # `YYYYMMDDHHMMSSZ`, so plain string `<=`/`==` comparison is valid.
    # Looked up for every user with a password declared, not just
    # force_password: true ones ŌĆö a brand-new roster entry that ships
    # with force_password: false (e.g. copied from an already-onboarded
    # steady-state roster) still needs this to detect "no Kerberos key
    # yet at all" below, otherwise a first-time-ever apply silently
    # creates the account with no usable password (see Real bugs table).
    - name: "Look up password-expiry state for users with a declared password"
      ansible.builtin.command:
        argv: [ipa, user-show, "{{ item.name }}", --all, --raw]
      loop: "{{ ipa_users | selectattr('password', 'defined') | list }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_pwd_state
      changed_when: false
      failed_when: false
      no_log: true
      tags: [identity, users, passwords]

    # A brand-new user (first-time onboard) has no Kerberos key yet, so
    # neither attribute exists ŌĆö that must mean "proceed," not "skip".
    - name: "Compute whether each force_password user still needs a reset"
      ansible.builtin.set_fact:
        ipa_pwd_needs_reset: "{{ ipa_pwd_needs_reset | default({}) | combine({item.item.name: item_needs_reset}) }}"
      vars:
        item_stdout: "{{ item.stdout | default('') }}"
        item_last_change: "{{ (item_stdout | regex_findall('krbLastPwdChange: (\\S+)') + ['']) | first }}"
        item_expiration: "{{ (item_stdout | regex_findall('krbPasswordExpiration: (\\S+)') + ['']) | first }}"
        item_needs_reset: "{{ item_last_change == '' or item_expiration <= item_last_change }}"
      loop: "{{ ipa_pwd_state.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when: not (item.skipped | default(false))
      tags: [identity, users, passwords]

    # Runs when the roster explicitly asks for it (force_password: true)
    # OR when the account genuinely has no Kerberos key yet at all (a
    # first-time onboard, regardless of what force_password says) ŌĆö the
    # latter closes the gap where a steady-state roster's
    # force_password: false on a user being created for the very first
    # time would otherwise leave them with no usable password (see Real
    # bugs table).
    - name: "Set password for users that need one (forced, or first-time onboard)"
      ansible.builtin.shell:
        cmd: |
          printf '%s\n%s\n' "{{ item.password }}" "{{ item.password }}" \
            | ipa passwd {{ item.name }}
      loop: "{{ ipa_users | selectattr('password', 'defined') | list }}"
      loop_control:
        label: "{{ item.name }}"
      when: >-
        (item.force_password | default(false) | bool)
        or ((ipa_pwd_needs_reset | default({})).get(item.name, true))
      register: ipa_passwd
      changed_when: ipa_passwd.rc == 0
      failed_when: false
      no_log: true
      tags: [identity, users, passwords]

    # SSH public keys are declarative: user-mod REPLACES the whole ipaSshPubKey
    # set with exactly the keys listed, so removing a key from the roster and
    # rerunning revokes it. Enrolled clients serve these via SSSD's
    # AuthorizedKeysCommand (sss_ssh_authorizedkeys), configured by
    # ipa-client-install ŌĆö no per-host authorized_keys file needed.
    # Keys go through argv (not shell) so their spaces/base64 never hit a shell.
    - name: "Set SSH public keys for users (declarative replace)"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'user-mod', item.name]
             + (item.ssh_keys | map('regex_replace', '^(.*)$', '--sshpubkey=\1') | list) }}
      loop: "{{ ipa_users | selectattr('ssh_keys', 'defined') | list }}"
      loop_control:
        label: "{{ item.name }} ({{ item.ssh_keys | length }} key(s))"
      register: ipa_sshkey
      changed_when: "'Modified user' in (ipa_sshkey.stdout | default(''))"
      failed_when:
        - ipa_sshkey.rc != 0
        - "'no modifications to be performed' not in (ipa_sshkey.stderr | default(''))"
      tags: [identity, users, sshkeys]

    - name: "Ensure user group membership"
      ansible.builtin.command:
        argv:
          - ipa
          - group-add-member
          - "{{ item.1 }}"
          - "--users={{ item.0.name }}"
      loop: "{{ ipa_users | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -> {{ item.1 }}"
      register: ipa_grp_member
      changed_when: "'Number of members added 1' in (ipa_grp_member.stdout | default(''))"
      failed_when:
        - ipa_grp_member.rc != 0
        - "'already a member' not in (ipa_grp_member.stdout | default('') + ipa_grp_member.stderr | default(''))"
      tags: [identity, users, groups]

    # `group-add-member` above only ever adds ŌĆö a user removed from their
    # roster `groups:` list keeps stale membership forever without this.
    # Scoped ONLY to groups this roster itself declares (`ipa_groups`) ŌĆö
    # `ipa user-show`'s "Member of groups:" line also lists IPA's own
    # `ipausers` (every user is auto-added to it), which must never be
    # touched since it isn't something any roster manages.
    - name: "Look up current user group memberships"
      ansible.builtin.command:
        argv: [ipa, user-show, "{{ item.name }}", --all]
      loop: "{{ ipa_users }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_user_show
      changed_when: false
      failed_when: false
      tags: [identity, users, groups]

    - name: "Compute stale group memberships to remove"
      ansible.builtin.set_fact:
        ipa_group_membership_removals: "{{ (ipa_group_membership_removals | default([])) + [{'name': item.item.name, 'groups': stale_groups}] }}"
      vars:
        managed_groups: "{{ ipa_groups | map(attribute='name') | list }}"
        live_line: "{{ ((item.stdout | default('') | regex_findall('^  Member of groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        live_groups: "{{ [] if live_line == '' else live_line.split(', ') }}"
        stale_groups: "{{ live_groups | intersect(managed_groups) | difference(item.item.groups | default([])) }}"
      loop: "{{ ipa_user_show.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when: not (item.skipped | default(false))
      tags: [identity, users, groups]

    - name: "Remove stale group memberships"
      ansible.builtin.command:
        argv:
          - ipa
          - group-remove-member
          - "{{ item.1 }}"
          - "--users={{ item.0.name }}"
      loop: "{{ ipa_group_membership_removals | default([]) | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> {{ item.1 }}"
      register: ipa_grp_removal
      changed_when: "'Number of members removed 1' in (ipa_grp_removal.stdout | default(''))"
      failed_when:
        - ipa_grp_removal.rc != 0
      tags: [identity, users, groups]

    # ŌöĆŌöĆ Host groups ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    # Groups of enrolled hosts (e.g. web-hosts, db-hosts) that HBAC rules and
    # sudo rules below can target instead of naming individual hosts.
    - name: "Ensure IPA hostgroups exist"
      ansible.builtin.command:
        argv:
          - ipa
          - hostgroup-add
          - "{{ item.name }}"
          - "--desc={{ item.desc | default(item.name) }}"
      loop: "{{ ipa_hostgroups }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hostgroup_add
      changed_when: "'Added hostgroup' in (ipa_hostgroup_add.stdout | default(''))"
      failed_when:
        - ipa_hostgroup_add.rc != 0
        - "'already exists' not in (ipa_hostgroup_add.stderr | default(''))"
      tags: [identity, hostgroups]

    # `hostgroup-add` above no-ops on "already exists" ŌĆö an already-created
    # hostgroup's own `desc` never gets corrected by editing the roster and
    # rerunning without this. Unconditional declarative reconcile, same
    # idiom as the SSH-key task below.
    - name: "Reconcile IPA hostgroup descriptions"
      ansible.builtin.command:
        argv:
          - ipa
          - hostgroup-mod
          - "{{ item.name }}"
          - "--desc={{ item.desc | default(item.name) }}"
      loop: "{{ ipa_hostgroups }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hostgroup_mod
      changed_when: "'Modified hostgroup' in (ipa_hostgroup_mod.stdout | default(''))"
      failed_when:
        - ipa_hostgroup_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_hostgroup_mod.stderr | default(''))"
      tags: [identity, hostgroups]

    - name: "Ensure hostgroup membership"
      ansible.builtin.command:
        argv:
          - ipa
          - hostgroup-add-member
          - "{{ item.0.name }}"
          - "--hosts={{ item.1 }}"
      loop: "{{ ipa_hostgroups | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -> {{ item.1 }}"
      register: ipa_hostgroup_member
      changed_when: "'Number of members added 1' in (ipa_hostgroup_member.stdout | default(''))"
      failed_when:
        - ipa_hostgroup_member.rc != 0
        - "'already a member' not in (ipa_hostgroup_member.stdout | default('') + ipa_hostgroup_member.stderr | default(''))"
      tags: [identity, hostgroups]

    # `hostgroup-add-member` above only ever adds ŌĆö a host removed from the
    # roster's `hosts:` list keeps stale membership forever without this.
    # `hostgroup-show` always reports hosts as FQDNs even when the roster
    # (and the add task above) used a short name that IPA itself resolved ŌĆö
    # normalize both sides to the short name before diffing, or every
    # single rerun would see "client-vm.ipa.pilot.internal" (live) as
    # absent from a roster that says "client-vm", remove it, then the
    # existing add task immediately re-adds it ŌĆö permanent flip-flop
    # instead of a settled `changed=0` idempotent rerun.
    - name: "Look up current hostgroup host memberships"
      ansible.builtin.command:
        argv: [ipa, hostgroup-show, "{{ item.name }}", --all]
      loop: "{{ ipa_hostgroups }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hostgroup_show
      changed_when: false
      failed_when: false
      tags: [identity, hostgroups]

    - name: "Compute stale hostgroup host memberships to remove"
      ansible.builtin.set_fact:
        ipa_hostgroup_membership_removals: "{{ (ipa_hostgroup_membership_removals | default([])) + [{'name': item.item.name, 'hosts': stale_hosts}] }}"
      vars:
        live_line: "{{ ((item.stdout | default('') | regex_findall('^  Member hosts: (.*)$', multiline=True)) + ['']) | first | trim }}"
        live_hosts_fqdn: "{{ [] if live_line == '' else live_line.split(', ') }}"
        live_hosts: "{{ live_hosts_fqdn | map('regex_replace', '\\..*$', '') | list }}"
        roster_hosts: "{{ (item.item.hosts | default([])) | map('regex_replace', '\\..*$', '') | list }}"
        stale_hosts: "{{ live_hosts | difference(roster_hosts) }}"
      loop: "{{ ipa_hostgroup_show.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when: not (item.skipped | default(false))
      tags: [identity, hostgroups]

    - name: "Remove stale hostgroup host memberships"
      ansible.builtin.command:
        argv:
          - ipa
          - hostgroup-remove-member
          - "{{ item.0.name }}"
          - "--hosts={{ item.1 }}"
      loop: "{{ ipa_hostgroup_membership_removals | default([]) | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> {{ item.1 }}"
      register: ipa_hostgroup_removal
      changed_when: "'Number of members removed 1' in (ipa_hostgroup_removal.stdout | default(''))"
      failed_when:
        - ipa_hostgroup_removal.rc != 0
      tags: [identity, hostgroups]

    # ŌöĆŌöĆ HBAC rules (who may LOG IN, and where) ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    # A rule with no hosts/hostgroups defaults to hostcat=all (login allowed
    # on every host); give it `hosts:`/`hostgroups:` to restrict login to a
    # subset of hosts. A rule with no services defaults to servicecat=all;
    # give it `services: [sshd]` to restrict which access method it grants.
    - name: "Ensure HBAC rules exist"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'hbacrule-add', item.name]
             + ([] if (item.hostgroups is defined or item.hosts is defined)
                else ['--hostcat=' ~ (item.hostcat | default('all'))])
             + ([] if (item.services is defined)
                else ['--servicecat=' ~ (item.servicecat | default('all'))]) }}
      loop: "{{ ipa_hbac_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hbac_add
      changed_when: "'Added HBAC rule' in (ipa_hbac_add.stdout | default(''))"
      failed_when:
        - ipa_hbac_add.rc != 0
        - "'already exists' not in (ipa_hbac_add.stderr | default(''))"
      tags: [identity, hbac]

    # `hbacrule-add` above no-ops on "already exists" ŌĆö none of hostcat,
    # servicecat, or attached hosts/hostgroups/services/users/groups ever
    # gets corrected by editing the roster and rerunning without the
    # lookup/remove/reconcile trio below. Same FQDN-vs-short-name
    # normalization concern as the hostgroup membership task above.
    - name: "Look up current HBAC rule attachments"
      ansible.builtin.command:
        argv: [ipa, hbacrule-show, "{{ item.name }}", --all]
      loop: "{{ ipa_hbac_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hbacrule_show
      changed_when: false
      failed_when: false
      tags: [identity, hbac]

    # Scoped removal: only ever removes a host/hostgroup/service/user/group
    # that is BOTH currently attached to THIS rule AND absent from THIS
    # same rule's own roster lists ŌĆö never a blind sweep across rules.
    - name: "Compute HBAC rule attachments to remove"
      ansible.builtin.set_fact:
        ipa_hbac_removals: >-
          {{ (ipa_hbac_removals | default([])) + [{
               'name': item.item.name,
               'hosts': (live_hosts | difference(roster_hosts)),
               'hostgroups': (live_hostgroups | difference(item.item.hostgroups | default([]))),
               'services': (live_services | difference(item.item.services | default([]))),
               'users': (live_users | difference(item.item.users | default([]))),
               'groups': (live_groups | difference(item.item.groups | default([]))),
          }] }}
      vars:
        stdout: "{{ item.stdout | default('') }}"
        hosts_line: "{{ ((stdout | regex_findall('^  Hosts: (.*)$', multiline=True)) + ['']) | first | trim }}"
        hostgroups_line: "{{ ((stdout | regex_findall('^  Host Groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        services_line: "{{ ((stdout | regex_findall('^  HBAC Services: (.*)$', multiline=True)) + ['']) | first | trim }}"
        users_line: "{{ ((stdout | regex_findall('^  Users: (.*)$', multiline=True)) + ['']) | first | trim }}"
        groups_line: "{{ ((stdout | regex_findall('^  User Groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        live_hosts_fqdn: "{{ [] if hosts_line == '' else hosts_line.split(', ') }}"
        live_hosts: "{{ live_hosts_fqdn | map('regex_replace', '\\..*$', '') | list }}"
        roster_hosts: "{{ (item.item.hosts | default([])) | map('regex_replace', '\\..*$', '') | list }}"
        live_hostgroups: "{{ [] if hostgroups_line == '' else hostgroups_line.split(', ') }}"
        live_services: "{{ [] if services_line == '' else services_line.split(', ') }}"
        live_users: "{{ [] if users_line == '' else users_line.split(', ') }}"
        live_groups: "{{ [] if groups_line == '' else groups_line.split(', ') }}"
      loop: "{{ ipa_hbacrule_show.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when: not (item.skipped | default(false))
      tags: [identity, hbac]

    - name: "Remove stale hosts from HBAC rules"
      ansible.builtin.command:
        argv: [ipa, hbacrule-remove-host, "{{ item.0.name }}", "--hosts={{ item.1 }}"]
      loop: "{{ ipa_hbac_removals | default([]) | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> host {{ item.1 }}"
      register: ipa_hbac_rm_host
      changed_when: "'Number of members removed 1' in (ipa_hbac_rm_host.stdout | default(''))"
      failed_when:
        - ipa_hbac_rm_host.rc != 0
      tags: [identity, hbac]

    - name: "Remove stale hostgroups from HBAC rules"
      ansible.builtin.command:
        argv: [ipa, hbacrule-remove-host, "{{ item.0.name }}", "--hostgroups={{ item.1 }}"]
      loop: "{{ ipa_hbac_removals | default([]) | subelements('hostgroups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> hostgroup {{ item.1 }}"
      register: ipa_hbac_rm_hostgroup
      changed_when: "'Number of members removed 1' in (ipa_hbac_rm_hostgroup.stdout | default(''))"
      failed_when:
        - ipa_hbac_rm_hostgroup.rc != 0
      tags: [identity, hbac]

    - name: "Remove stale services from HBAC rules"
      ansible.builtin.command:
        argv: [ipa, hbacrule-remove-service, "{{ item.0.name }}", "--hbacsvcs={{ item.1 }}"]
      loop: "{{ ipa_hbac_removals | default([]) | subelements('services', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> service {{ item.1 }}"
      register: ipa_hbac_rm_service
      changed_when: "'Number of members removed 1' in (ipa_hbac_rm_service.stdout | default(''))"
      failed_when:
        - ipa_hbac_rm_service.rc != 0
      tags: [identity, hbac]

    - name: "Remove stale users from HBAC rules"
      ansible.builtin.command:
        argv: [ipa, hbacrule-remove-user, "{{ item.0.name }}", "--users={{ item.1 }}"]
      loop: "{{ ipa_hbac_removals | default([]) | subelements('users', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> user {{ item.1 }}"
      register: ipa_hbac_rm_user
      changed_when: "'Number of members removed 1' in (ipa_hbac_rm_user.stdout | default(''))"
      failed_when:
        - ipa_hbac_rm_user.rc != 0
      tags: [identity, hbac]

    - name: "Remove stale groups from HBAC rules"
      ansible.builtin.command:
        argv: [ipa, hbacrule-remove-user, "{{ item.0.name }}", "--groups={{ item.1 }}"]
      loop: "{{ ipa_hbac_removals | default([]) | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> group {{ item.1 }}"
      register: ipa_hbac_rm_group
      changed_when: "'Number of members removed 1' in (ipa_hbac_rm_group.stdout | default(''))"
      failed_when:
        - ipa_hbac_rm_group.rc != 0
      tags: [identity, hbac]

    # Category flags are mutually exclusive with specific members at the
    # IPA API level (confirmed live: "host category cannot be set to 'all'
    # while there are allowed hosts") ŌĆö this MUST run after the removals
    # above (so a rule moving from hosts:[...] to hostcat:all has nothing
    # left attached) and before the "Attach ..." tasks below (so a rule
    # moving the other way has its category cleared before a specific
    # host/service can be attached). Always sends an explicit value
    # (category, or empty string to clear) rather than omitting the flag ŌĆö
    # unlike "Ensure HBAC rules exist" above, which only needs to set it
    # once at creation, this task's whole job is correcting drift on an
    # already-existing rule.
    - name: "Reconcile HBAC rule category attributes"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'hbacrule-mod', item.name,
              '--hostcat=' ~ ('' if (item.hostgroups is defined or item.hosts is defined) else (item.hostcat | default('all'))),
              '--servicecat=' ~ ('' if item.services is defined else (item.servicecat | default('all')))] }}
      loop: "{{ ipa_hbac_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hbacrule_mod
      changed_when: "'Modified HBAC rule' in (ipa_hbacrule_mod.stdout | default(''))"
      failed_when:
        - ipa_hbacrule_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_hbacrule_mod.stderr | default(''))"
      tags: [identity, hbac]

    - name: "Attach hostgroups to HBAC rules"
      ansible.builtin.command:
        argv:
          - ipa
          - hbacrule-add-host
          - "{{ item.0.name }}"
          - "--hostgroups={{ item.1 }}"
      loop: "{{ ipa_hbac_rules | subelements('hostgroups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} hostgroup {{ item.1 }}"
      register: ipa_hbac_hostgroup
      changed_when: "'Number of members added 1' in (ipa_hbac_hostgroup.stdout | default(''))"
      failed_when:
        - ipa_hbac_hostgroup.rc != 0
        - "'already a member' not in (ipa_hbac_hostgroup.stdout | default('') + ipa_hbac_hostgroup.stderr | default(''))"
      tags: [identity, hbac]

    - name: "Attach hosts to HBAC rules"
      ansible.builtin.command:
        argv:
          - ipa
          - hbacrule-add-host
          - "{{ item.0.name }}"
          - "--hosts={{ item.1 }}"
      loop: "{{ ipa_hbac_rules | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} host {{ item.1 }}"
      register: ipa_hbac_host
      changed_when: "'Number of members added 1' in (ipa_hbac_host.stdout | default(''))"
      failed_when:
        - ipa_hbac_host.rc != 0
        - "'already a member' not in (ipa_hbac_host.stdout | default('') + ipa_hbac_host.stderr | default(''))"
      tags: [identity, hbac]

    - name: "Attach services to HBAC rules"
      ansible.builtin.command:
        argv:
          - ipa
          - hbacrule-add-service
          - "{{ item.0.name }}"
          - "--hbacsvcs={{ item.1 }}"
      loop: "{{ ipa_hbac_rules | subelements('services', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} service {{ item.1 }}"
      register: ipa_hbac_service
      changed_when: "'Number of members added 1' in (ipa_hbac_service.stdout | default(''))"
      failed_when:
        - ipa_hbac_service.rc != 0
        - "'already a member' not in (ipa_hbac_service.stdout | default('') + ipa_hbac_service.stderr | default(''))"
      tags: [identity, hbac]

    - name: "Attach users to HBAC rules"
      ansible.builtin.command:
        argv:
          - ipa
          - hbacrule-add-user
          - "{{ item.0.name }}"
          - "--users={{ item.1 }}"
      loop: "{{ ipa_hbac_rules | subelements('users', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} user {{ item.1 }}"
      register: ipa_hbac_user
      changed_when: "'Number of members added 1' in (ipa_hbac_user.stdout | default(''))"
      failed_when:
        - ipa_hbac_user.rc != 0
        - "'already a member' not in (ipa_hbac_user.stdout | default('') + ipa_hbac_user.stderr | default(''))"
      tags: [identity, hbac]

    - name: "Attach groups to HBAC rules"
      ansible.builtin.command:
        argv:
          - ipa
          - hbacrule-add-user
          - "{{ item.0.name }}"
          - "--groups={{ item.1 }}"
      loop: "{{ ipa_hbac_rules | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} group {{ item.1 }}"
      register: ipa_hbac_group
      changed_when: "'Number of members added 1' in (ipa_hbac_group.stdout | default(''))"
      failed_when:
        - ipa_hbac_group.rc != 0
        - "'already a member' not in (ipa_hbac_group.stdout | default(''))"
      tags: [identity, hbac]

    - name: "Disable the default allow_all HBAC rule"
      ansible.builtin.command: ipa hbacrule-disable allow_all
      when: ipa_hbac_disable_allow_all | bool
      register: ipa_hbac_disable
      changed_when: "'Disabled HBAC rule' in (ipa_hbac_disable.stdout | default(''))"
      failed_when:
        - ipa_hbac_disable.rc != 0
        - "'already disabled' not in (ipa_hbac_disable.stderr | default(''))"
      tags: [identity, hbac]

    # ŌöĆŌöĆ Sudo rules (what a logged-in user may run, and where) ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    # Catch the mutual-exclusivity mistake before it can silently happen
    # again: "Ensure sudo rules exist" below always prefers hosts/hostgroups
    # over hostcat, and allow_commands over cmdcat, with no warning if a
    # roster sets both ŌĆö exactly how runbook Real bug #15 (cmdcat silently
    # ignored) went unnoticed.
    - name: "Gate: sudo rule category vs specific-list fields are mutually exclusive"
      ansible.builtin.assert:
        that:
          - not (item.hostcat is defined and (item.hosts is defined or item.hostgroups is defined))
          - not (item.cmdcat is defined and item.allow_commands is defined)
        fail_msg: >-
          Sudo rule "{{ item.name }}" sets both a category field and a
          specific-list field for the same axis ŌĆö pick one. Either
          `hostcat: all` alone or `hosts:`/`hostgroups:` alone; either
          `cmdcat: all` alone or `allow_commands:` alone. Whichever one this
          task ignores is silent, not an error.
      loop: "{{ ipa_sudo_rules }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [always, identity, sudo]

    # A rule with no hosts/hostgroups defaults to hostcat=all (applies
    # everywhere); give it `hosts:`/`hostgroups:` to scope it to a subset.
    #
    # Commands follow the identical convention: a rule with no
    # `allow_commands:` defaults to cmdcat=all (matches ANY command) ŌĆö give
    # it `allow_commands:` to scope it to a specific set instead. `--cmdcat`
    # and individual sudoCmd members are mutually exclusive in FreeIPA
    # itself (same as hostcat vs. hosts/hostgroups), so this is only sent
    # when `allow_commands` is absent. `cmdcat: all` is accepted as an
    # explicit synonym for the same default, for rosters that prefer to say
    # so out loud. Before this, a roster that set `cmdcat: all` (expecting
    # hostcat-like behavior) was silently ignored ŌĆö the rule ended up with
    # NO command grant at all (deny-everything), since only `allow_commands`
    # was ever read (runbook Real bug #15).
    #
    # `runas_user`/`runasgroup` are the same "cat" convention again, but for
    # WHO the command may be run as: with neither set, FreeIPA's own default
    # is "root only". Give `runas_user: all` / `runasgroup: all` to allow
    # `sudo -u <anyone>` / `sudo -g <anygroup>` instead. Only the `all`
    # category value is handled ŌĆö a roster listing specific runas
    # users/groups is not yet supported (no roster here has needed it; add
    # `sudorule-add-runasuser`/`-add-runasgroup` tasks, mirroring "Attach
    # users to sudo rules" below, if that's ever needed). Before this, these
    # two fields were silently ignored entirely ŌĆö a roster author writing
    # `runas_user: all` got the unchanged "root only" default with no
    # indication the field did nothing (runbook Real bug #16).
    - name: "Ensure sudo rules exist"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'sudorule-add', item.name]
             + ([] if (item.hostgroups is defined or item.hosts is defined)
                else ['--hostcat=' ~ (item.hostcat | default('all'))])
             + ([] if item.allow_commands is defined
                else ['--cmdcat=' ~ (item.cmdcat | default('all'))])
             + ([] if (item.runas_user | default('') | string | lower != 'all')
                else ['--runasusercat=all'])
             + ([] if (item.runasgroup | default('') | string | lower != 'all')
                else ['--runasgroupcat=all']) }}
      loop: "{{ ipa_sudo_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_rule_add
      changed_when: "'Added Sudo Rule' in (ipa_rule_add.stdout | default(''))"
      failed_when:
        - ipa_rule_add.rc != 0
        - "'already exists' not in (ipa_rule_add.stderr | default(''))"
      tags: [identity, sudo]

    # `sudorule-add` above no-ops on "already exists" ŌĆö none of hostcat,
    # cmdcat, runasusercat/runasgroupcat, or attached
    # hosts/hostgroups/allow_commands/users/groups ever gets corrected by
    # editing the roster and rerunning without the lookup/remove/reconcile
    # trio below. Same FQDN-vs-short-name normalization concern as the
    # hostgroup membership task above.
    - name: "Look up current sudo rule attachments"
      ansible.builtin.command:
        argv: [ipa, sudorule-show, "{{ item.name }}", --all]
      loop: "{{ ipa_sudo_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_sudorule_show
      changed_when: false
      failed_when: false
      tags: [identity, sudo]

    # Scoped removal: only ever removes a host/hostgroup/command/user/group
    # that is BOTH currently attached to THIS rule AND absent from THIS
    # same rule's own roster lists ŌĆö never a blind sweep across rules.
    - name: "Compute sudo rule attachments to remove"
      ansible.builtin.set_fact:
        ipa_sudo_removals: >-
          {{ (ipa_sudo_removals | default([])) + [{
               'name': item.item.name,
               'hosts': (live_hosts | difference(roster_hosts)),
               'hostgroups': (live_hostgroups | difference(item.item.hostgroups | default([]))),
               'allow_commands': (live_cmds | difference(item.item.allow_commands | default([]))),
               'users': (live_users | difference(item.item.users | default([]))),
               'groups': (live_groups | difference(item.item.groups | default([]))),
          }] }}
      vars:
        stdout: "{{ item.stdout | default('') }}"
        hosts_line: "{{ ((stdout | regex_findall('^  Hosts: (.*)$', multiline=True)) + ['']) | first | trim }}"
        hostgroups_line: "{{ ((stdout | regex_findall('^  Host Groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        cmds_line: "{{ ((stdout | regex_findall('^  Sudo Allow Commands: (.*)$', multiline=True)) + ['']) | first | trim }}"
        users_line: "{{ ((stdout | regex_findall('^  Users: (.*)$', multiline=True)) + ['']) | first | trim }}"
        groups_line: "{{ ((stdout | regex_findall('^  User Groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        live_hosts_fqdn: "{{ [] if hosts_line == '' else hosts_line.split(', ') }}"
        live_hosts: "{{ live_hosts_fqdn | map('regex_replace', '\\..*$', '') | list }}"
        roster_hosts: "{{ (item.item.hosts | default([])) | map('regex_replace', '\\..*$', '') | list }}"
        live_hostgroups: "{{ [] if hostgroups_line == '' else hostgroups_line.split(', ') }}"
        live_cmds: "{{ [] if cmds_line == '' else cmds_line.split(', ') }}"
        live_users: "{{ [] if users_line == '' else users_line.split(', ') }}"
        live_groups: "{{ [] if groups_line == '' else groups_line.split(', ') }}"
      loop: "{{ ipa_sudorule_show.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when: not (item.skipped | default(false))
      tags: [identity, sudo]

    - name: "Remove stale hosts from sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-remove-host, "{{ item.0.name }}", "--hosts={{ item.1 }}"]
      loop: "{{ ipa_sudo_removals | default([]) | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> host {{ item.1 }}"
      register: ipa_sudo_rm_host
      changed_when: "'Number of members removed 1' in (ipa_sudo_rm_host.stdout | default(''))"
      failed_when:
        - ipa_sudo_rm_host.rc != 0
      tags: [identity, sudo]

    - name: "Remove stale hostgroups from sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-remove-host, "{{ item.0.name }}", "--hostgroups={{ item.1 }}"]
      loop: "{{ ipa_sudo_removals | default([]) | subelements('hostgroups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> hostgroup {{ item.1 }}"
      register: ipa_sudo_rm_hostgroup
      changed_when: "'Number of members removed 1' in (ipa_sudo_rm_hostgroup.stdout | default(''))"
      failed_when:
        - ipa_sudo_rm_hostgroup.rc != 0
      tags: [identity, sudo]

    - name: "Remove stale allow_commands from sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-remove-allow-command, "{{ item.0.name }}", "--sudocmds={{ item.1 }}"]
      loop: "{{ ipa_sudo_removals | default([]) | subelements('allow_commands', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> command {{ item.1 }}"
      register: ipa_sudo_rm_cmd
      changed_when: "'Number of members removed 1' in (ipa_sudo_rm_cmd.stdout | default(''))"
      failed_when:
        - ipa_sudo_rm_cmd.rc != 0
      tags: [identity, sudo]

    - name: "Remove stale users from sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-remove-user, "{{ item.0.name }}", "--users={{ item.1 }}"]
      loop: "{{ ipa_sudo_removals | default([]) | subelements('users', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> user {{ item.1 }}"
      register: ipa_sudo_rm_user
      changed_when: "'Number of members removed 1' in (ipa_sudo_rm_user.stdout | default(''))"
      failed_when:
        - ipa_sudo_rm_user.rc != 0
      tags: [identity, sudo]

    - name: "Remove stale groups from sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-remove-user, "{{ item.0.name }}", "--groups={{ item.1 }}"]
      loop: "{{ ipa_sudo_removals | default([]) | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> group {{ item.1 }}"
      register: ipa_sudo_rm_group
      changed_when: "'Number of members removed 1' in (ipa_sudo_rm_group.stdout | default(''))"
      failed_when:
        - ipa_sudo_rm_group.rc != 0
      tags: [identity, sudo]

    # Category flags are mutually exclusive with specific members at the
    # IPA API level (confirmed live: "host category cannot be set to 'all'
    # while there are allowed hosts") ŌĆö this MUST run after the removals
    # above (so a rule moving from hosts:[...] to hostcat:all has nothing
    # left attached) and before the "Attach ..." tasks below (so a rule
    # moving the other way has its category cleared before a specific
    # host/command can be attached). Always sends an explicit value
    # (category, or empty string to clear) rather than omitting the flag ŌĆö
    # unlike "Ensure sudo rules exist" above, which only needs to set it
    # once at creation, this task's whole job is correcting drift on an
    # already-existing rule. `runas_user`/`runasgroup` only ever support
    # the `all` category (see the comment above "Ensure sudo rules exist")
    # so reconciling them is simpler: `all` or clear, never a specific list.
    - name: "Reconcile sudo rule category attributes"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'sudorule-mod', item.name,
              '--hostcat=' ~ ('' if (item.hostgroups is defined or item.hosts is defined) else (item.hostcat | default('all'))),
              '--cmdcat=' ~ ('' if item.allow_commands is defined else (item.cmdcat | default('all'))),
              '--runasusercat=' ~ ('all' if (item.runas_user | default('') | string | lower == 'all') else ''),
              '--runasgroupcat=' ~ ('all' if (item.runasgroup | default('') | string | lower == 'all') else '')] }}
      loop: "{{ ipa_sudo_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_sudorule_mod
      changed_when: "'Modified Sudo Rule' in (ipa_sudorule_mod.stdout | default(''))"
      failed_when:
        - ipa_sudorule_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_sudorule_mod.stderr | default(''))"
      tags: [identity, sudo]

    # sudorule-add-allow-command requires the command to already exist as a
    # sudoCommand LDAP object ŌĆö without this, a rule that *looks* correct
    # (sudorule-show lists the command) still denies at runtime because
    # SSSD's sudo provider finds no matching sudoCommand object. Idempotent:
    # already-exists is not an error. (See freeipa-audit-demo-gotchas.)
    - name: "Ensure sudo command objects exist"
      ansible.builtin.command:
        argv:
          - ipa
          - sudocmd-add
          - "{{ item }}"
      loop: "{{ ipa_sudo_rules | selectattr('allow_commands', 'defined') | map(attribute='allow_commands') | list | flatten | unique }}"
      loop_control:
        label: "{{ item }}"
      register: ipa_sudocmd_add
      changed_when: "'Added Sudo Command' in (ipa_sudocmd_add.stdout | default(''))"
      failed_when:
        - ipa_sudocmd_add.rc != 0
        - "'already exists' not in (ipa_sudocmd_add.stderr | default(''))"
      tags: [identity, sudo]

    - name: "Attach allowed commands to sudo rules"
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-allow-command
          - "{{ item.0.name }}"
          - "--sudocmds={{ item.1 }}"
      loop: "{{ ipa_sudo_rules | subelements('allow_commands', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} allow {{ item.1 }}"
      register: ipa_allow_cmd
      changed_when: "'Number of members added 1' in (ipa_allow_cmd.stdout | default(''))"
      # sudorule-add-allow-command's no-op case is unlike the other
      # "-add-member"-style attach tasks in this file: it returns rc=1 with
      # "Number of members added 0" rather than rc=0 + "already a member"
      # (confirmed 2026-07-03; matches the same quirk in freeipa-audit-demo.yml).
      failed_when:
        - ipa_allow_cmd.rc != 0
        - "'already a member' not in (ipa_allow_cmd.stdout | default('') + ipa_allow_cmd.stderr | default(''))"
        - "'Number of members added 0' not in (ipa_allow_cmd.stdout | default(''))"
      tags: [identity, sudo]

    - name: "Attach users to sudo rules"
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-user
          - "{{ item.0.name }}"
          - "--users={{ item.1 }}"
      loop: "{{ ipa_sudo_rules | subelements('users', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} user {{ item.1 }}"
      register: ipa_rule_user
      changed_when: "'Number of members added 1' in (ipa_rule_user.stdout | default(''))"
      failed_when:
        - ipa_rule_user.rc != 0
        - "'already a member' not in (ipa_rule_user.stdout | default(''))"
      tags: [identity, sudo]

    - name: "Attach groups to sudo rules"
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-user
          - "{{ item.0.name }}"
          - "--groups={{ item.1 }}"
      loop: "{{ ipa_sudo_rules | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} group {{ item.1 }}"
      register: ipa_rule_group
      changed_when: "'Number of members added 1' in (ipa_rule_group.stdout | default(''))"
      failed_when:
        - ipa_rule_group.rc != 0
        - "'already a member' not in (ipa_rule_group.stdout | default(''))"
      tags: [identity, sudo]

    - name: "Attach hostgroups to sudo rules"
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-host
          - "{{ item.0.name }}"
          - "--hostgroups={{ item.1 }}"
      loop: "{{ ipa_sudo_rules | subelements('hostgroups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} hostgroup {{ item.1 }}"
      register: ipa_rule_hostgroup
      changed_when: "'Number of members added 1' in (ipa_rule_hostgroup.stdout | default(''))"
      failed_when:
        - ipa_rule_hostgroup.rc != 0
        - "'already a member' not in (ipa_rule_hostgroup.stdout | default('') + ipa_rule_hostgroup.stderr | default(''))"
      tags: [identity, sudo]

    - name: "Attach hosts to sudo rules"
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-host
          - "{{ item.0.name }}"
          - "--hosts={{ item.1 }}"
      loop: "{{ ipa_sudo_rules | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} host {{ item.1 }}"
      register: ipa_rule_host
      changed_when: "'Number of members added 1' in (ipa_rule_host.stdout | default(''))"
      failed_when:
        - ipa_rule_host.rc != 0
        - "'already a member' not in (ipa_rule_host.stdout | default('') + ipa_rule_host.stderr | default(''))"
      tags: [identity, sudo]

    # ŌöĆŌöĆ Release ticket ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    - name: "Release the Kerberos ticket"
      ansible.builtin.command: kdestroy
      changed_when: false
      failed_when: false
      tags: [identity]
