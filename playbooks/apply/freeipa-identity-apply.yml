# Apply playbook: FreeIPA identity & authorization management (DATA-DRIVEN)
#
# This playbook contains NO user names, group names, or sudo rules of its own.
# It is a generic reconciler that loops over lists supplied at runtime:
#
#   ipa_users        — accounts to ensure exist (+ optional group membership)
#   ipa_groups       — groups to ensure exist
#   ipa_hostgroups   — host groups to ensure exist (+ member hosts)
#   ipa_hbac_rules   — HBAC rules: who may LOG IN to which host(s)/service(s)
#   ipa_sudo_rules   — sudo rules: what a logged-in user may run, and where
#
# Per-host authorization = two layers, both host-scoped via ipa_hostgroups:
#   HBAC   gates login itself (SSH/PAM). Without an explicit HBAC rule, IPA's
#          shipped "allow_all" rule lets every enrolled user log in to every
#          enrolled host — set ipa_hbac_disable_allow_all: true once your own
#          HBAC rules cover the access you want, or narrow rules are moot.
#   sudo   gates what an already-logged-in user may run as root. A sudo rule
#          with no hosts/hostgroups defaults to hostcat=all (applies
#          everywhere); give it `hosts:` or `hostgroups:` to scope it.
#
# WHY THIS SHAPE — secrets & roster stay OUT of git:
#   The *logic* (how to create a user / attach a sudo rule) lives here in git.
#   The *data* (who the users are, their initial passwords, what each rule
#   grants) lives in an ansible-vault-encrypted roster OUTSIDE the repo, e.g.
#   ~/.vault/ipa-identity.yaml, and is injected with `-e @<file>`. Anyone who
#   clones this repo gets the reconciler but none of your real accounts.
#   See playbooks/apply/freeipa-identity.roster.example.yaml for the schema.
#
# Idempotency: every task treats "already exists / already a member" as a
# no-op (changed_when/failed_when mirror freeipa-server-apply.yml). Passwords
# are set unconditionally when set at all (IPA has no "read" to diff
# against) but no_log keeps them out of Ansible output. `force_password`
# defaults to false — a user's `password:` is only applied when that user
# also has `force_password: true` — so a routine rerun never silently resets
# an already-onboarded user's password back to a forced-change state. Set
# force_password: true for a first-time onboard, or for a deliberate reset.
#
# Usage (against a pilot vm-target that hosts the IPA server in group `all`):
#
#   pilot vm-target run --name alma-vm \
#       playbooks/apply/freeipa-identity-apply.yml \
#       -e target_group=all \
#       -e @~/.vault/ipa-identity.yaml \
#       --vault-password-file ~/.vault/vault-pass
#
#   # or straight ansible-playbook against a real inventory:
#   ansible-playbook -i inventory-freeipa.yaml \
#       playbooks/apply/freeipa-identity-apply.yml \
#       -e @~/.vault/ipa-identity.yaml --ask-vault-pass --check --diff
#
# The roster file (~/.vault/ipa-identity.yaml) MUST also define ipa_admin_password.
#
# Stage gating (same convention as freeipa-server-apply.yml):
#   sandbox  default; runs immediately
#   staging  requires -e confirm_staging=true
#   prod     requires -e confirm_prod=true AND staging_attested_within_hours<=168
---
- name: FreeIPA identity & authorization apply
  hosts: "{{ target_group | default('freeipa-server') }}"
  become: false
  gather_facts: false
  vars:
    stage: sandbox
    confirm_staging: false
    confirm_prod: false
    staging_attested_within_hours: 168

    ipa_domain: ipa.pilot.internal
    ipa_realm: "{{ ipa_domain | upper }}"
    identity_hbac_test_host: "{{ ipa_server_fqdn | default(inventory_hostname) }}"

    # Data lists default to empty so a partial roster (e.g. only users, no
    # sudo rules) is valid and each block below simply skips.
    ipa_users: []
    ipa_groups: []
    ipa_hostgroups: []
    ipa_hbac_rules: []
    ipa_sudo_rules: []

    # Canonical roster schema (schema_version: 1).  The legacy ipa_* lists
    # above remain accepted during the compatibility window, but a roster may
    # not mix both models.  Canonical input is normalized before kinit so all
    # validation fails before mutation.
    freeipa_roster: {}

    # Once your own ipa_hbac_rules cover the access you want, set this true
    # to disable IPA's shipped "allow_all" rule — otherwise it keeps granting
    # every user login to every host regardless of the rules above.
    ipa_hbac_disable_allow_all: false

  pre_tasks:
    - name: "Load canonical roster under a namespace"
      ansible.builtin.include_vars:
        file: "{{ freeipa_roster_file }}"
        name: freeipa_roster
      when: freeipa_roster_file is defined
      no_log: true
      tags: [always]

    - name: "Gate: canonical roster version and legacy fields are mutually exclusive"
      ansible.builtin.assert:
        that:
          - freeipa_roster.schema_version | int == 1
          - ipa_users | length == 0
          - ipa_groups | length == 0
          - ipa_hostgroups | length == 0
          - ipa_hbac_rules | length == 0
          - ipa_sudo_rules | length == 0
        fail_msg: >-
          Canonical rosters require schema_version: 1 and must not mix users/
          groups/hostgroups/hbac/sudo with legacy ipa_* lists.
      when: freeipa_roster.schema_version is defined
      tags: [always]

    - name: "Gate: canonical top-level and FreeIPA keys are known"
      ansible.builtin.assert:
        that:
          - >-
            (freeipa_roster.keys() | list | difference([
              'schema_version', 'freeipa', 'users', 'groups', 'hosts',
              'hostgroups', 'hbac', 'sudo', 'nfs', 'nfs_clients',
              'migration', 'policy_exceptions'
            ])) | length == 0
          - >-
            ((freeipa_roster.freeipa | default({})).keys() | list |
             difference(['domain', 'realm', 'server', 'admin', 'defaults', 'safety'])) | length == 0
          - >-
            (((freeipa_roster.freeipa | default({})).admin | default({})).keys() | list |
             difference(['principal', 'password'])) | length == 0
        fail_msg: "Canonical roster contains an unknown freeipa/admin field."
      when: freeipa_roster.schema_version is defined
      tags: [always]

    - name: "Gate: canonical migration remains a dedicated fail-closed workflow"
      ansible.builtin.assert:
        that:
          - freeipa_roster.migration | default({}) | length == 0
        fail_msg: >-
          Migration remains fail-closed until its dedicated delivery batch.
          Canonical nfs_clients entries are accepted here but reconciled only
          by freeipa-nfs-client-apply.yml.
      when: freeipa_roster.schema_version is defined
      tags: [always]

    - name: "Gate: canonical user objects are structurally valid"
      ansible.builtin.assert:
        that:
          - item.name is match('^[a-z_][a-z0-9_.-]*$')
          - item.state | default('present') in ['present', 'disabled', 'absent']
          - >-
            (item.keys() | list | difference([
              'name', 'state', 'first', 'last', 'display_name', 'email',
              'uid', 'gid', 'login_shell', 'home_directory', 'password',
              'ssh_keys', 'enabled'
            ])) | length == 0
          - >-
            ((item.password | default({})).keys() | list |
             difference(['initial', 'force_change', 'preserve_existing'])) | length == 0
          - >-
            ((item.ssh_keys | default({})).keys() | list |
             difference(['authoritative', 'values'])) | length == 0
          - (item.ssh_keys | default({})).authoritative | default(true) | bool
          - item.state | default('present') != 'disabled' or not (item.enabled | default(false) | bool)
        fail_msg: "Invalid or unknown field in canonical user {{ item.name | default('unnamed') }}."
      loop: "{{ freeipa_roster.users | default([]) }}"
      loop_control:
        label: "{{ item.name | default('unnamed') }}"
      when: freeipa_roster.schema_version is defined
      no_log: true
      tags: [always]

    - name: "Gate: canonical group objects and category prefixes are valid"
      ansible.builtin.assert:
        that:
          - item.state | default('present') in ['present', 'absent']
          - item.category in ['team', 'filesystem', 'access', 'role']
          - item.type | default('posix') in ['posix', 'nonposix', 'external']
          - >-
            (item.keys() | list | difference([
              'name', 'state', 'category', 'type', 'description', 'gid', 'membership'
            ])) | length == 0
          - >-
            ((item.membership | default({})).keys() | list |
             difference(['authoritative', 'users', 'groups'])) | length == 0
          - >-
            (item.category != 'team' or item.name is match('^team-')) and
            (item.category != 'filesystem' or item.name is match('^data-')) and
            (item.category != 'access' or item.name is match('^access-')) and
            (item.category != 'role' or item.name is match('^role-'))
          - item.name not in ((item.membership | default({})).groups | default([]))
        fail_msg: "Invalid canonical group {{ item.name | default('unnamed') }} or category prefix."
      loop: "{{ freeipa_roster.groups | default([]) }}"
      loop_control:
        label: "{{ item.name | default('unnamed') }}"
      when: freeipa_roster.schema_version is defined
      tags: [always]

    - name: "Gate: canonical host objects use FQDN and valid state"
      ansible.builtin.assert:
        that:
          - item.name is match('^[^.]+\\.[^.]+\\..+$')
          - item.state | default('present') in ['present', 'absent']
          - item.ip_address is match('^[0-9]{1,3}(\\.[0-9]{1,3}){3}$')
          - item.keys() | list | difference(['name', 'state', 'ip_address', 'description']) | length == 0
        fail_msg: "Invalid canonical host {{ item.name | default('unnamed') }}."
      loop: "{{ freeipa_roster.hosts | default([]) }}"
      when: freeipa_roster.schema_version is defined
      tags: [always, C13]

    - name: "Gate: canonical names and direct references are unique and resolvable"
      ansible.builtin.assert:
        that:
          - freeipa_roster.users | default([]) | map(attribute='name') | list | unique | length == freeipa_roster.users | default([]) | length
          - freeipa_roster.groups | default([]) | map(attribute='name') | list | unique | length == freeipa_roster.groups | default([]) | length
          - >-
            freeipa_roster.groups | default([]) | map(attribute='membership') | select('defined') |
            map(attribute='users') | select('defined') | flatten |
            difference(freeipa_roster.users | default([]) | map(attribute='name') | list) | length == 0
          - >-
            freeipa_roster.groups | default([]) | map(attribute='membership') | select('defined') |
            map(attribute='groups') | select('defined') | flatten |
            difference(freeipa_roster.groups | default([]) | map(attribute='name') | list) | length == 0
        fail_msg: "Canonical roster has duplicate names or an unresolved user/group reference."
      when: freeipa_roster.schema_version is defined
      tags: [always]

    - name: "Gate: canonical HBAC rules are safe and references are resolvable"
      ansible.builtin.assert:
        that:
          - item.state | default('present') in ['present', 'absent']
          - item.subjects.users | default([]) | length + item.subjects.groups | default([]) | length > 0
          - item.targets.hostcat | default('') == 'all' or item.targets.hosts | default([]) | length + item.targets.hostgroups | default([]) | length > 0
          - >-
            not (item.targets.hostcat | default('') == 'all' and
            (item.targets.hosts | default([]) | length +
             item.targets.hostgroups | default([]) | length > 0))
          - item.services | default([]) | length > 0
          - >-
            item.subjects.groups | default([]) |
            difference(freeipa_roster.groups | default([]) |
            selectattr('category', 'equalto', 'access') |
            map(attribute='name') | list) | length == 0
          - item.subjects.users | default([]) | difference((freeipa_roster.users | default([]) | map(attribute='name') | list) + ['admin']) | length == 0
          - item.targets.hostgroups | default([]) | difference(freeipa_roster.hostgroups | default([]) | map(attribute='name') | list) | length == 0
        fail_msg: "Unsafe or unresolved canonical HBAC rule {{ item.name | default('unnamed') }}."
      loop: "{{ (freeipa_roster.hbac | default({})).rules | default([]) }}"
      loop_control:
        label: "{{ item.name | default('unnamed') }}"
      when: freeipa_roster.schema_version is defined
      tags: [always, C13, C14]

    - name: "Gate: canonical sudo rules and commands are safe"
      ansible.builtin.assert:
        that:
          - item.state | default('present') in ['present', 'absent']
          - item.subjects.users | default([]) | length + item.subjects.groups | default([]) | length > 0
          - >-
            item.subjects.groups | default([]) |
            difference(freeipa_roster.groups | default([]) |
            selectattr('category', 'equalto', 'role') |
            map(attribute='name') | list) | length == 0
          - item.targets.hostcat | default('') == 'all' or item.targets.hosts | default([]) | length + item.targets.hostgroups | default([]) | length > 0
          - >-
            not (item.targets.hostcat | default('') == 'all' and
            (item.targets.hosts | default([]) | length +
             item.targets.hostgroups | default([]) | length > 0))
        fail_msg: "Unsafe or unresolved canonical sudo rule {{ item.name | default('unnamed') }}."
      loop: "{{ (freeipa_roster.sudo | default({})).rules | default([]) }}"
      loop_control:
        label: "{{ item.name | default('unnamed') }}"
      when: freeipa_roster.schema_version is defined
      tags: [always, C16, C17]

    - name: "Gate: canonical sudo commands exclude shell escape primitives"
      ansible.builtin.assert:
        that:
          - item is not match('^/(bin|usr/bin)/(bash|sh|su|sudo|env|python[^ /]*|perl|vim|less)$')
          - item is not search('[*?;|`$<>]')
        fail_msg: "Unsafe canonical sudo command: {{ item }}"
      loop: >-
        {{ (((freeipa_roster.sudo | default({})).command_groups | default([]) |
             map(attribute='commands') | select('defined') | flatten) +
            ((freeipa_roster.sudo | default({})).rules | default([]) |
             map(attribute='allow') | select('defined') | map(attribute='commands') |
             select('defined') | flatten)) | unique }}
      when: freeipa_roster.schema_version is defined
      tags: [always, C15, C16]

    - name: "Normalize canonical FreeIPA settings"
      ansible.builtin.set_fact:
        ipa_domain: "{{ freeipa_roster.freeipa.domain | default('ipa.pilot.internal') }}"
        ipa_realm: "{{ freeipa_roster.freeipa.realm | default(freeipa_roster.freeipa.domain | default('ipa.pilot.internal') | upper) }}"
        identity_admin_principal: "{{ freeipa_roster.freeipa.admin.principal | default('admin') }}"
        identity_admin_password: "{{ freeipa_roster.freeipa.admin.password }}"
        identity_hbac_test_host: "{{ freeipa_roster.freeipa.server }}"
        ipa_users: []
        ipa_groups: []
        ipa_hostgroups: []
        ipa_hbac_rules: []
        ipa_sudo_rules: []
        ipa_hbac_services: "{{ (freeipa_roster.hbac | default({})).services | default([]) }}"
        ipa_sudo_command_groups: "{{ (freeipa_roster.sudo | default({})).command_groups | default([]) }}"
        ipa_hbac_disable_allow_all: "{{ (freeipa_roster.hbac | default({})).disable_allow_all | default(false) }}"
      when: freeipa_roster.schema_version is defined
      no_log: true
      tags: [always]

    - name: "Normalize canonical users for the compatibility reconciler"
      ansible.builtin.set_fact:
        ipa_users: >-
          {{ ipa_users + [{
            'name': item.name,
            'state': item.state | default('present'),
            'first': item.first | default(item.name),
            'last': item.last | default(item.name),
            'display_name': item.display_name | default(none),
            'email': item.email | default(none),
            'uid': item.uid | default(none),
            'gid': item.gid | default(none),
            'login_shell': item.login_shell | default('/bin/bash'),
            'home_directory': item.home_directory | default('/home/' + item.name),
            'enabled': item.enabled | default(item.state | default('present') != 'disabled'),
            'password': (item.password | default({})).initial | default(none),
            'force_password': (item.password | default({})).force_change | default(false),
            'preserve_existing': (item.password | default({})).preserve_existing | default(true),
            'ssh_keys': (item.ssh_keys | default({}))['values'] | default(none)
          }] }}
      loop: "{{ freeipa_roster.users | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when: freeipa_roster.schema_version is defined
      no_log: true
      tags: [always]

    - name: "Normalize canonical groups for the compatibility reconciler"
      ansible.builtin.set_fact:
        ipa_groups: >-
          {{ ipa_groups + [{
            'name': item.name,
            'state': item.state | default('present'),
            'desc': item.description | default(item.name),
            'type': item.type | default('posix'),
            'gid': item.gid | default(none),
            'membership': item.membership | default({})
          }] }}
      loop: "{{ freeipa_roster.groups | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when: freeipa_roster.schema_version is defined
      tags: [always]

    - name: "Normalize canonical hostgroups for the compatibility reconciler"
      ansible.builtin.set_fact:
        ipa_hostgroups: >-
          {{ ipa_hostgroups + [{
            'name': item.name,
            'desc': item.description | default(item.name),
            'hosts': (item.membership | default({})).hosts | default([])
          }] }}
      loop: "{{ freeipa_roster.hostgroups | default([]) }}"
      when:
        - freeipa_roster.schema_version is defined
        - item.state | default('present') == 'present'
      tags: [always, C13]

    - name: "Normalize canonical HBAC rules for the compatibility reconciler"
      ansible.builtin.set_fact:
        ipa_hbac_rules: >-
          {{ ipa_hbac_rules + [({
            'name': item.name,
            'users': item.subjects.users | default([]),
            'groups': item.subjects.groups | default([]),
            'services': item.services,
            'enabled': item.enabled | default(true)
          } | combine(
            {'hosts': item.targets.hosts | default([]),
             'hostgroups': item.targets.hostgroups | default([])}
            if (item.targets.hosts | default([]) | length +
                item.targets.hostgroups | default([]) | length > 0)
            else {'hostcat': item.targets.hostcat | default('all')}
          ))] }}
      loop: "{{ (freeipa_roster.hbac | default({})).rules | default([]) }}"
      when:
        - freeipa_roster.schema_version is defined
        - item.state | default('present') == 'present'
      tags: [always, C13, C14]

    - name: "Normalize canonical sudo rules for the compatibility reconciler"
      ansible.builtin.set_fact:
        ipa_sudo_rules: >-
          {{ ipa_sudo_rules + [({
            'name': item.name,
            'users': item.subjects.users | default([]),
            'groups': item.subjects.groups | default([]),
            'allow_commands': (item.allow | default({})).commands | default([]),
            'allow_command_groups': (item.allow | default({})).command_groups | default([]),
            'deny_commands': (item.deny | default({})).commands | default([]),
            'deny_command_groups': (item.deny | default({})).command_groups | default([]),
            'runas_users': (item.run_as | default({})).users | default(['root']),
            'runas_groups': (item.run_as | default({})).groups | default([]),
            'options': item.options | default([]),
            'enabled': item.enabled | default(true)
          } | combine(
            {'hosts': item.targets.hosts | default([]),
             'hostgroups': item.targets.hostgroups | default([])}
            if (item.targets.hosts | default([]) | length +
                item.targets.hostgroups | default([]) | length > 0)
            else {'hostcat': item.targets.hostcat | default('all')}
          ))] }}
      loop: "{{ (freeipa_roster.sudo | default({})).rules | default([]) }}"
      when:
        - freeipa_roster.schema_version is defined
        - item.state | default('present') == 'present'
      tags: [always, C15, C16, C17]

    - name: "Select legacy admin settings"
      ansible.builtin.set_fact:
        identity_admin_principal: admin
        identity_admin_password: "{{ ipa_admin_password }}"
      when: freeipa_roster.schema_version is not defined
      no_log: true
      tags: [always]

    - name: "Select active identity objects"
      ansible.builtin.set_fact:
        ipa_active_users: >-
          {{ (ipa_users | rejectattr('state', 'defined') | list)
             + (ipa_users | selectattr('state', 'defined') |
                rejectattr('state', 'equalto', 'absent') | list) }}
        ipa_active_groups: >-
          {{ (ipa_groups | rejectattr('state', 'defined') | list)
             + (ipa_groups | selectattr('state', 'defined') |
                rejectattr('state', 'equalto', 'absent') | list) }}
      tags: [always]

    - name: "Gate: admin credential present (fail early, before any mutation)"
      ansible.builtin.assert:
        that:
          - identity_admin_password is defined and identity_admin_password | length >= 8
        fail_msg: >-
          Missing ipa_admin_password. Pass an ansible-vault roster with the
          admin credential, e.g. -e @~/.vault/ipa-identity.yaml
      tags: [always]

    - name: "Gate: roster supplies at least one data list (catches the wrong -e file)"
      ansible.builtin.assert:
        that:
          - (ipa_users | length > 0)
            or (ipa_groups | length > 0)
            or (ipa_hostgroups | length > 0)
            or (ipa_hbac_rules | length > 0)
            or (ipa_sudo_rules | length > 0)
        fail_msg: >-
          ipa_users/ipa_groups/ipa_hostgroups/ipa_hbac_rules/ipa_sudo_rules
          are all empty, so this apply would do nothing but still report
          success (every loop below simply skips). This is virtually always
          a sign the wrong -e file was passed — e.g. a group_vars file that
          only sets ipa_admin_password, instead of the roster
          (playbooks/apply/freeipa-identity.roster.example.yaml's schema)
          that actually declares users/groups/rules. A partial roster
          (e.g. only ipa_users, nothing else) is fine and stays past this
          gate — only a completely empty one is rejected.
      tags: [always]

    - name: "Gate: staging or prod requires explicit confirm"
      ansible.builtin.assert:
        that:
          - (stage == 'sandbox') or
            (stage == 'staging' and confirm_staging | bool) or
            (stage == 'prod' and confirm_prod | bool)
        fail_msg: "stage={{ stage }} requires confirm flag. Pass -e confirm_staging=true or confirm_prod=true."
      tags: [always]

    - name: "Gate: stage must match this host's inventory environment group"
      ansible.builtin.assert:
        that:
          - not ('prod' in group_names and stage != 'prod')
          - not ('staging' in group_names and stage != 'staging')
          - not (stage in ['staging', 'prod'] and stage not in group_names)
        fail_msg: >-
          stage={{ stage }} 與 {{ inventory_hostname }} 的 inventory 環境 group 不一致
          (group_names: {{ group_names }})。inventory 的 staging/prod group 只是給
          target_group 篩選用的標籤,不會自動決定 stage——必須自己帶對的 -e stage=,
          且要跟這台機器所屬的環境 group 一致。
      tags: [always]

    - name: "Gate: prod requires recent staging attestation"
      ansible.builtin.assert:
        that:
          - (staging_attested_within_hours | int) <= 168
        fail_msg: "prod gate: staging attestation missing or older than 168h."
      when: stage == 'prod'
      tags: [always]

  tasks:
    # ── Admin authentication ───────────────────────────────────────────
    - name: "Kinit admin"
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          printf %s "{{ identity_admin_password }}" | kinit {{ identity_admin_principal }}@{{ ipa_realm }}
        executable: /bin/bash
      changed_when: false
      no_log: true
      tags: [identity]

    # ── Groups ─────────────────────────────────────────────────────────
    - name: "Ensure IPA groups exist"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'group-add', item.name,
              '--desc=' ~ (item.desc | default(item.name))]
             + (['--nonposix'] if item.type | default('posix') == 'nonposix' else [])
             + (['--external'] if item.type | default('posix') == 'external' else [])
             + ([] if item.gid is not defined or item.gid is none
                else ['--gid=' ~ (item.gid | string)]) }}
      loop: "{{ ipa_active_groups }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_group_add
      changed_when: "'Added group' in (ipa_group_add.stdout | default(''))"
      failed_when:
        - ipa_group_add.rc != 0
        - "'already exists' not in (ipa_group_add.stderr | default(''))"
      tags: [identity, groups, C11, C12]

    # `group-add` above no-ops on "already exists" — an already-created
    # group's own `desc` never gets corrected by editing the roster and
    # rerunning without this. Unconditional declarative reconcile, same
    # idiom as the SSH-key task below.
    - name: "Reconcile IPA group descriptions"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'group-mod', item.name,
              '--desc=' ~ (item.desc | default(item.name))]
             + ([] if item.gid is not defined or item.gid is none
                else ['--gid=' ~ (item.gid | string)]) }}
      loop: "{{ ipa_active_groups }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_group_mod
      changed_when: "'Modified group' in (ipa_group_mod.stdout | default(''))"
      failed_when:
        - ipa_group_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_group_mod.stderr | default(''))"
      tags: [identity, groups, C11, C12]

    # ── Users ──────────────────────────────────────────────────────────
    - name: "Ensure IPA users exist"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'user-add', item.name,
              '--first=' ~ (item.first | default(item.name)),
              '--last=' ~ (item.last | default(item.name))]
             + ([] if item.display_name is not defined or item.display_name is none
                else ['--displayname=' ~ item.display_name])
             + ([] if item.email is not defined or item.email is none
                else ['--email=' ~ item.email])
             + ([] if item.uid is not defined or item.uid is none
                else ['--uid=' ~ (item.uid | string)])
             + ([] if item.gid is not defined or item.gid is none
                else ['--gidnumber=' ~ (item.gid | string)])
             + ([] if item.login_shell is not defined or item.login_shell is none
                else ['--shell=' ~ item.login_shell])
             + ([] if item.home_directory is not defined or item.home_directory is none
                else ['--homedir=' ~ item.home_directory]) }}
      loop: "{{ ipa_active_users }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_user_add
      changed_when: "'Added user' in (ipa_user_add.stdout | default(''))"
      failed_when:
        - ipa_user_add.rc != 0
        - "'already exists' not in (ipa_user_add.stderr | default(''))"
      tags: [identity, users, C9, C10]

    # `user-add` above no-ops on "already exists" — an already-created
    # user's own `first`/`last` never gets corrected by editing the roster
    # and rerunning without this. Unconditional declarative reconcile, same
    # idiom as the SSH-key task below.
    - name: "Reconcile user first/last names"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'user-mod', item.name,
              '--first=' ~ (item.first | default(item.name)),
              '--last=' ~ (item.last | default(item.name))]
             + ([] if item.display_name is not defined or item.display_name is none
                else ['--displayname=' ~ item.display_name])
             + ([] if item.email is not defined or item.email is none
                else ['--email=' ~ item.email])
             + ([] if item.uid is not defined or item.uid is none
                else ['--uid=' ~ (item.uid | string)])
             + ([] if item.gid is not defined or item.gid is none
                else ['--gidnumber=' ~ (item.gid | string)])
             + ([] if item.login_shell is not defined or item.login_shell is none
                else ['--shell=' ~ item.login_shell])
             + ([] if item.home_directory is not defined or item.home_directory is none
                else ['--homedir=' ~ item.home_directory]) }}
      loop: "{{ ipa_active_users }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_user_mod
      changed_when: "'Modified user' in (ipa_user_mod.stdout | default(''))"
      failed_when:
        - ipa_user_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_user_mod.stderr | default(''))"
      tags: [identity, users, C9, C10]

    # Passwords are set unconditionally when run (no read-back to diff
    # against), and `ipa passwd` is an admin reset — it always re-arms
    # FreeIPA's forced-password-change flag regardless of whether the value
    # is unchanged. `force_password` therefore defaults to false: a user's
    # `password:` only actually gets applied when that user ALSO sets
    # `force_password: true` (first-time onboard, or a deliberate reset) —
    # a routine rerun of an already-onboarded roster no longer silently
    # resets everyone's password back to a forced-change state.
    #
    # That default flip alone still isn't enough for a roster entry that
    # deliberately KEEPS `force_password: true` set (e.g. to re-arm a test
    # scenario, or someone forgetting to flip it back after onboarding) —
    # every rerun would still stomp a password the user has since
    # personalized. FreeIPA exposes a reliable signal for "has this
    # account's password been changed by the user since the last admin
    # reset?": `krbLastPwdChange` vs `krbPasswordExpiration` (confirmed
    # live, 2026-07-16). Right after `ipa passwd` (admin reset) the two are
    # IDENTICAL — "must change immediately". Once the user completes their
    # own change (a real `kinit` + interactive forced-change prompt),
    # `krbPasswordExpiration` jumps ~90 days past `krbLastPwdChange` (per
    # password policy maxlife) — a real future gap only exists once the
    # change was genuinely the user's own. Both are fixed-width
    # `YYYYMMDDHHMMSSZ`, so plain string `<=`/`==` comparison is valid.
    # Looked up for every user with a password declared, not just
    # force_password: true ones — a brand-new roster entry that ships
    # with force_password: false (e.g. copied from an already-onboarded
    # steady-state roster) still needs this to detect "no Kerberos key
    # yet at all" below, otherwise a first-time-ever apply silently
    # creates the account with no usable password (see Real bugs table).
    - name: "Look up password-expiry state for users with a declared password"
      ansible.builtin.command:
        argv: [ipa, user-show, "{{ item.name }}", --all, --raw]
      loop: "{{ ipa_active_users | selectattr('password', 'defined') | rejectattr('password', 'none') | list }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_pwd_state
      changed_when: false
      failed_when: false
      no_log: true
      tags: [identity, users, passwords]

    # A brand-new user (first-time onboard) has no Kerberos key yet, so
    # neither attribute exists — that must mean "proceed," not "skip".
    - name: "Compute whether each force_password user still needs a reset"
      ansible.builtin.set_fact:
        ipa_pwd_needs_reset: "{{ ipa_pwd_needs_reset | default({}) | combine({item.item.name: item_needs_reset}) }}"
      vars:
        item_stdout: "{{ item.stdout | default('') }}"
        item_last_change: "{{ (item_stdout | regex_findall('krbLastPwdChange: (\\S+)') + ['']) | first }}"
        item_expiration: "{{ (item_stdout | regex_findall('krbPasswordExpiration: (\\S+)') + ['']) | first }}"
        item_needs_reset: "{{ item_last_change == '' or item_expiration <= item_last_change }}"
      loop: "{{ ipa_pwd_state.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when: not (item.skipped | default(false))
      tags: [identity, users, passwords]

    # Runs when the roster explicitly asks for it (force_password: true)
    # OR when the account genuinely has no Kerberos key yet at all (a
    # first-time onboard, regardless of what force_password says) — the
    # latter closes the gap where a steady-state roster's
    # force_password: false on a user being created for the very first
    # time would otherwise leave them with no usable password (see Real
    # bugs table).
    - name: "Set password for users that need one (forced, or first-time onboard)"
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          printf '%s\n%s\n' "{{ item.password }}" "{{ item.password }}" \
            | ipa passwd {{ item.name }}
        executable: /bin/bash
      loop: "{{ ipa_active_users | selectattr('password', 'defined') | rejectattr('password', 'none') | list }}"
      loop_control:
        label: "{{ item.name }}"
      when: >-
        (item.force_password | default(false) | bool)
        or ((ipa_pwd_needs_reset | default({})).get(item.name, true))
      register: ipa_passwd
      changed_when: ipa_passwd.rc == 0
      failed_when: false
      no_log: true
      tags: [identity, users, passwords]

    # SSH public keys are declarative: user-mod REPLACES the whole ipaSshPubKey
    # set with exactly the keys listed, so removing a key from the roster and
    # rerunning revokes it. Enrolled clients serve these via SSSD's
    # AuthorizedKeysCommand (sss_ssh_authorizedkeys), configured by
    # ipa-client-install — no per-host authorized_keys file needed.
    # Keys go through argv (not shell) so their spaces/base64 never hit a shell.
    - name: "Set SSH public keys for users (declarative replace)"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'user-mod', item.name]
             + (item.ssh_keys | map('regex_replace', '^(.*)$', '--sshpubkey=\1') | list) }}
      loop: "{{ ipa_active_users | selectattr('ssh_keys', 'defined') | rejectattr('ssh_keys', 'none') | list }}"
      loop_control:
        label: "{{ item.name }} ({{ item.ssh_keys | length }} key(s))"
      register: ipa_sshkey
      changed_when: "'Modified user' in (ipa_sshkey.stdout | default(''))"
      failed_when:
        - ipa_sshkey.rc != 0
        - "'no modifications to be performed' not in (ipa_sshkey.stderr | default(''))"
      tags: [identity, users, sshkeys]

    - name: "Ensure user group membership"
      ansible.builtin.command:
        argv:
          - ipa
          - group-add-member
          - "{{ item.1 }}"
          - "--users={{ item.0.name }}"
      loop: "{{ ipa_active_users | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -> {{ item.1 }}"
      register: ipa_grp_member
      changed_when: "'Number of members added 1' in (ipa_grp_member.stdout | default(''))"
      failed_when:
        - ipa_grp_member.rc != 0
        - "'already a member' not in (ipa_grp_member.stdout | default('') + ipa_grp_member.stderr | default(''))"
      when: freeipa_roster.schema_version is not defined
      tags: [identity, users, groups, C11]

    # `group-add-member` above only ever adds — a user removed from their
    # roster `groups:` list keeps stale membership forever without this.
    # Scoped ONLY to groups this roster itself declares (`ipa_groups`) —
    # `ipa user-show`'s "Member of groups:" line also lists IPA's own
    # `ipausers` (every user is auto-added to it), which must never be
    # touched since it isn't something any roster manages.
    - name: "Look up current user group memberships"
      ansible.builtin.command:
        argv: [ipa, user-show, "{{ item.name }}", --all]
      loop: "{{ ipa_active_users }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_user_show
      changed_when: false
      failed_when: false
      when: freeipa_roster.schema_version is not defined
      tags: [identity, users, groups]

    - name: "Compute stale group memberships to remove"
      ansible.builtin.set_fact:
        ipa_group_membership_removals: "{{ (ipa_group_membership_removals | default([])) + [{'name': item.item.name, 'groups': stale_groups}] }}"
      vars:
        managed_groups: "{{ ipa_active_groups | map(attribute='name') | list }}"
        live_line: "{{ ((item.stdout | default('') | regex_findall('^  Member of groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        live_groups: "{{ [] if live_line == '' else live_line.split(', ') }}"
        stale_groups: "{{ live_groups | intersect(managed_groups) | difference(item.item.groups | default([])) }}"
      loop: "{{ ipa_user_show.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when:
        - freeipa_roster.schema_version is not defined
        - not (item.skipped | default(false))
      tags: [identity, users, groups]

    - name: "Remove stale group memberships"
      ansible.builtin.command:
        argv:
          - ipa
          - group-remove-member
          - "{{ item.1 }}"
          - "--users={{ item.0.name }}"
      loop: "{{ ipa_group_membership_removals | default([]) | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> {{ item.1 }}"
      register: ipa_grp_removal
      changed_when: "'Number of members removed 1' in (ipa_grp_removal.stdout | default(''))"
      failed_when:
        - ipa_grp_removal.rc != 0
      when: freeipa_roster.schema_version is not defined
      tags: [identity, users, groups]

    - name: "Look up canonical group direct membership"
      ansible.builtin.command:
        argv: [ipa, group-show, "{{ item.name }}", --all]
      loop: "{{ ipa_active_groups }}"
      loop_control:
        label: "{{ item.name }}"
      register: canonical_group_show
      changed_when: false
      failed_when: false
      when: freeipa_roster.schema_version is defined
      tags: [identity, users, groups]

    - name: "Compute stale canonical group membership"
      ansible.builtin.set_fact:
        canonical_group_removals: >-
          {{ (canonical_group_removals | default([])) + [{
            'name': item.item.name,
            'users': live_users | difference(item.item.membership.users | default([])),
            'groups': live_groups | difference(item.item.membership.groups | default([]))
          }] }}
      vars:
        stdout: "{{ item.stdout | default('') }}"
        users_line: "{{ ((stdout | regex_findall('^  Member users: (.*)$', multiline=True)) + ['']) | first | trim }}"
        groups_line: "{{ ((stdout | regex_findall('^  Member groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        live_users: "{{ [] if users_line == '' else users_line.split(', ') }}"
        live_groups: "{{ [] if groups_line == '' else groups_line.split(', ') }}"
      loop: "{{ canonical_group_show.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when:
        - freeipa_roster.schema_version is defined
        - not (item.skipped | default(false))
        - (item.item.membership | default({})).authoritative | default(true) | bool
      tags: [identity, users, groups]

    - name: "Remove stale canonical direct users"
      ansible.builtin.command:
        argv: [ipa, group-remove-member, "{{ item.0.name }}", "--users={{ item.1 }}"]
      loop: "{{ canonical_group_removals | default([]) | subelements('users', skip_missing=True) }}"
      loop_control:
        label: "{{ item.1 }} -/-> {{ item.0.name }}"
      register: canonical_group_user_remove
      changed_when: "'Number of members removed 1' in (canonical_group_user_remove.stdout | default(''))"
      failed_when: canonical_group_user_remove.rc != 0
      when: freeipa_roster.schema_version is defined
      tags: [identity, users, groups]

    - name: "Remove stale canonical direct nested groups"
      ansible.builtin.command:
        argv: [ipa, group-remove-member, "{{ item.0.name }}", "--groups={{ item.1 }}"]
      loop: "{{ canonical_group_removals | default([]) | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.1 }} -/-> {{ item.0.name }}"
      register: canonical_nested_group_remove
      changed_when: "'Number of members removed 1' in (canonical_nested_group_remove.stdout | default(''))"
      failed_when: canonical_nested_group_remove.rc != 0
      when: freeipa_roster.schema_version is defined
      tags: [identity, groups, C12]

    - name: "Ensure canonical direct user membership"
      ansible.builtin.command:
        argv: [ipa, group-add-member, "{{ item.0.name }}", "--users={{ item.1 }}"]
      loop: "{{ ipa_active_groups | subelements('membership.users', skip_missing=True) }}"
      loop_control:
        label: "{{ item.1 }} -> {{ item.0.name }}"
      register: canonical_group_user_add
      changed_when: "'Number of members added 1' in (canonical_group_user_add.stdout | default(''))"
      failed_when:
        - canonical_group_user_add.rc != 0
        - "'already a member' not in (canonical_group_user_add.stdout | default('') + canonical_group_user_add.stderr | default(''))"
      when: freeipa_roster.schema_version is defined
      tags: [identity, users, groups]

    - name: "Ensure canonical direct nested-group membership"
      ansible.builtin.command:
        argv: [ipa, group-add-member, "{{ item.0.name }}", "--groups={{ item.1 }}"]
      loop: "{{ ipa_active_groups | subelements('membership.groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.1 }} -> {{ item.0.name }}"
      register: canonical_nested_group_add
      changed_when: "'Number of members added 1' in (canonical_nested_group_add.stdout | default(''))"
      failed_when:
        - canonical_nested_group_add.rc != 0
        - "'already a member' not in (canonical_nested_group_add.stdout | default('') + canonical_nested_group_add.stderr | default(''))"
      when: freeipa_roster.schema_version is defined
      tags: [identity, groups]

    - name: "Reconcile canonical account enabled state"
      ansible.builtin.command:
        argv: [ipa, "user-{{ 'enable' if item.enabled | default(true) | bool else 'disable' }}", "{{ item.name }}"]
      loop: "{{ ipa_active_users }}"
      loop_control:
        label: "{{ item.name }} enabled={{ item.enabled | default(true) }}"
      register: canonical_user_enabled
      changed_when: >-
        ('Enabled user account' in (canonical_user_enabled.stdout | default('')))
        or ('Disabled user account' in (canonical_user_enabled.stdout | default('')))
      failed_when:
        - canonical_user_enabled.rc != 0
        - "'already enabled' not in (canonical_user_enabled.stderr | default(''))"
        - "'already disabled' not in (canonical_user_enabled.stderr | default(''))"
      when: freeipa_roster.schema_version is defined
      tags: [identity, users, C10]

    - name: "Delete canonical users explicitly marked absent"
      ansible.builtin.command:
        argv: [ipa, user-del, "{{ item.name }}"]
      loop: "{{ ipa_users | selectattr('state', 'defined') | selectattr('state', 'equalto', 'absent') | list }}"
      loop_control:
        label: "{{ item.name }}"
      register: canonical_user_delete
      changed_when: "'Deleted user' in (canonical_user_delete.stdout | default(''))"
      failed_when:
        - canonical_user_delete.rc != 0
        - "'not found' not in (canonical_user_delete.stderr | default(''))"
      when: freeipa_roster.schema_version is defined
      tags: [identity, users]

    - name: "Delete canonical groups explicitly marked absent"
      ansible.builtin.command:
        argv: [ipa, group-del, "{{ item.name }}"]
      loop: "{{ ipa_groups | selectattr('state', 'defined') | selectattr('state', 'equalto', 'absent') | list }}"
      loop_control:
        label: "{{ item.name }}"
      register: canonical_group_delete
      changed_when: "'Deleted group' in (canonical_group_delete.stdout | default(''))"
      failed_when:
        - canonical_group_delete.rc != 0
        - "'not found' not in (canonical_group_delete.stderr | default(''))"
      when: freeipa_roster.schema_version is defined
      tags: [identity, groups]

    # ── Host groups ────────────────────────────────────────────────────
    # Groups of enrolled hosts (e.g. web-hosts, db-hosts) that HBAC rules and
    # sudo rules below can target instead of naming individual hosts.
    - name: "Look up canonical FreeIPA host objects"
      ansible.builtin.command:
        argv: [ipa, host-show, "{{ item.name }}"]
      loop: "{{ freeipa_roster.hosts | default([]) }}"
      register: ipa_canonical_host_show
      changed_when: false
      failed_when: false
      when:
        - freeipa_roster.schema_version is defined
        - item.state | default('present') == 'present'
      tags: [identity, hosts, C13]

    - name: "Ensure canonical FreeIPA host objects exist"
      ansible.builtin.command:
        argv: [ipa, host-add, "{{ item.name }}", "--ip-address={{ item.ip_address }}", "--desc={{ item.description | default(item.name) }}"]
      loop: "{{ freeipa_roster.hosts | default([]) }}"
      loop_control:
        index_var: ipa_canonical_host_index
      register: ipa_canonical_host_add
      changed_when: "'Added host' in (ipa_canonical_host_add.stdout | default(''))"
      failed_when:
        - ipa_canonical_host_add.rc != 0
        - "'already exists' not in (ipa_canonical_host_add.stderr | default(''))"
      when:
        - freeipa_roster.schema_version is defined
        - item.state | default('present') == 'present'
        - ipa_canonical_host_show.results[ipa_canonical_host_index].rc != 0
      tags: [identity, hosts, C13]

    - name: "Ensure canonical host DNS A records exist"
      ansible.builtin.command:
        argv:
          - ipa
          - dnsrecord-add
          - "{{ ipa_domain }}"
          - "{{ item.name | regex_replace('\\.' + (ipa_domain | regex_escape) + '$', '') }}"
          - "--a-rec={{ item.ip_address }}"
      loop: "{{ freeipa_roster.hosts | default([]) }}"
      register: ipa_canonical_host_dns
      changed_when: "'Added record' in (ipa_canonical_host_dns.stdout | default(''))"
      failed_when:
        - ipa_canonical_host_dns.rc != 0
        - "'already exists' not in (ipa_canonical_host_dns.stderr | default(''))"
        - "'no modifications to be performed' not in (ipa_canonical_host_dns.stderr | default(''))"
      when:
        - freeipa_roster.schema_version is defined
        - item.state | default('present') == 'present'
      tags: [identity, hosts, C13]

    - name: "Ensure IPA hostgroups exist"
      ansible.builtin.command:
        argv:
          - ipa
          - hostgroup-add
          - "{{ item.name }}"
          - "--desc={{ item.desc | default(item.name) }}"
      loop: "{{ ipa_hostgroups }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hostgroup_add
      changed_when: "'Added hostgroup' in (ipa_hostgroup_add.stdout | default(''))"
      failed_when:
        - ipa_hostgroup_add.rc != 0
        - "'already exists' not in (ipa_hostgroup_add.stderr | default(''))"
      tags: [identity, hostgroups]

    # `hostgroup-add` above no-ops on "already exists" — an already-created
    # hostgroup's own `desc` never gets corrected by editing the roster and
    # rerunning without this. Unconditional declarative reconcile, same
    # idiom as the SSH-key task below.
    - name: "Reconcile IPA hostgroup descriptions"
      ansible.builtin.command:
        argv:
          - ipa
          - hostgroup-mod
          - "{{ item.name }}"
          - "--desc={{ item.desc | default(item.name) }}"
      loop: "{{ ipa_hostgroups }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hostgroup_mod
      changed_when: "'Modified hostgroup' in (ipa_hostgroup_mod.stdout | default(''))"
      failed_when:
        - ipa_hostgroup_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_hostgroup_mod.stderr | default(''))"
      tags: [identity, hostgroups]

    - name: "Ensure hostgroup membership"
      ansible.builtin.command:
        argv:
          - ipa
          - hostgroup-add-member
          - "{{ item.0.name }}"
          - "--hosts={{ item.1 }}"
      loop: "{{ ipa_hostgroups | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -> {{ item.1 }}"
      register: ipa_hostgroup_member
      changed_when: "'Number of members added 1' in (ipa_hostgroup_member.stdout | default(''))"
      failed_when:
        - ipa_hostgroup_member.rc != 0
        - "'already a member' not in (ipa_hostgroup_member.stdout | default('') + ipa_hostgroup_member.stderr | default(''))"
      tags: [identity, hostgroups]

    # `hostgroup-add-member` above only ever adds — a host removed from the
    # roster's `hosts:` list keeps stale membership forever without this.
    # `hostgroup-show` always reports hosts as FQDNs even when the roster
    # (and the add task above) used a short name that IPA itself resolved —
    # normalize both sides to the short name before diffing, or every
    # single rerun would see "client-vm.ipa.pilot.internal" (live) as
    # absent from a roster that says "client-vm", remove it, then the
    # existing add task immediately re-adds it — permanent flip-flop
    # instead of a settled `changed=0` idempotent rerun.
    - name: "Look up current hostgroup host memberships"
      ansible.builtin.command:
        argv: [ipa, hostgroup-show, "{{ item.name }}", --all]
      loop: "{{ ipa_hostgroups }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hostgroup_show
      changed_when: false
      failed_when: false
      tags: [identity, hostgroups]

    - name: "Compute stale hostgroup host memberships to remove"
      ansible.builtin.set_fact:
        ipa_hostgroup_membership_removals: "{{ (ipa_hostgroup_membership_removals | default([])) + [{'name': item.item.name, 'hosts': stale_hosts}] }}"
      vars:
        live_line: "{{ ((item.stdout | default('') | regex_findall('^  Member hosts: (.*)$', multiline=True)) + ['']) | first | trim }}"
        live_hosts_fqdn: "{{ [] if live_line == '' else live_line.split(', ') }}"
        live_hosts: "{{ live_hosts_fqdn | map('regex_replace', '\\..*$', '') | list }}"
        roster_hosts: "{{ (item.item.hosts | default([])) | map('regex_replace', '\\..*$', '') | list }}"
        stale_hosts: "{{ live_hosts | difference(roster_hosts) }}"
      loop: "{{ ipa_hostgroup_show.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when: not (item.skipped | default(false))
      tags: [identity, hostgroups]

    - name: "Remove stale hostgroup host memberships"
      ansible.builtin.command:
        argv:
          - ipa
          - hostgroup-remove-member
          - "{{ item.0.name }}"
          - "--hosts={{ item.1 }}"
      loop: "{{ ipa_hostgroup_membership_removals | default([]) | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> {{ item.1 }}"
      register: ipa_hostgroup_removal
      changed_when: "'Number of members removed 1' in (ipa_hostgroup_removal.stdout | default(''))"
      failed_when:
        - ipa_hostgroup_removal.rc != 0
      tags: [identity, hostgroups]

    # ── HBAC rules (who may LOG IN, and where) ──────────────────────────
    # A rule with no hosts/hostgroups defaults to hostcat=all (login allowed
    # on every host); give it `hosts:`/`hostgroups:` to restrict login to a
    # subset of hosts. A rule with no services defaults to servicecat=all;
    # give it `services: [sshd]` to restrict which access method it grants.
    - name: "Ensure canonical HBAC service objects exist"
      ansible.builtin.command:
        argv: [ipa, hbacsvc-add, "{{ item.name }}"]
      loop: "{{ ipa_hbac_services | default([]) }}"
      register: ipa_hbacsvc_add
      changed_when: "'Added HBAC service' in (ipa_hbacsvc_add.stdout | default(''))"
      failed_when:
        - ipa_hbacsvc_add.rc != 0
        - "'already exists' not in (ipa_hbacsvc_add.stderr | default(''))"
      tags: [identity, hbac, C13]

    - name: "Ensure HBAC rules exist"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'hbacrule-add', item.name]
             + ([] if (item.hostgroups is defined or item.hosts is defined)
                else ['--hostcat=' ~ (item.hostcat | default('all'))])
             + ([] if (item.services is defined)
                else ['--servicecat=' ~ (item.servicecat | default('all'))]) }}
      loop: "{{ ipa_hbac_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hbac_add
      changed_when: "'Added HBAC rule' in (ipa_hbac_add.stdout | default(''))"
      failed_when:
        - ipa_hbac_add.rc != 0
        - "'already exists' not in (ipa_hbac_add.stderr | default(''))"
      tags: [identity, hbac]

    # `hbacrule-add` above no-ops on "already exists" — none of hostcat,
    # servicecat, or attached hosts/hostgroups/services/users/groups ever
    # gets corrected by editing the roster and rerunning without the
    # lookup/remove/reconcile trio below. Same FQDN-vs-short-name
    # normalization concern as the hostgroup membership task above.
    - name: "Look up current HBAC rule attachments"
      ansible.builtin.command:
        argv: [ipa, hbacrule-show, "{{ item.name }}", --all]
      loop: "{{ ipa_hbac_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hbacrule_show
      changed_when: false
      failed_when: false
      tags: [identity, hbac]

    # Scoped removal: only ever removes a host/hostgroup/service/user/group
    # that is BOTH currently attached to THIS rule AND absent from THIS
    # same rule's own roster lists — never a blind sweep across rules.
    - name: "Compute HBAC rule attachments to remove"
      ansible.builtin.set_fact:
        ipa_hbac_removals: >-
          {{ (ipa_hbac_removals | default([])) + [{
               'name': item.item.name,
               'hosts': (live_hosts | difference(roster_hosts)),
               'hostgroups': (live_hostgroups | difference(item.item.hostgroups | default([]))),
               'services': (live_services | difference(item.item.services | default([]))),
               'users': (live_users | difference(item.item.users | default([]))),
               'groups': (live_groups | difference(item.item.groups | default([]))),
          }] }}
      vars:
        stdout: "{{ item.stdout | default('') }}"
        hosts_line: "{{ ((stdout | regex_findall('^  Hosts: (.*)$', multiline=True)) + ['']) | first | trim }}"
        hostgroups_line: "{{ ((stdout | regex_findall('^  Host Groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        services_line: "{{ ((stdout | regex_findall('^  HBAC Services: (.*)$', multiline=True)) + ['']) | first | trim }}"
        users_line: "{{ ((stdout | regex_findall('^  Users: (.*)$', multiline=True)) + ['']) | first | trim }}"
        groups_line: "{{ ((stdout | regex_findall('^  User Groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        live_hosts_fqdn: "{{ [] if hosts_line == '' else hosts_line.split(', ') }}"
        live_hosts: "{{ live_hosts_fqdn | map('regex_replace', '\\..*$', '') | list }}"
        roster_hosts: "{{ (item.item.hosts | default([])) | map('regex_replace', '\\..*$', '') | list }}"
        live_hostgroups: "{{ [] if hostgroups_line == '' else hostgroups_line.split(', ') }}"
        live_services: "{{ [] if services_line == '' else services_line.split(', ') }}"
        live_users: "{{ [] if users_line == '' else users_line.split(', ') }}"
        live_groups: "{{ [] if groups_line == '' else groups_line.split(', ') }}"
      loop: "{{ ipa_hbacrule_show.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when: not (item.skipped | default(false))
      tags: [identity, hbac]

    - name: "Remove stale hosts from HBAC rules"
      ansible.builtin.command:
        argv: [ipa, hbacrule-remove-host, "{{ item.0.name }}", "--hosts={{ item.1 }}"]
      loop: "{{ ipa_hbac_removals | default([]) | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> host {{ item.1 }}"
      register: ipa_hbac_rm_host
      changed_when: "'Number of members removed 1' in (ipa_hbac_rm_host.stdout | default(''))"
      failed_when:
        - ipa_hbac_rm_host.rc != 0
      tags: [identity, hbac]

    - name: "Remove stale hostgroups from HBAC rules"
      ansible.builtin.command:
        argv: [ipa, hbacrule-remove-host, "{{ item.0.name }}", "--hostgroups={{ item.1 }}"]
      loop: "{{ ipa_hbac_removals | default([]) | subelements('hostgroups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> hostgroup {{ item.1 }}"
      register: ipa_hbac_rm_hostgroup
      changed_when: "'Number of members removed 1' in (ipa_hbac_rm_hostgroup.stdout | default(''))"
      failed_when:
        - ipa_hbac_rm_hostgroup.rc != 0
      tags: [identity, hbac]

    - name: "Remove stale services from HBAC rules"
      ansible.builtin.command:
        argv: [ipa, hbacrule-remove-service, "{{ item.0.name }}", "--hbacsvcs={{ item.1 }}"]
      loop: "{{ ipa_hbac_removals | default([]) | subelements('services', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> service {{ item.1 }}"
      register: ipa_hbac_rm_service
      changed_when: "'Number of members removed 1' in (ipa_hbac_rm_service.stdout | default(''))"
      failed_when:
        - ipa_hbac_rm_service.rc != 0
      tags: [identity, hbac]

    - name: "Remove stale users from HBAC rules"
      ansible.builtin.command:
        argv: [ipa, hbacrule-remove-user, "{{ item.0.name }}", "--users={{ item.1 }}"]
      loop: "{{ ipa_hbac_removals | default([]) | subelements('users', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> user {{ item.1 }}"
      register: ipa_hbac_rm_user
      changed_when: "'Number of members removed 1' in (ipa_hbac_rm_user.stdout | default(''))"
      failed_when:
        - ipa_hbac_rm_user.rc != 0
      tags: [identity, hbac]

    - name: "Remove stale groups from HBAC rules"
      ansible.builtin.command:
        argv: [ipa, hbacrule-remove-user, "{{ item.0.name }}", "--groups={{ item.1 }}"]
      loop: "{{ ipa_hbac_removals | default([]) | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> group {{ item.1 }}"
      register: ipa_hbac_rm_group
      changed_when: "'Number of members removed 1' in (ipa_hbac_rm_group.stdout | default(''))"
      failed_when:
        - ipa_hbac_rm_group.rc != 0
      tags: [identity, hbac]

    # Category flags are mutually exclusive with specific members at the
    # IPA API level (confirmed live: "host category cannot be set to 'all'
    # while there are allowed hosts") — this MUST run after the removals
    # above (so a rule moving from hosts:[...] to hostcat:all has nothing
    # left attached) and before the "Attach ..." tasks below (so a rule
    # moving the other way has its category cleared before a specific
    # host/service can be attached). Always sends an explicit value
    # (category, or empty string to clear) rather than omitting the flag —
    # unlike "Ensure HBAC rules exist" above, which only needs to set it
    # once at creation, this task's whole job is correcting drift on an
    # already-existing rule.
    - name: "Reconcile HBAC rule category attributes"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'hbacrule-mod', item.name,
              '--hostcat=' ~ ('' if (item.hostgroups is defined or item.hosts is defined) else (item.hostcat | default('all'))),
              '--servicecat=' ~ ('' if item.services is defined else (item.servicecat | default('all')))] }}
      loop: "{{ ipa_hbac_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_hbacrule_mod
      changed_when: "'Modified HBAC rule' in (ipa_hbacrule_mod.stdout | default(''))"
      failed_when:
        - ipa_hbacrule_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_hbacrule_mod.stderr | default(''))"
      tags: [identity, hbac]

    - name: "Attach hostgroups to HBAC rules"
      ansible.builtin.command:
        argv:
          - ipa
          - hbacrule-add-host
          - "{{ item.0.name }}"
          - "--hostgroups={{ item.1 }}"
      loop: "{{ ipa_hbac_rules | subelements('hostgroups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} hostgroup {{ item.1 }}"
      register: ipa_hbac_hostgroup
      changed_when: "'Number of members added 1' in (ipa_hbac_hostgroup.stdout | default(''))"
      failed_when:
        - ipa_hbac_hostgroup.rc != 0
        - "'already a member' not in (ipa_hbac_hostgroup.stdout | default('') + ipa_hbac_hostgroup.stderr | default(''))"
      tags: [identity, hbac]

    - name: "Attach hosts to HBAC rules"
      ansible.builtin.command:
        argv:
          - ipa
          - hbacrule-add-host
          - "{{ item.0.name }}"
          - "--hosts={{ item.1 }}"
      loop: "{{ ipa_hbac_rules | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} host {{ item.1 }}"
      register: ipa_hbac_host
      changed_when: "'Number of members added 1' in (ipa_hbac_host.stdout | default(''))"
      failed_when:
        - ipa_hbac_host.rc != 0
        - "'already a member' not in (ipa_hbac_host.stdout | default('') + ipa_hbac_host.stderr | default(''))"
      tags: [identity, hbac]

    - name: "Attach services to HBAC rules"
      ansible.builtin.command:
        argv:
          - ipa
          - hbacrule-add-service
          - "{{ item.0.name }}"
          - "--hbacsvcs={{ item.1 }}"
      loop: "{{ ipa_hbac_rules | subelements('services', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} service {{ item.1 }}"
      register: ipa_hbac_service
      changed_when: "'Number of members added 1' in (ipa_hbac_service.stdout | default(''))"
      failed_when:
        - ipa_hbac_service.rc != 0
        - "'already a member' not in (ipa_hbac_service.stdout | default('') + ipa_hbac_service.stderr | default(''))"
      tags: [identity, hbac]

    - name: "Attach users to HBAC rules"
      ansible.builtin.command:
        argv:
          - ipa
          - hbacrule-add-user
          - "{{ item.0.name }}"
          - "--users={{ item.1 }}"
      loop: "{{ ipa_hbac_rules | subelements('users', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} user {{ item.1 }}"
      register: ipa_hbac_user
      changed_when: "'Number of members added 1' in (ipa_hbac_user.stdout | default(''))"
      failed_when:
        - ipa_hbac_user.rc != 0
        - "'already a member' not in (ipa_hbac_user.stdout | default('') + ipa_hbac_user.stderr | default(''))"
      tags: [identity, hbac]

    - name: "Attach groups to HBAC rules"
      ansible.builtin.command:
        argv:
          - ipa
          - hbacrule-add-user
          - "{{ item.0.name }}"
          - "--groups={{ item.1 }}"
      loop: "{{ ipa_hbac_rules | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} group {{ item.1 }}"
      register: ipa_hbac_group
      changed_when: "'Number of members added 1' in (ipa_hbac_group.stdout | default(''))"
      failed_when:
        - ipa_hbac_group.rc != 0
        - "'already a member' not in (ipa_hbac_group.stdout | default(''))"
      tags: [identity, hbac]

    - name: "Reconcile canonical HBAC rule enabled state"
      ansible.builtin.command:
        argv: [ipa, "hbacrule-{{ 'enable' if item.enabled | default(true) else 'disable' }}", "{{ item.name }}"]
      loop: "{{ ipa_hbac_rules }}"
      loop_control:
        index_var: ipa_hbac_enabled_index
        label: "{{ item.name }} enabled={{ item.enabled | default(true) }}"
      register: ipa_hbac_enabled
      changed_when: >-
        ('Enabled HBAC rule' in (ipa_hbac_enabled.stdout | default(''))) or
        ('Disabled HBAC rule' in (ipa_hbac_enabled.stdout | default('')))
      failed_when:
        - ipa_hbac_enabled.rc != 0
        - "'already enabled' not in (ipa_hbac_enabled.stderr | default(''))"
        - "'already disabled' not in (ipa_hbac_enabled.stderr | default(''))"
      when: >-
        (item.enabled | default(true) and
         'Enabled: True' not in ipa_hbacrule_show.results[ipa_hbac_enabled_index].stdout) or
        (not item.enabled | default(true) and
         'Enabled: False' not in ipa_hbacrule_show.results[ipa_hbac_enabled_index].stdout)
      tags: [identity, hbac, C14]

    - name: "Inspect default allow_all HBAC state"
      ansible.builtin.command:
        argv: [ipa, hbacrule-show, allow_all, --all]
      register: ipa_hbac_allow_all_show
      changed_when: false
      when: ipa_hbac_disable_allow_all | bool
      tags: [identity, hbac, C14]

    - name: "Transactional HBAC allow_all lockdown"
      when: ipa_hbac_disable_allow_all | bool
      tags: [identity, hbac, C14]
      block:
        - name: "Gate: enabled admin break-glass rule exists"
          ansible.builtin.assert:
            that:
              - >-
                ipa_hbac_rules | selectattr('users', 'contains', 'admin') |
                selectattr('hostcat', 'equalto', 'all') |
                rejectattr('enabled', 'defined') | list | length > 0 or
                ipa_hbac_rules | selectattr('users', 'contains', 'admin') |
                selectattr('hostcat', 'equalto', 'all') |
                selectattr('enabled', 'defined') | selectattr('enabled', 'equalto', true) |
                list | length > 0
            fail_msg: "Refusing to disable allow_all without an enabled admin break-glass rule."
        - name: "Prove break-glass access before lockdown"
          ansible.builtin.command:
            argv: [ipa, hbactest, --user=admin, "--host={{ identity_hbac_test_host }}", --service=sshd]
          register: ipa_hbac_prelock_test
          changed_when: false
          failed_when: "'Access granted: True' not in (ipa_hbac_prelock_test.stdout | default(''))"
        - name: "Disable the default allow_all HBAC rule"
          ansible.builtin.command: ipa hbacrule-disable allow_all
          register: ipa_hbac_disable
          changed_when: "'Disabled HBAC rule' in (ipa_hbac_disable.stdout | default(''))"
          failed_when:
            - ipa_hbac_disable.rc != 0
            - "'already disabled' not in (ipa_hbac_disable.stderr | default(''))"
          when: "'Enabled: True' in (ipa_hbac_allow_all_show.stdout | default(''))"
        - name: "Prove break-glass access after lockdown"
          ansible.builtin.command:
            argv: [ipa, hbactest, --user=admin, "--host={{ identity_hbac_test_host }}", --service=sshd]
          register: ipa_hbac_postlock_test
          changed_when: false
          failed_when: "'Access granted: True' not in (ipa_hbac_postlock_test.stdout | default(''))"
      rescue:
        - name: "Rollback HBAC lockdown by re-enabling allow_all"
          ansible.builtin.command: ipa hbacrule-enable allow_all
          changed_when: true
          failed_when: false
        - name: "Fail after HBAC lockdown rollback"
          ansible.builtin.fail:
            msg: "HBAC lockdown verification failed; allow_all was re-enabled."

    # ── Sudo rules (what a logged-in user may run, and where) ───────────
    # Catch the mutual-exclusivity mistake before it can silently happen
    # again: "Ensure sudo rules exist" below always prefers hosts/hostgroups
    # over hostcat, and allow_commands over cmdcat, with no warning if a
    # roster sets both — exactly how runbook Real bug #15 (cmdcat silently
    # ignored) went unnoticed.
    - name: "Ensure canonical sudo command objects exist"
      ansible.builtin.command:
        argv: [ipa, sudocmd-add, "{{ item }}"]
      loop: "{{ ipa_sudo_command_groups | default([]) | map(attribute='commands') | select('defined') | flatten | unique }}"
      register: ipa_canonical_sudocmd_add
      changed_when: "'Added Sudo Command' in (ipa_canonical_sudocmd_add.stdout | default(''))"
      failed_when:
        - ipa_canonical_sudocmd_add.rc != 0
        - "'already exists' not in (ipa_canonical_sudocmd_add.stderr | default(''))"
      tags: [identity, sudo, C15]

    - name: "Ensure canonical sudo command groups exist"
      ansible.builtin.command:
        argv: [ipa, sudocmdgroup-add, "{{ item.name }}"]
      loop: "{{ ipa_sudo_command_groups | default([]) }}"
      register: ipa_sudocmdgroup_add
      changed_when: "'Added Sudo Command Group' in (ipa_sudocmdgroup_add.stdout | default(''))"
      failed_when:
        - ipa_sudocmdgroup_add.rc != 0
        - "'already exists' not in (ipa_sudocmdgroup_add.stderr | default(''))"
      tags: [identity, sudo, C15]

    - name: "Attach commands to canonical sudo command groups"
      ansible.builtin.command:
        argv: [ipa, sudocmdgroup-add-member, "{{ item.0.name }}", "--sudocmds={{ item.1 }}"]
      loop: "{{ ipa_sudo_command_groups | default([]) | subelements('commands', skip_missing=True) }}"
      register: ipa_sudocmdgroup_member
      changed_when: "'Number of members added 1' in (ipa_sudocmdgroup_member.stdout | default(''))"
      failed_when:
        - ipa_sudocmdgroup_member.rc != 0
        - "'already a member' not in (ipa_sudocmdgroup_member.stdout | default('') + ipa_sudocmdgroup_member.stderr | default(''))"
        - "'Number of members added 0' not in (ipa_sudocmdgroup_member.stdout | default(''))"
      tags: [identity, sudo, C15]

    - name: "Gate: sudo rule category vs specific-list fields are mutually exclusive"
      ansible.builtin.assert:
        that:
          - not (item.hostcat is defined and (item.hosts is defined or item.hostgroups is defined))
          - not (item.cmdcat is defined and item.allow_commands is defined)
        fail_msg: >-
          Sudo rule "{{ item.name }}" sets both a category field and a
          specific-list field for the same axis — pick one. Either
          `hostcat: all` alone or `hosts:`/`hostgroups:` alone; either
          `cmdcat: all` alone or `allow_commands:` alone. Whichever one this
          task ignores is silent, not an error.
      loop: "{{ ipa_sudo_rules }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [always, identity, sudo]

    # A rule with no hosts/hostgroups defaults to hostcat=all (applies
    # everywhere); give it `hosts:`/`hostgroups:` to scope it to a subset.
    #
    # Commands follow the identical convention: a rule with no
    # `allow_commands:` defaults to cmdcat=all (matches ANY command) — give
    # it `allow_commands:` to scope it to a specific set instead. `--cmdcat`
    # and individual sudoCmd members are mutually exclusive in FreeIPA
    # itself (same as hostcat vs. hosts/hostgroups), so this is only sent
    # when `allow_commands` is absent. `cmdcat: all` is accepted as an
    # explicit synonym for the same default, for rosters that prefer to say
    # so out loud. Before this, a roster that set `cmdcat: all` (expecting
    # hostcat-like behavior) was silently ignored — the rule ended up with
    # NO command grant at all (deny-everything), since only `allow_commands`
    # was ever read (runbook Real bug #15).
    #
    # `runas_user`/`runasgroup` are the same "cat" convention again, but for
    # WHO the command may be run as: with neither set, FreeIPA's own default
    # is "root only". Give `runas_user: all` / `runasgroup: all` to allow
    # `sudo -u <anyone>` / `sudo -g <anygroup>` instead. Only the `all`
    # category value is handled — a roster listing specific runas
    # users/groups is not yet supported (no roster here has needed it; add
    # `sudorule-add-runasuser`/`-add-runasgroup` tasks, mirroring "Attach
    # users to sudo rules" below, if that's ever needed). Before this, these
    # two fields were silently ignored entirely — a roster author writing
    # `runas_user: all` got the unchanged "root only" default with no
    # indication the field did nothing (runbook Real bug #16).
    - name: "Ensure sudo rules exist"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'sudorule-add', item.name]
             + ([] if (item.hostgroups is defined or item.hosts is defined)
                else ['--hostcat=' ~ (item.hostcat | default('all'))])
             + ([] if item.allow_commands is defined
                else ['--cmdcat=' ~ (item.cmdcat | default('all'))])
             + ([] if (item.runas_user | default('') | string | lower != 'all')
                else ['--runasusercat=all'])
             + ([] if (item.runasgroup | default('') | string | lower != 'all')
                else ['--runasgroupcat=all']) }}
      loop: "{{ ipa_sudo_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_rule_add
      changed_when: "'Added Sudo Rule' in (ipa_rule_add.stdout | default(''))"
      failed_when:
        - ipa_rule_add.rc != 0
        - "'already exists' not in (ipa_rule_add.stderr | default(''))"
      tags: [identity, sudo]

    # `sudorule-add` above no-ops on "already exists" — none of hostcat,
    # cmdcat, runasusercat/runasgroupcat, or attached
    # hosts/hostgroups/allow_commands/users/groups ever gets corrected by
    # editing the roster and rerunning without the lookup/remove/reconcile
    # trio below. Same FQDN-vs-short-name normalization concern as the
    # hostgroup membership task above.
    - name: "Look up current sudo rule attachments"
      ansible.builtin.command:
        argv: [ipa, sudorule-show, "{{ item.name }}", --all]
      loop: "{{ ipa_sudo_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_sudorule_show
      changed_when: false
      failed_when: false
      tags: [identity, sudo]

    # Scoped removal: only ever removes a host/hostgroup/command/user/group
    # that is BOTH currently attached to THIS rule AND absent from THIS
    # same rule's own roster lists — never a blind sweep across rules.
    - name: "Compute sudo rule attachments to remove"
      ansible.builtin.set_fact:
        ipa_sudo_removals: >-
          {{ (ipa_sudo_removals | default([])) + [{
               'name': item.item.name,
               'hosts': (live_hosts | difference(roster_hosts)),
               'hostgroups': (live_hostgroups | difference(item.item.hostgroups | default([]))),
               'allow_commands': (live_cmds | difference(item.item.allow_commands | default([]))),
               'users': (live_users | difference(item.item.users | default([]))),
               'groups': (live_groups | difference(item.item.groups | default([]))),
          }] }}
      vars:
        stdout: "{{ item.stdout | default('') }}"
        hosts_line: "{{ ((stdout | regex_findall('^  Hosts: (.*)$', multiline=True)) + ['']) | first | trim }}"
        hostgroups_line: "{{ ((stdout | regex_findall('^  Host Groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        cmds_line: "{{ ((stdout | regex_findall('^  Sudo Allow Commands: (.*)$', multiline=True)) + ['']) | first | trim }}"
        users_line: "{{ ((stdout | regex_findall('^  Users: (.*)$', multiline=True)) + ['']) | first | trim }}"
        groups_line: "{{ ((stdout | regex_findall('^  User Groups: (.*)$', multiline=True)) + ['']) | first | trim }}"
        live_hosts_fqdn: "{{ [] if hosts_line == '' else hosts_line.split(', ') }}"
        live_hosts: "{{ live_hosts_fqdn | map('regex_replace', '\\..*$', '') | list }}"
        roster_hosts: "{{ (item.item.hosts | default([])) | map('regex_replace', '\\..*$', '') | list }}"
        live_hostgroups: "{{ [] if hostgroups_line == '' else hostgroups_line.split(', ') }}"
        live_cmds: "{{ [] if cmds_line == '' else cmds_line.split(', ') }}"
        live_users: "{{ [] if users_line == '' else users_line.split(', ') }}"
        live_groups: "{{ [] if groups_line == '' else groups_line.split(', ') }}"
      loop: "{{ ipa_sudorule_show.results }}"
      loop_control:
        label: "{{ item.item.name | default('n/a') }}"
      when: not (item.skipped | default(false))
      tags: [identity, sudo]

    - name: "Remove stale hosts from sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-remove-host, "{{ item.0.name }}", "--hosts={{ item.1 }}"]
      loop: "{{ ipa_sudo_removals | default([]) | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> host {{ item.1 }}"
      register: ipa_sudo_rm_host
      changed_when: "'Number of members removed 1' in (ipa_sudo_rm_host.stdout | default(''))"
      failed_when:
        - ipa_sudo_rm_host.rc != 0
      tags: [identity, sudo]

    - name: "Remove stale hostgroups from sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-remove-host, "{{ item.0.name }}", "--hostgroups={{ item.1 }}"]
      loop: "{{ ipa_sudo_removals | default([]) | subelements('hostgroups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> hostgroup {{ item.1 }}"
      register: ipa_sudo_rm_hostgroup
      changed_when: "'Number of members removed 1' in (ipa_sudo_rm_hostgroup.stdout | default(''))"
      failed_when:
        - ipa_sudo_rm_hostgroup.rc != 0
      tags: [identity, sudo]

    - name: "Remove stale allow_commands from sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-remove-allow-command, "{{ item.0.name }}", "--sudocmds={{ item.1 }}"]
      loop: "{{ ipa_sudo_removals | default([]) | subelements('allow_commands', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> command {{ item.1 }}"
      register: ipa_sudo_rm_cmd
      changed_when: "'Number of members removed 1' in (ipa_sudo_rm_cmd.stdout | default(''))"
      failed_when:
        - ipa_sudo_rm_cmd.rc != 0
      tags: [identity, sudo]

    - name: "Remove stale users from sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-remove-user, "{{ item.0.name }}", "--users={{ item.1 }}"]
      loop: "{{ ipa_sudo_removals | default([]) | subelements('users', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> user {{ item.1 }}"
      register: ipa_sudo_rm_user
      changed_when: "'Number of members removed 1' in (ipa_sudo_rm_user.stdout | default(''))"
      failed_when:
        - ipa_sudo_rm_user.rc != 0
      tags: [identity, sudo]

    - name: "Remove stale groups from sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-remove-user, "{{ item.0.name }}", "--groups={{ item.1 }}"]
      loop: "{{ ipa_sudo_removals | default([]) | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -/-> group {{ item.1 }}"
      register: ipa_sudo_rm_group
      changed_when: "'Number of members removed 1' in (ipa_sudo_rm_group.stdout | default(''))"
      failed_when:
        - ipa_sudo_rm_group.rc != 0
      tags: [identity, sudo]

    # Category flags are mutually exclusive with specific members at the
    # IPA API level (confirmed live: "host category cannot be set to 'all'
    # while there are allowed hosts") — this MUST run after the removals
    # above (so a rule moving from hosts:[...] to hostcat:all has nothing
    # left attached) and before the "Attach ..." tasks below (so a rule
    # moving the other way has its category cleared before a specific
    # host/command can be attached). Always sends an explicit value
    # (category, or empty string to clear) rather than omitting the flag —
    # unlike "Ensure sudo rules exist" above, which only needs to set it
    # once at creation, this task's whole job is correcting drift on an
    # already-existing rule. `runas_user`/`runasgroup` only ever support
    # the `all` category (see the comment above "Ensure sudo rules exist")
    # so reconciling them is simpler: `all` or clear, never a specific list.
    - name: "Reconcile sudo rule category attributes"
      ansible.builtin.command:
        argv: >-
          {{ ['ipa', 'sudorule-mod', item.name,
              '--hostcat=' ~ ('' if (item.hostgroups is defined or item.hosts is defined) else (item.hostcat | default('all'))),
              '--cmdcat=' ~ ('' if item.allow_commands is defined else (item.cmdcat | default('all'))),
              '--runasusercat=' ~ ('all' if (item.runas_user | default('') | string | lower == 'all') else ''),
              '--runasgroupcat=' ~ ('all' if (item.runasgroup | default('') | string | lower == 'all') else '')] }}
      loop: "{{ ipa_sudo_rules }}"
      loop_control:
        label: "{{ item.name }}"
      register: ipa_sudorule_mod
      changed_when: "'Modified Sudo Rule' in (ipa_sudorule_mod.stdout | default(''))"
      failed_when:
        - ipa_sudorule_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_sudorule_mod.stderr | default(''))"
      tags: [identity, sudo]

    # sudorule-add-allow-command requires the command to already exist as a
    # sudoCommand LDAP object — without this, a rule that *looks* correct
    # (sudorule-show lists the command) still denies at runtime because
    # SSSD's sudo provider finds no matching sudoCommand object. Idempotent:
    # already-exists is not an error. (See freeipa-audit-demo-gotchas.)
    - name: "Ensure sudo command objects exist"
      ansible.builtin.command:
        argv:
          - ipa
          - sudocmd-add
          - "{{ item }}"
      loop: "{{ ipa_sudo_rules | selectattr('allow_commands', 'defined') | map(attribute='allow_commands') | list | flatten | unique }}"
      loop_control:
        label: "{{ item }}"
      register: ipa_sudocmd_add
      changed_when: "'Added Sudo Command' in (ipa_sudocmd_add.stdout | default(''))"
      failed_when:
        - ipa_sudocmd_add.rc != 0
        - "'already exists' not in (ipa_sudocmd_add.stderr | default(''))"
      tags: [identity, sudo]

    - name: "Attach allowed commands to sudo rules"
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-allow-command
          - "{{ item.0.name }}"
          - "--sudocmds={{ item.1 }}"
      loop: "{{ ipa_sudo_rules | subelements('allow_commands', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} allow {{ item.1 }}"
      register: ipa_allow_cmd
      changed_when: "'Number of members added 1' in (ipa_allow_cmd.stdout | default(''))"
      # sudorule-add-allow-command's no-op case is unlike the other
      # "-add-member"-style attach tasks in this file: it returns rc=1 with
      # "Number of members added 0" rather than rc=0 + "already a member"
      # (confirmed 2026-07-03; matches the same quirk in freeipa-audit-demo.yml).
      failed_when:
        - ipa_allow_cmd.rc != 0
        - "'already a member' not in (ipa_allow_cmd.stdout | default('') + ipa_allow_cmd.stderr | default(''))"
        - "'Number of members added 0' not in (ipa_allow_cmd.stdout | default(''))"
      tags: [identity, sudo]

    - name: "Attach allowed command groups to canonical sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-add-allow-command, "{{ item.0.name }}", "--sudocmdgroups={{ item.1 }}"]
      loop: "{{ ipa_sudo_rules | subelements('allow_command_groups', skip_missing=True) }}"
      register: ipa_allow_cmdgroup
      changed_when: "'Number of members added 1' in (ipa_allow_cmdgroup.stdout | default(''))"
      failed_when:
        - ipa_allow_cmdgroup.rc != 0
        - "'already a member' not in (ipa_allow_cmdgroup.stdout | default('') + ipa_allow_cmdgroup.stderr | default(''))"
        - "'Number of members added 0' not in (ipa_allow_cmdgroup.stdout | default(''))"
      tags: [identity, sudo, C16]

    - name: "Attach denied commands to canonical sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-add-deny-command, "{{ item.0.name }}", "--sudocmds={{ item.1 }}"]
      loop: "{{ ipa_sudo_rules | subelements('deny_commands', skip_missing=True) }}"
      register: ipa_deny_cmd
      changed_when: "'Number of members added 1' in (ipa_deny_cmd.stdout | default(''))"
      failed_when:
        - ipa_deny_cmd.rc != 0
        - "'already a member' not in (ipa_deny_cmd.stdout | default('') + ipa_deny_cmd.stderr | default(''))"
        - "'Number of members added 0' not in (ipa_deny_cmd.stdout | default(''))"
      tags: [identity, sudo, C16]

    - name: "Attach denied command groups to canonical sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-add-deny-command, "{{ item.0.name }}", "--sudocmdgroups={{ item.1 }}"]
      loop: "{{ ipa_sudo_rules | subelements('deny_command_groups', skip_missing=True) }}"
      register: ipa_deny_cmdgroup
      changed_when: "'Number of members added 1' in (ipa_deny_cmdgroup.stdout | default(''))"
      failed_when:
        - ipa_deny_cmdgroup.rc != 0
        - "'already a member' not in (ipa_deny_cmdgroup.stdout | default('') + ipa_deny_cmdgroup.stderr | default(''))"
        - "'Number of members added 0' not in (ipa_deny_cmdgroup.stdout | default(''))"
      tags: [identity, sudo, C16]

    - name: "Attach specific run-as users to canonical sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-add-runasuser, "{{ item.0.name }}", "--users={{ item.1 }}"]
      loop: "{{ ipa_sudo_rules | subelements('runas_users', skip_missing=True) }}"
      register: ipa_runas_user
      changed_when: "'Number of members added 1' in (ipa_runas_user.stdout | default(''))"
      failed_when:
        - ipa_runas_user.rc != 0
        - "'already a member' not in (ipa_runas_user.stdout | default('') + ipa_runas_user.stderr | default(''))"
      tags: [identity, sudo, C17]

    - name: "Attach specific run-as groups to canonical sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-add-runasgroup, "{{ item.0.name }}", "--groups={{ item.1 }}"]
      loop: "{{ ipa_sudo_rules | subelements('runas_groups', skip_missing=True) }}"
      register: ipa_runas_group
      changed_when: "'Number of members added 1' in (ipa_runas_group.stdout | default(''))"
      failed_when:
        - ipa_runas_group.rc != 0
        - "'already a member' not in (ipa_runas_group.stdout | default('') + ipa_runas_group.stderr | default(''))"
      tags: [identity, sudo, C17]

    - name: "Attach sudo options to canonical sudo rules"
      ansible.builtin.command:
        argv: [ipa, sudorule-add-option, "{{ item.0.name }}", "--sudooption={{ item.1 }}"]
      loop: "{{ ipa_sudo_rules | subelements('options', skip_missing=True) }}"
      register: ipa_sudo_option
      changed_when: "'Added option' in (ipa_sudo_option.stdout | default(''))"
      failed_when:
        - ipa_sudo_option.rc != 0
        - "'already exists' not in (ipa_sudo_option.stderr | default(''))"
      tags: [identity, sudo, C17]

    - name: "Attach users to sudo rules"
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-user
          - "{{ item.0.name }}"
          - "--users={{ item.1 }}"
      loop: "{{ ipa_sudo_rules | subelements('users', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} user {{ item.1 }}"
      register: ipa_rule_user
      changed_when: "'Number of members added 1' in (ipa_rule_user.stdout | default(''))"
      failed_when:
        - ipa_rule_user.rc != 0
        - "'already a member' not in (ipa_rule_user.stdout | default(''))"
      tags: [identity, sudo]

    - name: "Attach groups to sudo rules"
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-user
          - "{{ item.0.name }}"
          - "--groups={{ item.1 }}"
      loop: "{{ ipa_sudo_rules | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} group {{ item.1 }}"
      register: ipa_rule_group
      changed_when: "'Number of members added 1' in (ipa_rule_group.stdout | default(''))"
      failed_when:
        - ipa_rule_group.rc != 0
        - "'already a member' not in (ipa_rule_group.stdout | default(''))"
      tags: [identity, sudo]

    - name: "Attach hostgroups to sudo rules"
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-host
          - "{{ item.0.name }}"
          - "--hostgroups={{ item.1 }}"
      loop: "{{ ipa_sudo_rules | subelements('hostgroups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} hostgroup {{ item.1 }}"
      register: ipa_rule_hostgroup
      changed_when: "'Number of members added 1' in (ipa_rule_hostgroup.stdout | default(''))"
      failed_when:
        - ipa_rule_hostgroup.rc != 0
        - "'already a member' not in (ipa_rule_hostgroup.stdout | default('') + ipa_rule_hostgroup.stderr | default(''))"
      tags: [identity, sudo]

    - name: "Attach hosts to sudo rules"
      ansible.builtin.command:
        argv:
          - ipa
          - sudorule-add-host
          - "{{ item.0.name }}"
          - "--hosts={{ item.1 }}"
      loop: "{{ ipa_sudo_rules | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} host {{ item.1 }}"
      register: ipa_rule_host
      changed_when: "'Number of members added 1' in (ipa_rule_host.stdout | default(''))"
      failed_when:
        - ipa_rule_host.rc != 0
        - "'already a member' not in (ipa_rule_host.stdout | default('') + ipa_rule_host.stderr | default(''))"
      tags: [identity, sudo]

    - name: "Reconcile canonical sudo rule enabled state"
      ansible.builtin.command:
        argv: [ipa, "sudorule-{{ 'enable' if item.enabled | default(true) else 'disable' }}", "{{ item.name }}"]
      loop: "{{ ipa_sudo_rules }}"
      loop_control:
        index_var: ipa_sudo_enabled_index
        label: "{{ item.name }} enabled={{ item.enabled | default(true) }}"
      register: ipa_sudo_enabled
      changed_when: >-
        ('Enabled Sudo Rule' in (ipa_sudo_enabled.stdout | default(''))) or
        ('Disabled Sudo Rule' in (ipa_sudo_enabled.stdout | default('')))
      failed_when:
        - ipa_sudo_enabled.rc != 0
        - "'already enabled' not in (ipa_sudo_enabled.stderr | default(''))"
        - "'already disabled' not in (ipa_sudo_enabled.stderr | default(''))"
      when: >-
        (item.enabled | default(true) and
         'Enabled: True' not in ipa_sudorule_show.results[ipa_sudo_enabled_index].stdout) or
        (not item.enabled | default(true) and
         'Enabled: False' not in ipa_sudorule_show.results[ipa_sudo_enabled_index].stdout)
      tags: [identity, sudo, C17]

    # ── FreeIPA automount control plane for canonical NFS shares ───────
    - name: "Ensure canonical automount locations exist"
      ansible.builtin.command:
        argv: [ipa, automountlocation-add, "{{ item.automount.location | default('default') }}"]
      loop: >-
        {{ (freeipa_roster.nfs | default({})).servers | default([]) |
           map(attribute='shares') | select('defined') | flatten |
           selectattr('automount.enabled', 'defined') |
           selectattr('automount.enabled') }}
      register: ipa_automount_location
      changed_when: "'Added automount location' in (ipa_automount_location.stdout | default(''))"
      failed_when:
        - ipa_automount_location.rc != 0
        - "'already exists' not in (ipa_automount_location.stderr | default(''))"
      when: freeipa_roster.schema_version is defined
      tags: [identity, nfs, C18]

    - name: "Ensure canonical indirect automount maps exist"
      ansible.builtin.command:
        argv:
          - ipa
          - automountmap-add
          - "{{ item.automount.location | default('default') }}"
          - "{{ item.automount.map }}"
      loop: >-
        {{ (freeipa_roster.nfs | default({})).servers | default([]) |
           map(attribute='shares') | select('defined') | flatten |
           selectattr('automount.enabled', 'defined') |
           selectattr('automount.enabled') }}
      register: ipa_automount_map
      changed_when: "'Added automount map' in (ipa_automount_map.stdout | default(''))"
      failed_when:
        - ipa_automount_map.rc != 0
        - "'already exists' not in (ipa_automount_map.stderr | default(''))"
      when: freeipa_roster.schema_version is defined
      tags: [identity, nfs, C18]

    - name: "Ensure canonical auto.master keys exist"
      ansible.builtin.command:
        argv:
          - ipa
          - automountkey-add
          - "{{ item.automount.location | default('default') }}"
          - auto.master
          - "--key={{ item.automount.mount_root }}"
          - "--info={{ item.automount.map }}"
      loop: >-
        {{ (freeipa_roster.nfs | default({})).servers | default([]) |
           map(attribute='shares') | select('defined') | flatten |
           selectattr('automount.enabled', 'defined') |
           selectattr('automount.enabled') }}
      register: ipa_automount_master_key
      changed_when: "'Added automount key' in (ipa_automount_master_key.stdout | default(''))"
      failed_when:
        - ipa_automount_master_key.rc != 0
        - "'already exists' not in (ipa_automount_master_key.stderr | default(''))"
      when: freeipa_roster.schema_version is defined
      tags: [identity, nfs, C18]

    - name: "Ensure canonical indirect automount keys exist"
      ansible.builtin.command:
        argv:
          - ipa
          - automountkey-add
          - "{{ item.automount.location | default('default') }}"
          - "{{ item.automount.map }}"
          - "--key={{ item.automount.key }}"
          - "--info=-{{ item.automount.options | join(',') }} {{ item.automount.server }}:{{ item.automount.remote_path }}"
      loop: >-
        {{ (freeipa_roster.nfs | default({})).servers | default([]) |
           map(attribute='shares') | select('defined') | flatten |
           selectattr('automount.enabled', 'defined') |
           selectattr('automount.enabled') }}
      register: ipa_automount_share_key
      changed_when: "'Added automount key' in (ipa_automount_share_key.stdout | default(''))"
      failed_when:
        - ipa_automount_share_key.rc != 0
        - "'already exists' not in (ipa_automount_share_key.stderr | default(''))"
      when: freeipa_roster.schema_version is defined
      tags: [identity, nfs, C18]

    - name: "Reconcile canonical indirect automount key information"
      ansible.builtin.command:
        argv:
          - ipa
          - automountkey-mod
          - "{{ item.automount.location | default('default') }}"
          - "{{ item.automount.map }}"
          - "--key={{ item.automount.key }}"
          - "--info=-{{ item.automount.options | join(',') }} {{ item.automount.server }}:{{ item.automount.remote_path }}"
      loop: >-
        {{ (freeipa_roster.nfs | default({})).servers | default([]) |
           map(attribute='shares') | select('defined') | flatten |
           selectattr('automount.enabled', 'defined') |
           selectattr('automount.enabled') }}
      register: ipa_automount_share_mod
      changed_when: "'Modified automount key' in (ipa_automount_share_mod.stdout | default(''))"
      failed_when:
        - ipa_automount_share_mod.rc != 0
        - "'no modifications to be performed' not in (ipa_automount_share_mod.stderr | default(''))"
      when: freeipa_roster.schema_version is defined
      tags: [identity, nfs, C18]

    # ── Release ticket ─────────────────────────────────────────────────
    - name: "Release the Kerberos ticket"
      ansible.builtin.command: kdestroy
      changed_when: false
      failed_when: false
      tags: [identity]
