---
# Canonical freeipa-identity roster (schema_version: 1).
#
# Keep the real file outside git and encrypt it with ansible-vault. Because
# `groups` and `hosts` are Ansible magic variables, DO NOT pass this file with
# `-e @file`. Load it through the playbook's namespaced entrypoint instead:
#
#   pilot vm-target run --name <server> \
#     playbooks/apply/freeipa-identity-apply.yml \
#     -e target_group=all \
#     -e freeipa_roster_file=~/.vault/ipa-identity.yaml \
#     --vault-password-file ~/.vault/vault-pass
#
# Identity, HBAC/sudo, Kerberos NFSv4 server, and IPA automount clients are
# supported. Migration remains a separate fail-closed delivery batch.
schema_version: 1

freeipa:
  domain: ipa.pilot.internal
  realm: IPA.PILOT.INTERNAL
  server: ipa1.ipa.pilot.internal
  admin:
    principal: admin
    password: CHANGE-ME-min-8-chars
  defaults:
    group_type: posix
    managed_group_membership: authoritative
    prune_unmanaged: false
  safety:
    require_posix_data_groups: true

users:
  - name: alice
    state: present
    first: Alice
    last: Wang
    display_name: Alice Wang
    email: alice@example.internal
    uid: null
    gid: null
    login_shell: /bin/bash
    home_directory: /home/alice
    password:
      initial: CHANGE-ME-alice-initial
      force_change: true
      preserve_existing: false
    ssh_keys:
      authoritative: true
      values:
        - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI...EXAMPLE... alice@laptop
    enabled: true

  - name: bob
    state: disabled
    first: Bob
    last: Lee
    login_shell: /bin/bash
    home_directory: /home/bob
    password:
      preserve_existing: true
    ssh_keys:
      authoritative: true
      values: []
    enabled: false

groups:
  - name: team-developers
    state: present
    category: team
    type: posix
    description: Application development team
    gid: null
    membership:
      authoritative: true
      users:
        - alice
        - bob
      groups: []

  - name: data-project-alpha-rw
    state: present
    category: filesystem
    type: posix
    description: Project Alpha read-write access
    membership:
      authoritative: true
      users: []
      groups:
        - team-developers

  - name: role-web-service-admin
    state: present
    category: role
    type: posix
    description: Web service administrators
    membership:
      authoritative: true
      users: [alice]
      groups: []

hosts: []
hostgroups: []
hbac:
  disable_allow_all: true
  services:
    - {name: sshd, state: present}
  rules:
    - name: breakglass-admin-access
      state: present
      enabled: true
      subjects: {users: [admin], groups: []}
      targets: {hostcat: all, hosts: [], hostgroups: []}
      services: [sshd]

sudo:
  command_groups:
    - name: web-service-read
      state: present
      commands:
        - /usr/bin/systemctl status nginx
        - /usr/bin/journalctl -u nginx
  rules:
    - name: web-service-administration
      state: present
      enabled: true
      subjects: {users: [], groups: [role-web-service-admin]}
      targets: {hostcat: all, hosts: [], hostgroups: []}
      allow: {command_groups: [web-service-read], commands: []}
      deny: {command_groups: [], commands: []}
      run_as: {users: [root], groups: []}
      options: ['!authenticate']

nfs:
  servers:
    - host: nfs1.ipa.pilot.internal
      state: present
      service_principal:
        ensure: true
        principal: nfs/nfs1.ipa.pilot.internal
        keytab: /etc/krb5.keytab
      # Packages and the NFS server systemd unit are derived from the target
      # OS by freeipa-nfs-server-apply.yml (RedHat or Debian/Ubuntu).
      shares:
        - name: project-alpha
          state: present
          source_path: /srv/nfs/projects/alpha
          ownership: {owner: root, group: data-project-alpha-rw, mode: '2770'}
          acl:
            mode: authoritative
            access:
              owner: rwx
              owning_group: rwx
              others: '---'
              mask: rwx
              named_users: []
              named_groups:
                - {name: data-project-alpha-rw, permissions: rwx}
            default:
              enabled: true
              owner: rwx
              owning_group: rwx
              others: '---'
              mask: rwx
              named_users: []
              named_groups:
                - {name: data-project-alpha-rw, permissions: rwx}
          export:
            clients: [{type: network, value: 192.168.50.0/24}]
            options: [rw, sync, root_squash, sec=krb5i]
          automount:
            enabled: true
            location: default
            mount_root: /projects
            map: auto.projects
            key: alpha
            server: nfs1.ipa.pilot.internal
            remote_path: /projects/alpha
            options: [fstype=nfs4, sec=krb5i, hard, timeo=600, retrans=2]

nfs_clients:
  - hostgroup: nfsclients
    state: present
    automount: {location: default, enable_service: true}
    verification_mounts: [/projects/alpha]
