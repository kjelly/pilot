# Apply playbook for docs/verification/freeipa-server.md
#
# Stands up a FreeIPA server (identity + Kerberos + sudo directory) by a
# NATIVE `ipa-server-install` on an Enterprise-Linux 9 host (AlmaLinux /
# Rocky / RHEL 9), so *other hosts can enroll against it* for central
# account and sudo management.
#
# WHY NATIVE (not a container) — locked-in design, see spec §0/§6:
#   An earlier revision ran FreeIPA as a systemd-in-Docker container
#   (quay.io/freeipa/freeipa-server). It installed every server component
#   (DS/KDC/CA/HTTP) but DETERMINISTICALLY failed at the final self-enroll
#   step: httpd's mod_auth_gssapi could not acquire its HTTP/… acceptor
#   credential (SPNEGO "cannot find mechanisms to negotiate"), regardless of
#   runtime (Docker == podman) or config (gssproxy interposer OR direct
#   keytab). That is a container-level GSSAPI mechglue problem, not a
#   playbook bug. The identical install on a native EL9 host self-enrolls
#   cleanly (`ipa user-find` over SPNEGO returns rc=0). So this playbook
#   installs on the host directly. Do NOT reintroduce a container path here.
#
# Design decisions (locked in the spec, do not change without bumping it):
#   * host-native: all of 389/636/88/464/80/443 bind on the host directly.
#   * NO built-in DNS (no --setup-dns; --no-host-dns skips the DNS precheck
#     since we resolve the FQDN via /etc/hosts): DNS is owned by the
#     existing `dns`(unbound) role; FreeIPA's bind9 would fight over :53.
#   * NO built-in NTP (--no-ntp): time sync is owned by the existing
#     `ntp`(chrony) role. Kerberos needs clock skew < 5 min — a
#     PRE-CONDITION the ntp role handles; asserted/ warned below.
#   * realm IPA.PILOT.INTERNAL / domain ipa.pilot.internal (override with
#     -e ipa_realm=... -e ipa_domain=...). Suffix DN dc=ipa,dc=pilot,dc=internal.
#   * FreeIPA HARD-FORBIDS the server FQDN == domain name; the FQDN must be a
#     host *under* the domain — default ipa1.<domain>.
#
# Secrets: ipa_admin_password (and optional ipa_dm_password) come from a
# vault file, NEVER hard-coded (and the install task is no_log):
#   -e @~/.vault/main.yaml
#
# Usage:
#
#   ansible-playbook -i inventory-freeipa.yaml \
#       playbooks/apply/freeipa-server-apply.yml \
#       -e ipa_server_ip=10.0.0.10 \
#       -e @~/.vault/main.yaml \
#       --check --diff
#
#   # against a pilot vm-target (host lives in group `all`, not freeipa-server):
#   pilot vm-target run --name alma-vm playbooks/apply/freeipa-server-apply.yml \
#       -e target_group=all -e ipa_server_ip=<vm-ip> -e @~/.vault/main.yaml
#
# Stage gating (same convention as core-infra-provider-apply.yml):
#   sandbox  default; runs immediately
#   staging  requires -e confirm_staging=true
#   prod     requires -e confirm_prod=true AND staging_attested_within_hours<=168
---
- name: FreeIPA server apply
  hosts: "{{ target_group | default('freeipa-server') }}"
  become: true
  gather_facts: true
  vars:
    stage: sandbox
    confirm_staging: false
    confirm_prod: false
    staging_attested_within_hours: 168

    # Identity / realm. Overridable from group_vars (place freeipa_domain etc.
    # in group_vars/freeipa.yml next to your inventory — see group_vars/
    # freeipa.example.yml). Defaults preserve the original behaviour, so
    # unset = unchanged (vm-target / existing flows keep working).
    ipa_domain: "{{ freeipa_domain | default('ipa.pilot.internal') }}"
    ipa_server_ip: "{{ freeipa_server_ip | default(ansible_host) }}"
    ipa_realm: "{{ freeipa_realm | default(ipa_domain | upper) }}"
    # FreeIPA HARD-FORBIDS the server FQDN being equal to the domain name
    # ("hostname cannot be the same as the domain name"). The FQDN must be a
    # host *under* the domain — default to ipa1.<domain>. The short alias
    # (ipa1) is derived from this in the /etc/hosts pin below.
    ipa_server_fqdn: "{{ freeipa_server_fqdn | default('ipa1.' ~ ipa_domain) }}"

    # DNS / NTP options (overridable, group_vars/freeipa.yml — see
    # group_vars/freeipa.example.yml). Default to native FreeIPA DNS/NTP
    # (true): this play already hard-gates on EL9 (see the "require EL9
    # host" assert below), and the generic core-infra-provider dns/ntp
    # roles are Debian/Ubuntu-only (ansible.builtin.apt,
    # /etc/systemd/resolved.conf) — there is no working non-native path
    # for this playbook's one supported host family, so `false` was never
    # a safe default here. Set freeipa_setup_dns/ntp: false in group_vars
    # (or -e) to opt back out (e.g. the host already has
    # externally-managed DNS/NTP and should not run its own named/chronyd
    # at all).
    ipa_setup_dns: "{{ freeipa_setup_dns | default(true) }}"
    # Forwarders for the native named FreeIPA installs (--forwarder=...),
    # so the FreeIPA host's own DNS can still resolve the public internet
    # for its own package installs. Defaults to a public resolver rather
    # than --no-forwarders — an unconfigured deploy should still get
    # working DNS, not silently lose internet resolution on its identity
    # server.
    ipa_dns_forwarders_raw: "{{ ipa_dns_forwarders | default(freeipa_dns_forwarders | default(['8.8.8.8'], true), true) }}"
    ipa_setup_ntp: "{{ freeipa_setup_ntp | default(true) }}"
    # NTP servers passed to ipa-server-install as --ntp-server=... when
    # ipa_setup_ntp is true. Defaults to Taiwan's public stratum servers;
    # override in group_vars/freeipa.yml for other regions.
    ipa_ntp_servers: "{{ freeipa_ntp_servers | default(['tock.stdtime.gov.tw', 'watch.stdtime.gov.tw'], true) }}"

    # Native install
    ipa_packages: "{{ ['ipa-server'] + (['ipa-server-dns'] if ipa_setup_dns | bool else []) }}"
    # Use a repo-owned completion marker instead of any FreeIPA internal file.
    # ipa-server-install writes several state files before the server is truly
    # usable, so they are not safe idempotency sentinels on their own.
    ipa_config_marker: /var/lib/ipa/.pilot-freeipa-installed
    ipa_install_timeout_s: 900                       # first install runs 8–12 min

    # DM password defaults to the admin password unless explicitly given
    ipa_dm_password: "{{ ipa_admin_password }}"

    # 389-ds (Directory Server) audit log — records every LDAP write op (and,
    # via auditfaillog, denied writes) so directory mutations are attributable.
    # Off by default in 389-ds; enabled below unless ipa_enable_audit_log=false.
    # The instance name derives from the realm (IPA.PILOT.INTERNAL ->
    # slapd-IPA-PILOT-INTERNAL); audit file lands in
    # /var/log/dirsrv/<instance>/audit. Spec rows C14–C16.
    ipa_enable_audit_log: true
    ipa_ds_instance: "slapd-{{ ipa_realm | replace('.', '-') }}"
    # systemd's dirsrv@<instance>.service does NOT take the "slapd-" prefix
    # (that prefix only applies to filesystem paths under /etc|var/lib|var/log
    # /dirsrv/). Using ipa_ds_instance (with the prefix) as the systemd
    # instance name silently targets a unit that doesn't exist, so
    # stop/reset-failed below become no-ops and a stale dirsrv from a prior
    # failed install keeps holding port 389/636 across retries.
    ipa_ds_service_instance: "{{ ipa_realm | replace('.', '-') }}"

  pre_tasks:
    - name: "Gate: required vars present (fail early, before any mutation)"
      ansible.builtin.assert:
        that:
          - ipa_admin_password is defined and ipa_admin_password | length >= 8
          - ipa_server_ip is defined and ipa_server_ip | length > 0
        fail_msg: >-
          Missing required vars. Pass -e ipa_server_ip=<LAN IP> and a vault file
          with ipa_admin_password (>=8 chars), e.g. -e @~/.vault/main.yaml
      tags: [always]

    - name: "Gate: this playbook installs FreeIPA NATIVELY — require EL9 host"
      ansible.builtin.assert:
        that:
          - ansible_os_family == 'RedHat'
          - (ansible_distribution_major_version | int) >= 9
        fail_msg: >-
          freeipa-server-apply installs ipa-server natively and REQUIRES an
          Enterprise-Linux 9 host (AlmaLinux / Rocky / RHEL 9). Detected
          {{ ansible_distribution }} {{ ansible_distribution_version }}.
          Bring up an EL9 target, e.g. `pilot vm-target up --base-image almalinux-9`.
      tags: [always]

    - name: "Gate: staging or prod requires explicit confirm"
      ansible.builtin.assert:
        that:
          - (stage == 'sandbox') or
            (stage == 'staging' and confirm_staging | bool) or
            (stage == 'prod' and confirm_prod | bool)
        fail_msg: "stage={{ stage }} requires confirm flag. Pass -e confirm_staging=true or confirm_prod=true."
      tags: [always]

    - name: "Gate: stage must match this host's inventory environment group"
      ansible.builtin.assert:
        that:
          - not ('prod' in group_names and stage != 'prod')
          - not ('staging' in group_names and stage != 'staging')
          - not (stage in ['staging', 'prod'] and stage not in group_names)
        fail_msg: >-
          stage={{ stage }} 與 {{ inventory_hostname }} 的 inventory 環境 group 不一致
          (group_names: {{ group_names }})。inventory 的 staging/prod group 只是給
          target_group 篩選用的標籤,不會自動決定 stage——必須自己帶對的 -e stage=,
          且要跟這台機器所屬的環境 group 一致。
      tags: [always]

    - name: "Gate: prod requires recent staging attestation"
      ansible.builtin.assert:
        that:
          - (staging_attested_within_hours | int) <= 168
        fail_msg: "prod gate: staging attestation missing or older than 168h."
      when: stage == 'prod'
      tags: [always]

    # noqa command-instead-of-module - systemctl is used only for a read-only health probe
    - name: "Pre-condition: chrony/NTP active (Kerberos needs clock skew < 5min)"
      ansible.builtin.command: systemctl is-active chronyd ntpd
      register: ipa_ntp_check
      changed_when: false
      failed_when: false
      tags: [always]

    - name: "Detect prior configuration (pre_tasks copy, for the port-53 gate below)"
      ansible.builtin.stat:
        path: "{{ ipa_config_marker }}"
      register: ipa_precheck_cfg
      tags: [always]

    - name: "Normalize DNS forwarders to a list"
      ansible.builtin.set_fact:
        ipa_dns_forwarders_normalized: "{{ (ipa_dns_forwarders_raw | from_yaml) if (ipa_dns_forwarders_raw is string and (ipa_dns_forwarders_raw | trim).startswith('[')) else (ipa_dns_forwarders_raw.split() if ipa_dns_forwarders_raw is string else ipa_dns_forwarders_raw) }}"  # noqa yaml[line-length]
      tags: [always]

    # Only meaningful before the first install: once ipa-server-install has
    # run, its own named/bind9-dns keeps port 53 held forever, so this would
    # otherwise fail every idempotent re-apply (e.g. to change forwarders).
    - name: "Gate: if ipa_setup_dns=true, ensure port 53 is not in use by other services"
      ansible.builtin.wait_for:
        port: 53
        state: stopped
        timeout: 3
      when: ipa_setup_dns | bool and not ipa_precheck_cfg.stat.exists
      tags: [always]

    - name: "Warn if no active time sync (FreeIPA runs with --no-ntp; ntp role must cover this)"
      ansible.builtin.debug:
        msg: >-
          WARNING: no active chronyd/ntpd on this host ({{ ipa_ntp_check.stdout | default('') }}).
          FreeIPA is installed with --no-ntp; apply the `ntp`(chrony) role first or Kerberos
          auth will fail on clock skew.
      when: (not ipa_setup_ntp | bool) and ('active' not in (ipa_ntp_check.stdout | default('')))
      tags: [always]

  tasks:
    # FreeIPA install HARD-REQUIRES the server FQDN to resolve to a
    # non-loopback address, and that FQDN must be the FIRST (canonical) name
    # for that IP in /etc/hosts — otherwise get_server_ip_address aborts with
    # "does not match configured canonical hostname". With --no-host-dns we
    # guarantee resolution via /etc/hosts.
    - name: "FreeIPA — set system hostname to the FQDN"
      ansible.builtin.hostname:
        name: "{{ ipa_server_fqdn }}"
      tags: [freeipa, freeipa-hostname]

    # Single idempotent line: the regexp matches ANY existing mapping for
    # this FQDN, so a stale line (e.g. a different IP from a prior life) is
    # REPLACED in place rather than duplicated — and a rerun with the line
    # already correct is a clean no-op. The FQDN must be the FIRST
    # (canonical) name for the IP or get_server_ip_address aborts with "does
    # not match configured canonical hostname".
    - name: "FreeIPA — pin server FQDN to its LAN IP (FQDN canonical) in /etc/hosts"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '\s{{ ipa_server_fqdn | regex_escape }}(\s|$)'
        line: "{{ ipa_server_ip }} {{ ipa_server_fqdn }} {{ ipa_server_fqdn.split('.')[0] }}"
        state: present
        create: false
      tags: [freeipa, freeipa-hosts]

    - name: "FreeIPA — install server packages (idm:DL1 module stream on EL9)"
      ansible.builtin.dnf:
        name: "{{ ipa_packages }}"
        state: present
      when: not ansible_check_mode
      tags: [freeipa, freeipa-install]

    - name: "FreeIPA — detect prior configuration ({{ ipa_config_marker }})"
      ansible.builtin.stat:
        path: "{{ ipa_config_marker }}"
      register: ipa_cfg
      tags: [freeipa, freeipa-install]

    # Partial installs can leave Dogtag / Kerberos / Custodia units running and
    # holding ports or config state across retries. Stop them before rerunning
    # ipa-server-install so a failed attempt is actually recoverable in-place.
    # noqa command-instead-of-module - the service list is dynamic and only runs during recovery
    - name: "FreeIPA — stop stale IPA/Dogtag services before install retry"
      ansible.builtin.command: "systemctl stop {{ item }}"
      loop:
        - pki-tomcatd@pki-tomcat.service
        - ipa-custodia.service
        - krb5kdc.service
        - ipa.service
        - "dirsrv@{{ ipa_ds_service_instance }}.service"
      changed_when: false
      failed_when: false
      when: not ansible_check_mode and not ipa_cfg.stat.exists
      tags: [freeipa, freeipa-install]

    - name: "FreeIPA — reset failed state for stale IPA/Dogtag services"
      ansible.builtin.command: "systemctl reset-failed {{ item }}"
      loop:
        - pki-tomcatd@pki-tomcat.service
        - ipa-custodia.service
        - krb5kdc.service
        - ipa.service
        - "dirsrv@{{ ipa_ds_service_instance }}.service"
      changed_when: false
      failed_when: false
      when: not ansible_check_mode and not ipa_cfg.stat.exists
      tags: [freeipa, freeipa-install]

    # Stopping the stale dirsrv unit above is NOT enough to make a retry
    # succeed: ipa-server-install's own pre-flight check
    # (lib389 _prepare_ds -> assert_c) refuses to proceed if a DS instance
    # directory / systemd registration for this instance name is still on
    # disk from an earlier partial attempt, and fails with "Another instance
    # named '<X>' may already exist" — even though nothing is running. Since
    # ipa_cfg.stat.exists is only ever true after a FULLY successful install
    # (the marker is touched at the very end, post health-check), anything
    # found here when it's false is guaranteed leftover from a failed/partial
    # attempt and is safe to purge before retrying.
    - name: "FreeIPA — remove dirsrv systemd registration for a stale instance before retry"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/etc/systemd/system/dirsrv@{{ ipa_ds_service_instance }}.service.d"
        - "/etc/systemd/system/multi-user.target.wants/dirsrv@{{ ipa_ds_service_instance }}.service"
      register: ipa_dirsrv_unit_cleanup
      when: not ansible_check_mode and not ipa_cfg.stat.exists
      tags: [freeipa, freeipa-install]

    - name: "FreeIPA — reload systemd after removing stale dirsrv unit registration"
      ansible.builtin.systemd:
        daemon_reload: true
      when: not ansible_check_mode and not ipa_cfg.stat.exists and (ipa_dirsrv_unit_cleanup.changed | default(false))
      tags: [freeipa, freeipa-install]

    # certmonger is a persistent system daemon untouched by the service
    # stop/reset above, so tracking requests from a prior failed attempt
    # (for cert/key files and NSS databases we're about to wipe below)
    # survive across retries. The next install then fails registering new
    # tracking for the same file location with "certmonger.duplicate:
    # Certificate at same location is already used by request with nickname
    # '<X>'". A genuinely fresh host has zero tracked requests anyway, so
    # it's safe to just clear everything certmonger knows about.
    - name: "FreeIPA — list stale certmonger tracking requests before install retry"
      ansible.builtin.shell: |
        set -o pipefail
        getcert list | sed -n "s/^Request ID '\(.*\)':$/\1/p"
      register: ipa_certmonger_requests
      changed_when: false
      failed_when: false
      when: not ansible_check_mode and not ipa_cfg.stat.exists
      tags: [freeipa, freeipa-install]

    - name: "FreeIPA — stop stale certmonger tracking requests before install retry"
      ansible.builtin.command: "getcert stop-tracking -i {{ item }}"
      loop: "{{ ipa_certmonger_requests.stdout_lines | default([]) }}"
      changed_when: true
      failed_when: false
      when: not ansible_check_mode and not ipa_cfg.stat.exists
      tags: [freeipa, freeipa-install]

    - name: "FreeIPA — remove residual DS/PKI state from a prior failed/partial install before retry"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/ipa/default.conf
        - /etc/ipa/default.conf.ipabkp
        - /etc/ipa/ca.crt
        - /etc/ipa/custodia
        - /var/lib/ipa/ra-agent.key
        - /var/lib/ipa/ra-agent.pem
        - /var/lib/ipa/pki-ca
        - /var/lib/ipa-client/pki
        - /var/lib/ipa-client/sysrestore
        - /var/lib/ipa/sysrestore
        - /var/lib/ipa/sysupgrade
        - "/etc/dirsrv/{{ ipa_ds_instance }}"
        - "/var/lib/dirsrv/{{ ipa_ds_instance }}"
        - "/var/log/dirsrv/{{ ipa_ds_instance }}"
        # 389-ds's BDB backend maps its environment region into /dev/shm.
        # Deleting /var/lib/dirsrv/<instance> without also clearing this
        # leaves a stale shared-memory region that doesn't match the freshly
        # recreated on-disk DB files, and the next dirsrv start PANICs with
        # "BDB0060 fatal region error detected; run recovery" instead of
        # creating a fresh environment.
        - "/dev/shm/{{ ipa_ds_instance }}"
        - /var/lib/pki/pki-tomcat
        - /etc/pki/pki-tomcat
        - /etc/sysconfig/pki/tomcat/pki-tomcat
        # /var/lib/pki/pki-tomcat/logs is a symlink into this separate log
        # tree, which we never otherwise touch. `pki-server acme-create`
        # calls create_logs() without exist_ok, so a stale logs/acme
        # subdirectory left by a prior attempt makes it fail with
        # "FileExistsError: [Errno 17] File exists: '.../logs/acme'".
        - /var/log/pki/pki-tomcat
        # The CA install step exports the CA admin cert via `pki
        # pkcs12-cert-export`, checked against the NSS db under
        # /root/.dogtag. A stale nssdb/p12 from a prior attempt holds cert
        # material for a CA that no longer exists once we've wiped
        # /var/lib/pki/pki-tomcat above, so the export fails with "Digests
        # do not match" instead of regenerating fresh credentials.
        - /root/.dogtag
        - /root/ca-agent.p12
        - /root/cacert.p12
      when: not ansible_check_mode and not ipa_cfg.stat.exists
      tags: [freeipa, freeipa-install]

    - name: "FreeIPA — ensure installer state directories exist"
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: /etc/ipa, mode: "0755" }
        - { path: /etc/ipa/custodia, mode: "0755" }
        - { path: /var/lib/ipa, mode: "0755" }
        - { path: /var/lib/ipa-client, mode: "0755" }
        - { path: /var/lib/ipa-client/pki, mode: "0755" }
        # ipa-server-install's embedded `ipa-client-install --on-master` step
        # writes its sysrestore.state here via a raw open(path, "w") that
        # never mkdir's the parent, so on a host that's never had it,
        # ipa-client-install fails with "FileNotFoundError: ... No such file
        # or directory: '/var/lib/ipa-client/sysrestore/sysrestore.state'",
        # which ipa-server-install then reports as "Configuration of client
        # side components failed!" after LDAP/CA/dirsrv are already set up.
        - { path: /var/lib/ipa-client/sysrestore, mode: "0700" }
        - { path: /var/lib/ipa/pki-ca, mode: "0755" }
        - { path: /var/lib/ipa/pki-ca/publish, mode: "0755" }
        - { path: /var/lib/ipa/sysrestore, mode: "0700" }
        - { path: /var/lib/ipa/sysupgrade, mode: "0700" }
        # ipa-getkeytab writes the HTTP service keytab straight into this
        # directory during HTTPInstance creation; nothing earlier in the
        # install flow creates it first (it only checks whether a keytab
        # file already exists there to decide on a backup, never mkdir's the
        # parent), so on a host that's never had it, ipa-getkeytab fails with
        # "Failed to add key to the keytab" (ENOENT on the parent dir).
        - { path: /var/lib/ipa/gssproxy, mode: "0700" }
        # systemd auto-prunes a unit's ".wants" directory once the last
        # symlink in it is removed. Our own "stop stale services" step above
        # runs `systemctl disable pki-tomcatd@...` on every retry, which
        # empties (and thus deletes) this directory; dogtag's CA installer
        # then recreates its enablement symlink with a raw os.symlink() call
        # rather than `systemctl enable`, so it assumes the directory already
        # exists and crashes with FileNotFoundError if it doesn't.
        - { path: /etc/systemd/system/pki-tomcatd.target.wants, mode: "0755" }
      when: not ansible_check_mode
      tags: [freeipa, freeipa-install]

    # ipa-server-install is NOT idempotent (re-running on a configured host
    # errors with "IPA server is already configured"). `creates:` makes this
    # task a no-op once the sysrestore state file exists, so the playbook is
    # idempotent by construction. no_log: true keeps the admin/DM passwords
    # out of Ansible's logs (they are still only ever supplied from vault).
    - name: "FreeIPA — run ipa-server-install (native; first run is 8–12 min)"
      ansible.builtin.command:
        argv: "{{ ipa_install_args }}"
        creates: "{{ ipa_config_marker }}"
      vars:
        ipa_install_base_args:
          - ipa-server-install
          - "-U"
          - "-r"
          - "{{ ipa_realm }}"
          - "-n"
          - "{{ ipa_domain }}"
          - "-p"
          - "{{ ipa_dm_password }}"
          - "-a"
          - "{{ ipa_admin_password }}"
          - "--ip-address={{ ipa_server_ip }}"
          - "--hostname={{ ipa_server_fqdn }}"
        ipa_install_dns_args: >-
          {{
            ['--setup-dns'] + (
              ['--no-forwarders'] if (ipa_dns_forwarders_normalized | length == 0)
              else (ipa_dns_forwarders_normalized | map('regex_replace', '^(.*)$', '--forwarder=\1') | list)
            )
            if ipa_setup_dns | bool
            else ['--no-host-dns']
          }}
        ipa_install_ntp_args: >-
          {{
            (ipa_ntp_servers | map('regex_replace', '^(.*)$', '--ntp-server=\1') | list)
            if ipa_setup_ntp | bool
            else ['--no-ntp']
          }}
        ipa_install_args: "{{ ipa_install_base_args + ipa_install_dns_args + ipa_install_ntp_args }}"
      register: ipa_install
      no_log: true
      when: not ansible_check_mode
      tags: [freeipa, freeipa-install]

    - name: "FreeIPA — enable + start ipa.service (survives reboot)"
      ansible.builtin.systemd:
        name: ipa
        state: started
        enabled: true
      when: not ansible_check_mode
      tags: [freeipa, freeipa-service]

    - name: "FreeIPA — bring-up health + LDAP checks"
      when: not ansible_check_mode
      tags: [freeipa, freeipa-verify]
      block:
        - name: "FreeIPA — wait until all IPA services RUNNING (spec C2)"
          ansible.builtin.command: ipactl status
          register: ipa_health
          changed_when: false
          # Healthy iff no service is STOPPED/FAILED. During the (idempotent)
          # rerun path services are already up so this passes on the first
          # try; on a host that is still settling we poll until the budget is
          # exhausted. failed_when:false so the assert below surfaces a clean
          # diagnostic instead of a raw module failure.
          until: >-
            ipa_health.rc == 0 and
            'STOPPED' not in ipa_health.stdout and
            'FAILED' not in ipa_health.stdout
          retries: "{{ (ipa_install_timeout_s | int) // 15 }}"
          delay: 15
          failed_when: false

        - name: "FreeIPA — show last ipactl status when still not healthy"
          ansible.builtin.debug:
            var: ipa_health.stdout_lines
          when: (ipa_health.rc | default(1)) != 0

        - name: "FreeIPA — fail loudly if services never came up (spec C2)"
          ansible.builtin.assert:
            that:
              - ipa_health.rc == 0
              - "'STOPPED' not in ipa_health.stdout"
              - "'FAILED' not in ipa_health.stdout"
            fail_msg: >-
              ipactl status never reported healthy within {{ ipa_install_timeout_s }}s.
              Last output: {{ ipa_health.stdout | default('(none)') }}

        - name: "FreeIPA — final check: LDAP rootDSE advertises realm suffix (spec C11)"
          ansible.builtin.command: ldapsearch -x -H ldap://localhost -b "" -s base namingContexts
          register: ipa_ldap
          changed_when: false
          failed_when: >-
            ('dc=' + ipa_domain.replace('.', ',dc=')) not in (ipa_ldap.stdout | default(''))

        - name: "FreeIPA — mark installation complete"
          ansible.builtin.copy:
            dest: "{{ ipa_config_marker }}"
            content: ""
            force: false
            owner: root
            group: root
            mode: "0644"

        # --setup-dns with no forwarders (the default when
        # freeipa_dns_forwarders is unset) installs named with
        # --no-forwarders: it only ever answers queries for ipa_domain, so
        # every other lookup — including this host's own dnf/apt package
        # installs — NXDOMAINs once /etc/resolv.conf points at 127.0.0.1.
        # ipa-server-install itself has no forwarders flag to change after
        # the fact, so this is applied post-install via the same `ipa`
        # CLI freeipa-identity-apply.yml already uses for HBAC/sudo data.
        - name: "FreeIPA DNS — configure upstream forwarders (external resolution)"
          when: ipa_setup_dns | bool and (ipa_dns_forwarders_normalized | length > 0)
          block:
            - name: "Kinit admin (for dnsconfig-mod)"  # noqa risky-shell-pipe
              ansible.builtin.shell:
                cmd: 'printf %s "{{ ipa_admin_password }}" | kinit admin@{{ ipa_realm }}'
                executable: /bin/bash
              changed_when: false
              no_log: true

            - name: "FreeIPA DNS — set global forwarders"
              ansible.builtin.command:
                argv: "{{ ['ipa', 'dnsconfig-mod'] + (ipa_dns_forwarders_normalized | map('regex_replace', '^(.*)$', '--forwarder=\\1') | list) }}"
              register: ipa_dnsconfig
              changed_when: >-
                ipa_dnsconfig.rc == 0 and
                'no modifications to be performed' not in
                (ipa_dnsconfig.stderr | default('') ~ ipa_dnsconfig.stdout | default(''))
              failed_when: >-
                ipa_dnsconfig.rc != 0 and
                'no modifications to be performed' not in (ipa_dnsconfig.stderr | default('') ~ ipa_dnsconfig.stdout | default(''))

      rescue:
        - name: "FreeIPA — rescue: dump ipactl status"
          ansible.builtin.command: ipactl status
          register: ipa_rescue_status
          changed_when: false
          failed_when: false

        - name: "FreeIPA — rescue: tail install log"
          ansible.builtin.command: tail -n 60 /var/log/ipaserver-install.log
          register: ipa_rescue_log
          changed_when: false
          failed_when: false

        - name: "FreeIPA — rescue: surface diagnostics + fail"
          ansible.builtin.fail:
            msg: |
              FreeIPA bring-up FAILED. Diagnostics:
              --- ipactl status ---
              {{ ipa_rescue_status.stdout | default('(unavailable)') }}
              {{ ipa_rescue_status.stderr | default('') }}
              --- /var/log/ipaserver-install.log (tail 60) ---
              {{ ipa_rescue_log.stdout | default('(unavailable)') }}
              Common causes: FQDN not resolving to a non-loopback IP (check /etc/hosts
              has "{{ ipa_server_ip }} {{ ipa_server_fqdn }}" with the FQDN FIRST);
              clock skew (apply ntp role — Kerberos needs < 5 min); a half-finished
              prior install (run `ipa-server-install --uninstall -U` then rerun).

    # 389-ds (Directory Server) audit log — spec C14–C16. Turns on the
    # directory-service audit log so every LDAP write (user/group/sudo-rule
    # change) and every DENIED write is recorded to
    # /var/log/dirsrv/{{ ipa_ds_instance }}/audit, attributable by bind DN.
    # 389-ds ships this OFF by default. dsconf autobinds as root over the
    # ldapi socket (we are `become: true`), so NO Directory Manager password
    # is needed here. The change is DYNAMIC — it takes effect immediately,
    # no dirsrv restart. Idempotent by construction: we read the current
    # config first and only `config replace` when a flag is not already `on`.
    # Skipped in --check mode (needs a live install) and when the operator
    # opts out with -e ipa_enable_audit_log=false.
    - name: "FreeIPA — 389-ds audit log: enable directory-service auditing (spec C14–C16)"
      when: not ansible_check_mode and (ipa_enable_audit_log | bool)
      tags: [freeipa, freeipa-audit]
      block:
        - name: "FreeIPA — 389-ds audit log: read current logging config"
          ansible.builtin.command:
            argv:
              - dsconf
              - "{{ ipa_ds_instance }}"
              - config
              - get
              - nsslapd-auditlog-logging-enabled
              - nsslapd-auditfaillog-logging-enabled
          register: ipa_ds_audit_cfg
          changed_when: false

        - name: "FreeIPA — 389-ds audit log: turn on write + failed-write auditing (dynamic, no restart)"
          ansible.builtin.command:
            argv:
              - dsconf
              - "{{ ipa_ds_instance }}"
              - config
              - replace
              - nsslapd-auditlog-logging-enabled=on
              - nsslapd-auditfaillog-logging-enabled=on
          when: >-
            ('nsslapd-auditlog-logging-enabled: on' not in ipa_ds_audit_cfg.stdout) or
            ('nsslapd-auditfaillog-logging-enabled: on' not in ipa_ds_audit_cfg.stdout)
          changed_when: true

        - name: "FreeIPA — 389-ds audit log: write dummy description to trigger audit log (spec C16)"
          ansible.builtin.shell: |
            if [ ! -s /var/log/dirsrv/{{ ipa_ds_instance }}/audit ]; then
            ldapmodify -x -H ldap://localhost -D "cn=Directory Manager" -w "{{ ipa_dm_password }}" <<EOF
            dn: dc={{ ipa_domain.replace('.', ',dc=') }}
            changetype: modify
            replace: description
            description: FreeIPA Directory Server for pilot.internal (initialized at {{ ansible_date_time.iso8601 }})
            EOF
              echo "INITIALIZED"
            fi
          register: audit_init
          changed_when: "'INITIALIZED' in audit_init.stdout"
          no_log: true
