# Apply playbook for docs/verification/prometheus.md v1.1
#
# Per-site role: runs Prometheus + a Thanos Sidecar as a pair of Docker
# containers on the SAME host, sharing Prometheus's TSDB data directory so
# the sidecar can ship completed 2h blocks to S3-compatible object storage
# and serve recent local data over its gRPC StoreAPI. Designed to be applied
# independently per machine-room/site (like wazuh-fim is applied per agent
# host) — this role never needs to know where the central
# docs/verification/thanos-query.md host is; the relationship is inverted,
# the central Thanos Query reaches OUT to each site's sidecar.
#
# v1.1 also wires each site's Prometheus to the central Alertmanager
# (docs/verification/alertmanager.md) for alerting: seed rules
# (Watchdog + PrometheusDown + HostDown) are always loaded and evaluated
# locally, and the `alerting.alertmanagers` block is rendered only when
# `alertmanager_target_host` is set (escape hatch, see spec §1.5).
#
# Pre-flight: docs/verification/docker.md PASS (docker.io + docker.service).
#
# Usage (default: SeaweedFS S3 gateway built by seaweedfs-s3-apply.yml):
#
#   go run ./cmd/pilot vm-target run --name site-a \
#       playbooks/apply/prometheus-apply.yml \
#       -e target_group=prometheus \
#       -e prometheus_site_label=site-a \
#       -e thanos_s3_target_host=<seaweedfs-s3 IP> \
#       -e alertmanager_target_host=<alertmanager central IP> \
#       -e thanos_aws_access_key_id=<key> \
#       -e thanos_aws_secret_access_key=<secret>
#
# Usage (external S3, fully overridden endpoint — no /etc/hosts pin):
#
#   ... -e thanos_s3_endpoint=s3.internal.example.com:443 \
#       -e thanos_aws_access_key_id=... -e thanos_aws_secret_access_key=...
#
# Per-host custom scrape scope (see docs/verification/prometheus.md §1.5):
#
#   -e '{"prometheus_scrape_configs": "- job_name: node\n  static_configs:\n    - targets: [\"localhost:9100\"]\n"}'
#   (in a real inventory, set this in host_vars/<hostname>.yml instead of -e)
#
# Per-host custom alert rules (override the seed; usually leave default):
#
#   -e @host_vars/<hostname>.yml  # with prometheus_alert_rules: |
#
# Variables: see docs/verification/prometheus.md §1.5.
#
# Stage gating (same convention as freeipa-server-apply.yml):
#   sandbox  default; runs immediately
#   staging  requires -e confirm_staging=true
#   prod     requires -e confirm_prod=true AND staging_attested_within_hours<=168
- name: Apply prometheus (per-site Prometheus + Thanos Sidecar)
  hosts: "{{ target_group | default('prometheus') }}"
  become: true
  gather_facts: true
  vars:
    stage: sandbox
    confirm_staging: false
    confirm_prod: false
    staging_attested_within_hours: 168
    prometheus_version: "v2.53.0"
    thanos_version: "v0.36.1"
    prometheus_host_data_dir: /var/lib/pilot/prometheus
    prometheus_config_dir: /etc/pilot/prometheus
    thanos_config_dir: /etc/pilot/thanos
    docker_network_name: pilot-metrics
    # prometheus_site_label / thanos_s3_target_host / alertmanager_target_host
    # are DELIBERATELY NOT declared here (not even as `default('')`). Ansible
    # play-level `vars:` outrank both group_vars and host_vars, so declaring
    # them with a hardcoded "" here would silently shadow any value a caller
    # sets via `pilot edit`'s group_vars editor, forcing `-e` for every
    # deploy (real bug, found + fixed post-hoc — see
    # docs/runbooks/minimal-poc-architecture.md § Real bugs #1). Leaving
    # them undeclared lets normal precedence apply: group_vars/host_vars
    # values now win with no `-e` needed, while `-e` still overrides on top.
    # Every task below that references one of these three uses
    # `| default('', true)` at the point of use instead, so an unset value
    # still resolves to an empty string (never an undefined-variable error).
    prometheus_scrape_interval: "15s"
    prometheus_retention_time: "6h"
    prometheus_scrape_configs: |
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
    thanos_s3_alias: thanos-s3-backend
    thanos_s3_port: 8333
    thanos_s3_bucket: pilot-thanos-metrics
    thanos_s3_endpoint: "{{ thanos_s3_alias }}:{{ thanos_s3_port }}"
    alertmanager_alias: alertmanager-backend
    alertmanager_port: 9093
    # prometheus_alert_rules_file: path (relative to the playbook) to a
    # Prometheus rules YAML file. The default is the seed file shipped in
    # playbooks/apply/files/. Operators override by passing
    # `-e prometheus_alert_rules_file=host_vars/mysite-alerts.yml` (the
    # path is still relative to the playbook's directory at apply time).
    # The file content is NOT rendered through Jinja — Prometheus's own
    # `{{ $labels.X }}` template syntax is preserved verbatim. This is
    # why the contract is a file path, not an inline string (mirroring
    # the trade-off taken for `prometheus_scrape_configs` would clash
    # with Jinja on the `{{ ... }}` inside alert annotations).
    prometheus_alert_rules_file: files/pilot-alert-rules-seed.yml

  pre_tasks:
    - name: "Gate: staging or prod requires explicit confirm"
      ansible.builtin.assert:
        that:
          - (stage == 'sandbox') or
            (stage == 'staging' and confirm_staging | bool) or
            (stage == 'prod' and confirm_prod | bool)
        fail_msg: "stage={{ stage }} requires confirm flag. Pass -e confirm_staging=true or confirm_prod=true."
      tags: [always]

    - name: "Gate: stage must match this host's inventory environment group"
      ansible.builtin.assert:
        that:
          - not ('prod' in group_names and stage != 'prod')
          - not ('staging' in group_names and stage != 'staging')
          - not (stage in ['staging', 'prod'] and stage not in group_names)
        fail_msg: >-
          stage={{ stage }} 與 {{ inventory_hostname }} 的 inventory 環境 group 不一致
          (group_names: {{ group_names }})。inventory 的 staging/prod group 只是給
          target_group 篩選用的標籤,不會自動決定 stage——必須自己帶對的 -e stage=,
          且要跟這台機器所屬的環境 group 一致。
      tags: [always]

    - name: "Gate: prod requires recent staging attestation"
      ansible.builtin.assert:
        that:
          - (staging_attested_within_hours | int) <= 168
        fail_msg: "prod gate: staging attestation missing or older than 168h."
      when: stage == 'prod'
      tags: [always]

    # prometheus_site_label has no safe default (see spec §1.5 for why —
    # unlike wazuh_manager_host/siem_forward_host, a blank/placeholder
    # default would silently collide across sites once a second one is
    # deployed instead of failing loudly).
    - name: "Gate: prometheus_site_label required"
      ansible.builtin.assert:
        that:
          - prometheus_site_label is defined and prometheus_site_label | length > 0
        fail_msg: >-
          prometheus_site_label is required (e.g. -e prometheus_site_label=site-a)
          — see docs/verification/prometheus.md §1.5 for why there is no default.

    - name: "Gate: required S3 secrets present (fail early, before any mutation)"
      ansible.builtin.assert:
        that:
          - thanos_aws_access_key_id is defined and thanos_aws_access_key_id | length > 0
          - thanos_aws_secret_access_key is defined and thanos_aws_secret_access_key | length > 0
        fail_msg: >-
          Missing required secrets. Pass -e thanos_aws_access_key_id=... -e
          thanos_aws_secret_access_key=... (vault file recommended over -e
          in real inventories).

    # Same "no reachable destination" trap as restic-backup.md's gate.
    - name: "Gate: S3 destination must be resolvable"
      ansible.builtin.assert:
        that:
          - (thanos_s3_target_host | default('', true) | length > 0) or (thanos_s3_alias not in thanos_s3_endpoint)
        fail_msg: >-
          thanos_s3_target_host is empty AND thanos_s3_endpoint still uses
          the default thanos-s3-backend alias — Thanos would have no
          reachable object storage. Either pass -e thanos_s3_target_host=<S3
          IP/FQDN> (default SeaweedFS S3 gateway target), or override
          -e thanos_s3_endpoint=... to a fully externally-resolvable
          host:port.

  tasks:
    - name: "Pin {{ thanos_s3_alias }} -> {{ thanos_s3_target_host | default('', true) }} in /etc/hosts"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '\s{{ thanos_s3_alias }}$'
        line: "{{ thanos_s3_target_host | default('', true) }}\t{{ thanos_s3_alias }}"
        state: present
      when: thanos_s3_target_host | default('', true) | length > 0

    - name: "Pin {{ alertmanager_alias }} -> {{ alertmanager_target_host | default('', true) }} in /etc/hosts"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '\s{{ alertmanager_alias }}$'
        line: "{{ alertmanager_target_host | default('', true) }}\t{{ alertmanager_alias }}"
        state: present
      when: alertmanager_target_host | default('', true) | length > 0

    - block:
        # prom/prometheus's official image runs as the "nobody" user
        # (uid/gid 65534), not root — the bind-mounted data dir must be
        # owned by that uid or Prometheus fails to write its TSDB at
        # startup (permission denied). Thanos Sidecar only needs read
        # access to this same directory (mounted :ro below), so it doesn't
        # need matching ownership.
        - name: "Ensure Prometheus host data dir (owned by container's nobody uid)"
          ansible.builtin.file:
            path: "{{ prometheus_host_data_dir }}"
            state: directory
            owner: "65534"
            group: "65534"
            mode: "0755"

        - name: "Ensure config dirs exist"
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: "0755"
          loop:
            - "{{ prometheus_config_dir }}"
            - "{{ thanos_config_dir }}"

        # Spec: docs/verification/prometheus.md C8, C11
        # --storage.tsdb.min-block-duration/max-block-duration are both
        # pinned to 2h below (not just retention): this disables
        # Prometheus's own local compaction into larger blocks, which is a
        # hard requirement for the Sidecar to be able to ship 2h blocks to
        # object storage — Thanos Compactor (on the thanos-query host) owns
        # compaction/downsampling/retention from that point on.
        - name: "Render prometheus.yml (with alerting.alertmanagers)"
          tags: [C8, C11]
          ansible.builtin.copy:
            dest: "{{ prometheus_config_dir }}/prometheus.yml"
            mode: "0644"
            content: |
              global:
                scrape_interval: {{ prometheus_scrape_interval }}
                external_labels:
                  site: {{ prometheus_site_label }}
              rule_files:
                - /etc/prometheus/alert-rules.yml
              alerting:
                alertmanagers:
                  - static_configs:
                      - targets:
                          - "{{ alertmanager_alias }}:{{ alertmanager_port }}"
              scrape_configs:
              {{ prometheus_scrape_configs }}
          register: prometheus_yml_with_am
          when: alertmanager_target_host | default('', true) | length > 0

        - name: "Render prometheus.yml (without alerting — alertmanager_target_host empty)"
          tags: [C8]
          ansible.builtin.copy:
            dest: "{{ prometheus_config_dir }}/prometheus.yml"
            mode: "0644"
            content: |
              global:
                scrape_interval: {{ prometheus_scrape_interval }}
                external_labels:
                  site: {{ prometheus_site_label }}
              rule_files:
                - /etc/prometheus/alert-rules.yml
              scrape_configs:
              {{ prometheus_scrape_configs }}
          register: prometheus_yml_no_am
          when: alertmanager_target_host | default('', true) | length == 0

        - name: "Consolidate prometheus.yml result (for unified restart-gate below)"
          ansible.builtin.set_fact:
            prometheus_yml_result: >-
              {{ prometheus_yml_with_am
                 | default({'changed': False})
                 | combine(prometheus_yml_no_am | default({'changed': False})) }}

        # Spec: docs/verification/prometheus.md C10
        # Use `copy: src:` (not `content:`) because Prometheus rules files
        # contain `{{ $labels.X }}` template syntax that would clash with
        # Ansible's Jinja pass on an inline `content` string (this was a
        # real apply-time failure before switching to file-path semantics).
        - name: "Render alert-rules.yml (seed by default, override per host via prometheus_alert_rules_file)"
          tags: [C10]
          ansible.builtin.copy:
            src: "{{ prometheus_alert_rules_file }}"
            dest: "{{ prometheus_config_dir }}/alert-rules.yml"
            mode: "0644"
          register: alert_rules_result

        # SeaweedFS never implicitly creates a bucket on PutObject, so a
        # fresh destination makes the Thanos sidecar's upload (and, once
        # thanos-query-apply.yml also runs, Store Gateway/Compactor) crash
        # or retry forever instead of failing fast (docker logs
        # pilot-thanos-sidecar / pilot-thanos-store would show "The
        # specified bucket does not exist"). This used to require a manual
        # `docker exec pilot-seaweedfs ... weed shell` before the first
        # apply — same idea as restic-backup-apply.yml's "Step 2b", which
        # this mirrors. thanos-query-apply.yml has the identical block for
        # its own bucket_use, so this bucket ends up ensured regardless of
        # whether prometheus or thanos-query happens to run first.
        - name: "Step: Ensure Thanos S3 bucket exists on the SeaweedFS host (idempotent)"  # noqa run-once[task]
          when: >-
            thanos_s3_alias in thanos_s3_endpoint
            and (groups.get('seaweedfs-s3', []) | length > 0)
          run_once: true
          delegate_to: "{{ groups.get('seaweedfs-s3', [inventory_hostname]) | first }}"
          block:
            - name: "Step: check Thanos S3 bucket exists"
              community.docker.docker_container_exec:
                container: pilot-seaweedfs
                command: sh -c "echo 's3.bucket.list' | weed shell"
              register: thanos_seaweedfs_bucket_list
              changed_when: false
              check_mode: false

            - name: "Step: create Thanos S3 bucket if missing"
              community.docker.docker_container_exec:
                container: pilot-seaweedfs
                command: "sh -c \"echo 's3.bucket.create -name {{ thanos_s3_bucket }}' | weed shell\""
              when: thanos_s3_bucket not in thanos_seaweedfs_bucket_list.stdout
              changed_when: true

        # Contains the S3 secret key — no_log so it never hits Ansible's
        # own output/logs. mode 0644 (not 0600) is a deliberate tradeoff:
        # both prom/prometheus and thanosio/thanos containers read this via
        # a bind-mount as their own (non-root, non-matching-uid) user, and
        # matching every possible image's uid exactly is brittle across
        # version bumps. Acceptable for this project's sandbox/lab scope;
        # a real production deployment should prefer a secrets-manager
        # integration instead of a mounted file.
        - name: "Render Thanos objstore config (S3 backend)"
          ansible.builtin.copy:
            dest: "{{ thanos_config_dir }}/objstore.yml"
            mode: "0644"
            content: |
              type: S3
              config:
                bucket: "{{ thanos_s3_bucket }}"
                endpoint: "{{ thanos_s3_endpoint }}"
                access_key: "{{ thanos_aws_access_key_id }}"
                secret_key: "{{ thanos_aws_secret_access_key }}"
                insecure: true
          no_log: true
          register: objstore_yml_result

        - name: "Ensure docker network {{ docker_network_name }} exists"
          community.docker.docker_network:
            name: "{{ docker_network_name }}"
            state: present

        # Spec: docs/verification/prometheus.md C1, C3, C4, C7, C8, C12
        - name: "Prometheus — run pilot-prometheus container"
          tags: [C1, C3, C4, C7, C8, C12]
          community.docker.docker_container:
            name: pilot-prometheus
            image: "prom/prometheus:{{ prometheus_version }}"
            state: started
            restart_policy: unless-stopped
            restart: "{{ prometheus_yml_result is changed or alert_rules_result is changed }}"
            networks:
              - name: "{{ docker_network_name }}"
            command: >-
              --config.file=/etc/prometheus/prometheus.yml
              --storage.tsdb.path=/prometheus
              --storage.tsdb.retention.time={{ prometheus_retention_time }}
              --storage.tsdb.min-block-duration=2h
              --storage.tsdb.max-block-duration=2h
              --web.enable-lifecycle
            volumes:
              - "{{ prometheus_config_dir }}/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
              - "{{ prometheus_config_dir }}/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro"
              - "{{ prometheus_host_data_dir }}:/prometheus"
            ports:
              - "9090:9090"

        - name: "Wait for Prometheus to become ready"
          ansible.builtin.uri:
            url: "http://127.0.0.1:9090/-/ready"
            status_code: 200
          register: prometheus_ready
          until: prometheus_ready.status == 200
          retries: 30
          delay: 2

        # Spec: docs/verification/prometheus.md C2, C5, C6, C9
        - name: "Thanos Sidecar — run pilot-thanos-sidecar container"
          tags: [C2, C5, C6, C9]
          community.docker.docker_container:
            name: pilot-thanos-sidecar
            image: "thanosio/thanos:{{ thanos_version }}"
            state: started
            restart_policy: unless-stopped
            restart: "{{ objstore_yml_result is changed }}"
            networks:
              - name: "{{ docker_network_name }}"
            command: >-
              sidecar
              --tsdb.path=/prometheus
              --prometheus.url=http://pilot-prometheus:9090
              --objstore.config-file=/etc/thanos/objstore.yml
              --http-address=0.0.0.0:10902
              --grpc-address=0.0.0.0:10901
            volumes:
              - "{{ prometheus_host_data_dir }}:/prometheus:ro"
              - "{{ thanos_config_dir }}/objstore.yml:/etc/thanos/objstore.yml:ro"
            ports:
              - "10901:10901"
              - "10902:10902"

        - name: "Wait for Thanos Sidecar to become ready"
          ansible.builtin.uri:
            url: "http://127.0.0.1:10902/-/ready"
            status_code: 200
          register: sidecar_ready
          until: sidecar_ready.status == 200
          retries: 30
          delay: 2

      rescue:
        - name: "ROLLBACK — remove the objstore config file (contains S3 secret)"
          ansible.builtin.file:
            path: "{{ thanos_config_dir }}/objstore.yml"
            state: absent

        - name: "ROLLBACK — surface the original failure"
          ansible.builtin.fail:
            msg: >-
              prometheus apply FAILED (see task output above); the objstore
              secret file was removed. Containers (if created) are left in
              place for inspection via `docker logs pilot-prometheus` /
              `docker logs pilot-thanos-sidecar`.
