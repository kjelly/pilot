---
# Apply playbook for docs/verification/core-infra-provider-db.md
#
# Single-role playbook: runs the PostgreSQL backing store for
# Keycloak. Split out of playbooks/apply/core-infra-provider-apply.yml
# (which now only owns the dns/ntp/docker provider roles).
#
# Pre-flight: docker engine must be up (spec docs/verification/docker.md
# 8/8 PASS). Otherwise the docker_container / docker_network tasks fail
# with "Cannot connect to the Docker daemon".
#
# Implementation: a single docker run with data dir bind-mounted to
# /var/lib/pilot/postgres on the host. The container is on a private
# bridge network (pilot-infra) and exposes 5432/tcp to the keycloak
# container via DNS (postgres container name). Idempotent: a
# pre-existing container is left alone; `docker start` is a no-op for
# a running container.
#
# Usage (sandbox):
#
#   go run ./cmd/pilot vm-target run --name core \
#       playbooks/apply/keycloak-db-apply.yml \
#       -e target_group=keycloak-db \
#       -e pg_keycloak_db_password=sandbox-db-password-123
#
# Stage gating:
#   sandbox  default; runs immediately
#   staging  requires -e confirm_staging=true
#   prod     requires -e confirm_prod=true AND -e staging_attested_within_hours<=168
- name: Keycloak PostgreSQL backing store apply
  hosts: "{{ target_group | default('keycloak-db') }}"
  become: true
  gather_facts: true
  vars:
    stage: sandbox
    confirm_staging: false
    confirm_prod: false
    staging_attested_within_hours: 168
    backup_suffix: .pre-keycloak-db.bak
    pg_version: "16"
    pg_host_data_dir: /var/lib/pilot/postgres
    target_group: keycloak-db

  pre_tasks:
    - name: "Gate: staging or prod requires explicit confirm"
      ansible.builtin.assert:
        that:
          - (stage == 'sandbox') or
            (stage == 'staging' and confirm_staging | bool) or
            (stage == 'prod' and confirm_prod | bool)
        fail_msg: "stage={{ stage }} requires confirm flag. Pass -e confirm_staging=true or confirm_prod=true."

    - name: "Gate: stage must match this host's inventory environment group"
      ansible.builtin.assert:
        that:
          - not ('prod' in group_names and stage != 'prod')
          - not ('staging' in group_names and stage != 'staging')
          - not (stage in ['staging', 'prod'] and stage not in group_names)
        fail_msg: >-
          stage={{ stage }} 與 {{ inventory_hostname }} 的 inventory 環境 group 不一致
          (group_names: {{ group_names }})。inventory 的 staging/prod group 只是給
          target_group 篩選用的標籤,不會自動決定 stage——必須自己帶對的 -e stage=,
          且要跟這台機器所屬的環境 group 一致。

    - name: "Gate: prod requires recent staging attestation"
      ansible.builtin.assert:
        that:
          - stage != 'prod'
          - (staging_attested_within_hours | int) <= 168
        fail_msg: "prod gate: staging attestation missing or older than 168h."
      when: stage == 'prod'

    - name: "Pre-flight: docker engine is up (spec docs/verification/docker.md)"
      ansible.builtin.command: docker info
      register: docker_pre
      changed_when: false
      # See wazuh-manager-apply.yml's matching preflight for why rc!=0 must
      # not fail the mandatory check-mode gate on a from-scratch host.
      failed_when: docker_pre.rc != 0 and not ansible_check_mode
      check_mode: false

  tasks:
    # Spec: docs/verification/core-infra-provider-db.md C8
    - name: "DB — ensure host data dir for postgres"
      tags: [db, db-C8]
      ansible.builtin.file:
        path: "{{ pg_host_data_dir }}"
        state: directory
        owner: 999   # postgres UID inside the image
        group: 999
        mode: '0700'

    # docker_image/docker_network/docker_container need a live daemon to
    # compute their diff even under --check; deferred to the real apply on
    # a from-scratch host, same convention as wazuh-manager-apply.yml.
    # Spec: docs/verification/core-infra-provider-db.md C2
    - name: "DB — pull postgres:{{ pg_version }} image"
      tags: [db, db-C2]
      community.docker.docker_image:
        name: "postgres:{{ pg_version }}"
        source: pull
      when: not ansible_check_mode

    # pilot-infra is the bridge network shared with the Keycloak
    # container; created here (idempotent — re-creating an existing
    # network is a no-op).
    - name: "DB — create pilot-infra docker network"
      tags: [db]
      community.docker.docker_network:
        name: pilot-infra
        state: present
      when: not ansible_check_mode

    # Spec: docs/verification/core-infra-provider-db.md C1, C2, C3, C8, C9
    - name: "DB — run pilot-postgres container"
      tags: [db, db-C1, db-C2, db-C3, db-C8, db-C9]
      community.docker.docker_container:
        name: pilot-postgres
        image: "postgres:{{ pg_version }}"
        state: started
        restart_policy: unless-stopped
        network_mode: pilot-infra
        hostname: postgres
        env:
          POSTGRES_DB: "{{ pg_keycloak_db | default('keycloak') }}"
          POSTGRES_USER: "{{ pg_keycloak_user | default('keycloak') }}"
          POSTGRES_PASSWORD: "{{ pg_keycloak_db_password | mandatory }}"
        volumes:
          - "{{ pg_host_data_dir }}:/var/lib/postgresql/data"
        ports:
          # Bind 5432 to the loopback so the host can also reach it
          # (e.g. for ad-hoc psql from the keycloak provider host).
          # Keycloak inside the same network uses `postgres:5432`.
          - "127.0.0.1:5432:5432"
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U {{ pg_keycloak_user | default('keycloak') }} -d {{ pg_keycloak_db | default('keycloak') }}"]
          interval: 10s
          timeout: 5s
          retries: 6
      when: not ansible_check_mode

    # Spec: docs/verification/core-infra-provider-db.md C7, C10
    - name: "DB — final check: postgres reachable on docker network"
      tags: [db, db-C7, db-C10]
      community.docker.docker_container_exec:
        container: pilot-postgres
        command: pg_isready -U "{{ pg_keycloak_user | default('keycloak') }}" -d "{{ pg_keycloak_db | default('keycloak') }}"
        chdir: /
      register: pg_ready
      changed_when: false
      until: pg_ready.rc == 0
      retries: 12
      when: not ansible_check_mode
      delay: 5

