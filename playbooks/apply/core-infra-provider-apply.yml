---
# Apply playbook for docs/verification/core-infra-provider.md
#
# Three roles in one playbook, gated by `-e infra_role=...`:
#
#   docker   install + start Docker engine (apt install docker.io);
#            prerequisite for the `keycloak` and `keycloak-db` roles
#            that now live in their own playbooks
#   dns      install + configure unbound (or bind9 / dnsmasq per host)
#   ntp      install + configure chrony (or ntpd / ntpsec) with a sane
#            pool so this host itself becomes a stratum source
#
# Keycloak (server) and Keycloak PostgreSQL backing store have been
# moved to their own apply playbooks:
#
#   playbooks/apply/keycloak-apply.yml
#       (-e infra_role equivalent: just run; pre-flight: docker +
#        core-infra-provider-db PASS)
#   playbooks/apply/keycloak-db-apply.yml
#       (PostgreSQL container on pilot-infra docker network)
#
# Usage examples:
#
#   ansible-playbook -i inventory.yaml \
#       playbooks/apply/core-infra-provider-apply.yml \
#       -e infra_role=dns \
#       -e dns_provider=unbound \
#       -e dns_listen_addr=10.0.0.53 \
#       --check --diff
#
#   # Serving custom internal zones: keep `dns_zones` in group_vars adjacent
#   # to an out-of-git inventory (auto-loaded, zero -e), so the (public) repo
#   # never carries your hostnames. See docs/runbooks/core-infra-provider-dns-zones.md
#   ansible-playbook -i ~/.infra/pilot/inventory-core-infra.yaml \
#       playbooks/apply/core-infra-provider-apply.yml \
#       -e infra_role=dns -e dns_listen_addr=10.0.0.53 --check --diff
#
#   ansible-playbook -i inventory.yaml \
#       playbooks/apply/core-infra-provider-apply.yml \
#       -e infra_role=ntp \
#       -e ntp_provider=chrony \
#       -e ntp_pool="ntp.ubuntu.com pool.ntp.org"
#
# Stage gating:
#   sandbox  default; runs immediately
#   staging  requires -e confirm_staging=true
#   prod     requires -e confirm_prod=true AND -e staging_attested_within_hours<=168
- name: Core infra provider apply (dns / ntp / docker)
  hosts: "{{ target_group | default(infra_role) | default('dns') }}"
  become: true
  gather_facts: true
  vars:
    stage: sandbox
    confirm_staging: false
    confirm_prod: false
    staging_attested_within_hours: 168
    dns_provider: unbound
    ntp_provider: chrony
    backup_suffix: .pre-core-infra.bak
    target_group: "{{ infra_role }}"

    # Custom internal DNS zones. DATA-DRIVEN: this playbook carries NO zone
    # data of its own — supply `dns_zones` from group_vars adjacent to your
    # (out-of-git) inventory, or with -e @<file>. Empty by default so a
    # forward-only resolver is still valid. Schema + examples:
    #   group_vars/dns/zones.example.yaml
    # Each entry is either an authoritative local zone:
    #   - name: pilot.lan
    #     mode: static            # static (default) | transparent | redirect
    #     records:
    #       - { name: core, type: A, value: 10.0.0.53 }
    # or a delegation to an upstream authoritative server (scale path):
    #   - name: corp.internal
    #     stub_addr: 10.0.1.2
    dns_zones: []

  pre_tasks:
    - name: "Gate: infra_role must be docker, dns, or ntp"
      ansible.builtin.assert:
        that:
          - infra_role in ['docker', 'dns', 'ntp']
        fail_msg: "infra_role={{ infra_role }} invalid. Pass -e infra_role=dns|ntp|docker. (keycloak + db moved to their own playbooks.)"

    - name: "Gate: staging or prod requires explicit confirm"
      ansible.builtin.assert:
        that:
          - (stage == 'sandbox') or
            (stage == 'staging' and confirm_staging | bool) or
            (stage == 'prod' and confirm_prod | bool)
        fail_msg: "stage={{ stage }} requires confirm flag. Pass -e confirm_staging=true or confirm_prod=true."

    - name: "Gate: prod requires recent staging attestation"
      ansible.builtin.assert:
        that:
          - stage != 'prod'
          - (staging_attested_within_hours | int) <= 168
        fail_msg: "prod gate: staging attestation missing or older than 168h."
      when: stage == 'prod'

  tasks:
    ### Docker role (engine — prerequisite for keycloak + keycloak-db)
    # Spec: docs/verification/docker.md C1..C8
    - name: "Docker — install docker.io (Debian family)"
      tags: [docker, docker-C1]
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true
      when:
        - infra_role == 'docker'
        - ansible_os_family == 'Debian'
        - not ansible_check_mode

    - name: "Docker — install docker (RHEL family)"
      tags: [docker, docker-C1]
      ansible.builtin.dnf:
        name:
          - docker
          - docker-compose
        state: present
      when:
        - infra_role == 'docker'
        - ansible_os_family == 'RedHat'
        - not ansible_check_mode

    - name: "Docker — enable + start docker.service"
      tags: [docker, docker-C2]
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      when:
        - infra_role == 'docker'
        - not ansible_check_mode

    - name: "Docker — ensure docker CLI usable by current user (group add)"
      tags: [docker, docker-C4]
      ansible.builtin.user:
        name: "{{ ansible_user_id | default('root') }}"
        groups: docker
        append: true
      when:
        - infra_role == 'docker'
        - not ansible_check_mode

    ### DNS role
    - name: "DNS — snapshot /etc/systemd/resolved.conf before mutation"
      tags: [dns]
      ansible.builtin.copy:
        src: /etc/systemd/resolved.conf
        dest: "/etc/systemd/resolved.conf{{ backup_suffix }}"
        remote_src: true
        force: false
        mode: '0644'
      when: infra_role == 'dns'
      register: resolved_backup

    - name: "DNS — install unbound"
      tags: [dns, dns-C1]
      ansible.builtin.apt:
        name: "{{ dns_provider }}"
        state: present
        update_cache: true
      when:
        - infra_role == 'dns'
        - not ansible_check_mode

    - name: "DNS — write unbound config"
      tags: [dns, dns-C2]
      ansible.builtin.copy:
        dest: /etc/unbound/unbound.conf.d/infra-pilot.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          server:
              interface: {{ dns_listen_addr | default('0.0.0.0') }}
              access-control: 10.0.0.0/8 allow
              access-control: 192.168.0.0/16 allow
              do-not-query-localhost: no
          {% for z in dns_zones | default([]) if z.stub_addr is not defined %}
              local-zone: "{{ z.name }}." {{ z.mode | default('static') }}
          {% for r in z.records | default([]) %}
              local-data: "{{ r.name }}.{{ z.name }}. IN {{ r.type | default('A') }} {{ r.value }}"
          {% endfor %}
          {% endfor %}

          forward-zone:
              name: "."
              forward-addr: {{ dns_upstream | default('1.1.1.1') }}
          {% for z in dns_zones | default([]) if z.stub_addr is defined %}

          stub-zone:
              name: "{{ z.name }}."
              stub-addr: {{ z.stub_addr }}
          {% endfor %}
      when:
        - infra_role == 'dns'
        - not ansible_check_mode
      notify: restart unbound

    # DNSStubListener=no is critical: it frees port 53 so unbound
    # can bind to 0.0.0.0:53. The marker file
    # (/etc/pilot-infra-resolved.conf.applied) makes the write +
    # restart idempotent: only on the first run do we change
    # /etc/systemd/resolved.conf and bounce systemd-resolved.
    - name: "DNS — write resolved config (stub disabled)"
      tags: [dns, dns-C2, dns-C3]
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          [Resolve]
          DNS={{ dns_listen_addr | default('127.0.0.1') }}
          FallbackDNS=1.1.1.1 9.9.9.9
          DNSStubListener=no
      when:
        - infra_role == 'dns'
        - not ansible_check_mode
      notify: restart systemd-resolved

    # /etc/resolv.conf is bind-mounted by docker on a docker-host
    # run, so both `cp` and `sed -i` fail (atomic rename blocked).
    # Use a here-doc + shell `cat` to write the new file in place.
    - name: "DNS — swap nameserver in /etc/resolv.conf to local DNS"
      tags: [dns, dns-C3]
      ansible.builtin.shell: |
        set -e
        cp /etc/resolv.conf /etc/resolv.conf.pre-pilot-infra.bak
        cat > /etc/resolv.conf <<EOF
        nameserver {{ dns_listen_addr | default('127.0.0.1') }}
        options edns0 trust-ad
        EOF
        cat /etc/resolv.conf
      when:
        - infra_role == 'dns'
        - not ansible_check_mode
      changed_when: true

    - name: "DNS — enable + start unbound"
      tags: [dns, dns-C2]
      ansible.builtin.systemd:
        name: unbound
        state: started
        enabled: true
      when:
        - infra_role == 'dns'
        - not ansible_check_mode
      notify: restart unbound

    - name: "DNS — final check: unbound listening on port 53 (NOT stub)"
      tags: [dns, dns-C2]
      ansible.builtin.command: >-
        sh -c 'ss -tulnH | grep ":53 " | grep -vE "127\.0\.0\.5[34]" | head -n1'
      register: dns_post
      failed_when: dns_post.stdout == ''
      changed_when: false
      when: infra_role == 'dns'

    ### NTP role
    - name: "NTP — install chrony"
      tags: [ntp, ntp-C4]
      ansible.builtin.apt:
        name: "{{ ntp_provider }}"
        state: present
        update_cache: true
      when:
        - infra_role == 'ntp'
        - not ansible_check_mode

    - name: "NTP — write chrony.conf"
      tags: [ntp, ntp-C6]
      ansible.builtin.copy:
        dest: /etc/chrony/chrony.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          {% for srv in (ntp_pool | default('ntp.ubuntu.com')).split() %}
          server {{ srv }} iburst maxsources 4
          {% endfor %}
          sourcedir /run/chrony-dhcp
          driftfile /var/lib/chrony/chrony.drift
          makestep 1.0 3
          rtcsync
          logdir /var/log/chrony
          allow 10.0.0.0/8
          allow 192.168.0.0/16
          local stratum 3
      when:
        - infra_role == 'ntp'
        - not ansible_check_mode
      notify: restart chrony

    - name: "NTP — enable + start chronyd"
      tags: [ntp, ntp-C5]
      ansible.builtin.systemd:
        name: "{{ ntp_provider }}"
        state: started
        enabled: true
      when:
        - infra_role == 'ntp'
        - not ansible_check_mode
      notify: restart chrony

    - name: "NTP — final check: chronyd active"
      tags: [ntp, ntp-C5]
      ansible.builtin.command: systemctl is-active chronyd
      register: ntp_post
      failed_when: ntp_post.stdout != 'active'
      changed_when: false
      when: infra_role == 'ntp'

  handlers:
    - name: restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted
    - name: restart unbound
      ansible.builtin.systemd:
        name: unbound
        state: restarted
    - name: restart chrony
      ansible.builtin.systemd:
        name: chrony
        state: restarted
