# Apply playbook for docs/verification/wazuh-manager.md v2.0
# Wazuh single-node (manager + indexer + dashboard) as three Docker
# containers, deployed from the OFFICIAL wazuh-docker release bundle — the
# official generate-indexer-certs.yml one-shot container builds the whole
# TLS chain (root CA, indexer, filebeat, dashboard certs) and the official
# docker-compose.yml wires the three services together. CVE
# (vulnerability-detection) requires the Wazuh indexer to store/correlate
# scan results in Wazuh 4.8+, and hand-rolling that cert chain is exactly
# the risk the official bundle exists to remove (see spec §1 — same
# tradeoff that picked wazuh-install.sh in v1.0). Then adds our own
# additive <syslog_output> block (via the official /wazuh-config-mount
# injection mechanism) to optionally forward alerts to the central SIEM
# (docs/verification/log-server.md).
#
# Pre-flight: docs/verification/docker.md 8/8 PASS (docker.io +
# docker.service + compose v2 plugin), deployed by
#   playbooks/apply/docker-apply.yml (standalone playbook since 2026-07-17;
#   was core-infra-provider-apply.yml -e infra_role=docker before the split)
#
# IMPORTANT — sizing (see spec §1/§5): this role needs real resources. The
# CVE feed alone occupies ~7-9GB (inside the wazuh_queue named volume —
# Docker does not change the disk math) plus ~3-4GB of official images;
# when the disk fills, wazuh-db and wazuh-analysisd fail to write with NO
# container-level symptom (the container stays "running") while every
# alert (including FIM) silently stops being generated. Use at least 60GB
# disk / 8192MB RAM / 4 vCPU.
#
# Usage (dry run):
#   ./pilot vm-target run --name wazuh-manager \
#     playbooks/apply/wazuh-manager-apply.yml \
#     -e siem_forward_host=192.168.122.8 --check --diff
#
# Real apply:
#   ./pilot vm-target run --name wazuh-manager \
#     playbooks/apply/wazuh-manager-apply.yml \
#     -e siem_forward_host=192.168.122.8
#
# Variables (see docs/verification/wazuh-manager.md §1.5):
#   siem_forward_host      optional — IP/FQDN of the log-server target; if
#                           omitted, local alerting + CVE scanning still
#                           work, forwarding is skipped (spec C10/C11 not
#                           applicable — see spec §5)
#   siem_forward_port      default: 514
#   wazuh_docker_version   default: "4.14.1" (official wazuh-docker tag,
#                           also pins the three official image tags)
#
# Stage gating (same convention as freeipa-server-apply.yml):
#   sandbox  default; runs immediately
#   staging  requires -e confirm_staging=true
#   prod     requires -e confirm_prod=true AND staging_attested_within_hours<=168
- name: Apply wazuh-manager (Dockerized Wazuh single-node manager+indexer+dashboard, CVE scanning, optional SIEM forward)
  hosts: "{{ target_group | default('wazuh-manager') }}"
  become: true
  gather_facts: true
  vars:
    stage: sandbox
    confirm_staging: false
    confirm_prod: false
    staging_attested_within_hours: 168
    siem_forward_port: "514"
    wazuh_docker_version: "4.14.1"
    wazuh_docker_root: /opt/pilot/wazuh-docker
    wazuh_docker_tarball: "{{ wazuh_docker_root }}/wazuh-docker-v{{ wazuh_docker_version }}.tar.gz"
    # Directory name inside the official tarball; also the compose project
    # name (pinned explicitly below) — container names are therefore the
    # deterministic single-node-wazuh.{manager,indexer,dashboard}-1 that
    # spec C1-C3/C7/C9/C11 hard-code.
    wazuh_single_node_dir: "{{ wazuh_docker_root }}/wazuh-docker-{{ wazuh_docker_version }}/single-node"
    wazuh_compose_project: single-node
    wazuh_manager_conf: "{{ wazuh_single_node_dir }}/config/wazuh_cluster/wazuh_manager.conf"
    siem_forward_alias: siem-log-server
    siem_forwarding_enabled: "{{ (siem_forward_host | default('')) | length > 0 }}"
  pre_tasks:
    - name: "Gate: staging or prod requires explicit confirm"
      ansible.builtin.assert:
        that:
          - (stage == 'sandbox') or
            (stage == 'staging' and confirm_staging | bool) or
            (stage == 'prod' and confirm_prod | bool)
        fail_msg: "stage={{ stage }} requires confirm flag. Pass -e confirm_staging=true or confirm_prod=true."
      tags: [always]

    - name: "Gate: stage must match this host's inventory environment group"
      ansible.builtin.assert:
        that:
          - not ('prod' in group_names and stage != 'prod')
          - not ('staging' in group_names and stage != 'staging')
          - not (stage in ['staging', 'prod'] and stage not in group_names)
        fail_msg: >-
          stage={{ stage }} 與 {{ inventory_hostname }} 的 inventory 環境 group 不一致
          (group_names: {{ group_names }})。inventory 的 staging/prod group 只是給
          target_group 篩選用的標籤,不會自動決定 stage——必須自己帶對的 -e stage=,
          且要跟這台機器所屬的環境 group 一致。
      tags: [always]

    - name: "Gate: prod requires recent staging attestation"
      ansible.builtin.assert:
        that:
          - (staging_attested_within_hours | int) <= 168
        fail_msg: "prod gate: staging attestation missing or older than 168h."
      when: stage == 'prod'
      tags: [always]

    # Auto-fallback for the common single-inventory case: if the caller left
    # siem_forward_host genuinely unset (no -e/group_vars/host_vars) and
    # this inventory happens to define a log-server group, use that host's
    # own connection address instead of silently leaving forwarding
    # disabled. `pilot deploy`'s single-component wizard already offers
    # this as an interactive prompt (deploy_catalog.go's wazuh-manager
    # AutoHostVars); this makes a site-wide `playbooks/site.yml` run (which
    # does not carry that wizard-level convenience) get the same default,
    # mirroring restic-backup-apply.yml's own "Auto-detect backup
    # destination host from this inventory's seaweedfs-s3 group" task.
    - name: "Auto-detect SIEM forward host from this inventory's log-server group"
      ansible.builtin.set_fact:
        siem_forward_host: >-
          {{ hostvars[(groups.get('log-server', []) | first)]['ansible_host']
             | default(groups.get('log-server', []) | first, true) }}
      when: >-
        (siem_forward_host | default('') | length == 0)
        and (groups.get('log-server', []) | length > 0)
      tags: [always]

    # Same fail-early gate as keycloak-db-apply.yml — a missing docker
    # engine should fail here with a clear message, not five tasks later
    # inside the compose module.
    - name: "Pre-flight: docker engine is up (spec docs/verification/docker.md)"
      ansible.builtin.command: docker info
      register: docker_pre
      changed_when: false
      # check_mode: false makes this run for real even under --check, so a
      # missing engine fails here with a clear message instead of five tasks
      # later inside the compose module — but on a from-scratch host being
      # site-wide-previewed before its first real apply, docker itself was
      # never actually installed (docker-apply.yml defers the install to the
      # real apply too), so rc!=0 here is expected and must not fail the
      # mandatory check-mode gate.
      failed_when: docker_pre.rc != 0 and not ansible_check_mode
      check_mode: false
  tasks:
    - name: "Step 0: Report whether SIEM forwarding is enabled this run"
      ansible.builtin.debug:
        msg: >-
          {{ 'siem_forward_host=' + siem_forward_host + ' — forwarding will be configured (spec C10-C11).'
             if siem_forwarding_enabled
             else 'siem_forward_host not provided — skipping /etc/hosts pin and <syslog_output>; only local alerting + CVE scanning (C1-C9) will be configured. Re-run with -e siem_forward_host=<log-server IP/FQDN> once a log server exists to add forwarding.' }}

    # Official hard requirement of the wazuh-indexer (OpenSearch) image —
    # the one host-level knob this role cannot containerize (spec §5).
    - name: "Step 1: Set vm.max_map_count=262144 (indexer requirement, persistent)"
      ansible.posix.sysctl:
        name: vm.max_map_count
        value: "262144"
        sysctl_set: true
        state: present

    # Steps 2-5 build the real on-disk docker-compose project (download,
    # unpack, generate certs); state directory created in Step 2 doesn't
    # really exist under check mode, so get_url/unarchive/command fail
    # outright on a from-scratch host rather than merely simulating. Deferred
    # to the real apply, same pattern as the docker preflight above.
    - name: "Step 2: Ensure {{ wazuh_docker_root }} exists"
      ansible.builtin.file:
        path: "{{ wazuh_docker_root }}"
        state: directory
        mode: "0755"
      when: not ansible_check_mode

    - name: "Step 3: Download the official wazuh-docker release bundle (spec C1-C3)"
      tags: [C1, C2, C3]
      ansible.builtin.get_url:
        url: "https://github.com/wazuh/wazuh-docker/archive/refs/tags/v{{ wazuh_docker_version }}.tar.gz"
        dest: "{{ wazuh_docker_tarball }}"
        mode: "0644"
      when: not ansible_check_mode

    - name: "Step 4: Unpack the release bundle (spec C1-C3)"
      tags: [C1, C2, C3]
      ansible.builtin.unarchive:
        src: "{{ wazuh_docker_tarball }}"
        dest: "{{ wazuh_docker_root }}"
        remote_src: true
        creates: "{{ wazuh_single_node_dir }}/docker-compose.yml"
      when: not ansible_check_mode

    # One-shot official cert generator (wazuh/wazuh-certs-generator) —
    # builds the full TLS chain into config/wazuh_indexer_ssl_certs/.
    # Idempotent via `creates` on the root CA it emits. Long-ish on first
    # run (pulls the generator image).
    - name: "Step 5: Generate the indexer TLS cert chain (official generator; spec C1-C3)"
      tags: [C1, C2, C3]
      ansible.builtin.command:
        cmd: docker compose -f generate-indexer-certs.yml run --rm generator
        chdir: "{{ wazuh_single_node_dir }}"
        creates: "{{ wazuh_single_node_dir }}/config/wazuh_indexer_ssl_certs/root-ca.pem"
      when: not ansible_check_mode


    # Steps 6-11 configure/compose-up/health-check the project built above;
    # none of that exists on a fresh host when Steps 2-5 were skipped in
    # check mode, so the whole block (and its rescue) is deferred too — same
    # convention as wazuh-fim-apply.yml's post-install config block.
    - when: not ansible_check_mode
      block:
        - name: "Step 6: Pin {{ siem_forward_alias }} -> {{ siem_forward_host | default('') }} in /etc/hosts (spec C10)"
          tags: [C10]
          ansible.builtin.lineinfile:
            path: /etc/hosts
            regexp: '\s{{ siem_forward_alias }}$'
            line: "{{ siem_forward_host | default('') }}\t{{ siem_forward_alias }}"
            state: present
          when: siem_forwarding_enabled | bool

        # Wazuh's ossec.conf parser accepts multiple top-level
        # <ossec_config> root blocks in one file and merges them —
        # verified live in v1.0 (see runbook §5). We append our managed
        # block to the HOST-side wazuh_manager.conf; the official manager
        # image copies /wazuh-config-mount/etc/ossec.conf over
        # /var/ossec/etc/ossec.conf on every container start, so the
        # change reaches the live config on the next (re)start — Step 9
        # restarts the manager service if the stack was already up.
        - name: "Step 7: Append <syslog_output> block to wazuh_manager.conf (spec C11)"
          tags: [C11]
          ansible.builtin.blockinfile:
            path: "{{ wazuh_manager_conf }}"
            marker: "<!-- {mark} ANSIBLE MANAGED BLOCK (wazuh-manager-apply.yml siem forward) -->"
            block: |
              <ossec_config>
                <syslog_output>
                  <server>{{ siem_forward_alias }}</server>
                  <port>{{ siem_forward_port }}</port>
                  <format>default</format>
                </syslog_output>
              </ossec_config>
          register: siem_forward_conf_result
          when: siem_forwarding_enabled | bool

        # Spec: docs/verification/wazuh-manager.md C1, C2, C3
        # First run pulls ~3-4GB of official images and boots the indexer
        # for the first time (index bootstrap ~1 minute) — the waits below
        # absorb that.
        - name: "Step 8: Compose up the official single-node project (spec C1-C3)"
          tags: [C1, C2, C3]
          community.docker.docker_compose_v2:
            project_src: "{{ wazuh_single_node_dir }}"
            project_name: "{{ wazuh_compose_project }}"
            state: present
          register: wazuh_compose_result

        # Drift probe: is the forward block present in the LIVE config the
        # manager actually loaded (inside the container), not just in the
        # host-side source file? Gating a restart on "the host file changed
        # this run" is NOT convergent — a previous run whose injection
        # failed would never be repaired. The until-loop absorbs the
        # first-boot race where cont-init is still copying the config.
        - name: "Step 9: Probe the live in-container forward config (drift check; spec C11)"
          tags: [C11]
          ansible.builtin.command: >-
            docker exec single-node-wazuh.manager-1
            grep -q "<server>{{ siem_forward_alias }}</server>" /var/ossec/etc/ossec.conf
          register: live_forward_probe
          changed_when: false
          failed_when: false
          retries: 6
          delay: 5
          until: live_forward_probe.rc == 0
          when: siem_forwarding_enabled | bool

        # RECREATE, not restart — hit for real on vm-target (runbook §5):
        # the official image's 0-wazuh-init deletes /var/ossec/data_tmp at
        # the end of the FIRST boot; on a mere `docker restart` the script
        # sees the (legitimately empty) multigroups permanent dir, tries to
        # re-install it from the now-deleted data_tmp, exits 1 — and never
        # reaches mount_files, so /wazuh-config-mount is NOT re-injected.
        # A recreated container starts from a fresh image filesystem
        # (data_tmp present) and runs the init to completion.
        - name: "Step 9a: Recreate wazuh.manager so /wazuh-config-mount re-injects the config (spec C11)"
          tags: [C11]
          community.docker.docker_compose_v2:
            project_src: "{{ wazuh_single_node_dir }}"
            project_name: "{{ wazuh_compose_project }}"
            state: present
            recreate: always
            services: [wazuh.manager]
          when:
            - siem_forwarding_enabled | bool
            - live_forward_probe.rc != 0

        # Convergence assertion: after a drift-triggered recreate the live
        # config MUST contain the block — fail loudly (into the rescue)
        # instead of leaving silent drift behind.
        - name: "Step 9b: Assert the live forward config converged after recreate (spec C11)"
          tags: [C11]
          ansible.builtin.command: >-
            docker exec single-node-wazuh.manager-1
            grep -q "<server>{{ siem_forward_alias }}</server>" /var/ossec/etc/ossec.conf
          register: live_forward_recheck
          changed_when: false
          retries: 12
          delay: 5
          until: live_forward_recheck.rc == 0
          when:
            - siem_forwarding_enabled | bool
            - live_forward_probe.rc != 0

        - name: "Step 10: Wait for agent port 1514/tcp (wazuh-remoted; spec C5)"
          tags: [C5, C6]
          ansible.builtin.wait_for:
            port: 1514
            host: 127.0.0.1
            timeout: 300

        # 401-without-credentials proves OpenSearch + the security plugin
        # finished bootstrapping, not merely that the container exists
        # (spec C4). First boot takes ~1 minute.
        - name: "Step 11: Wait for the indexer HTTPS API to answer 401 (spec C4)"
          tags: [C4]
          ansible.builtin.uri:
            url: "https://127.0.0.1:9200"
            validate_certs: false
            status_code: 401
          register: wazuh_indexer_ready
          until: wazuh_indexer_ready.status == 401
          retries: 60
          delay: 5

      rescue:
        - name: "ROLLBACK — remove the siem forward managed block"
          ansible.builtin.blockinfile:
            path: "{{ wazuh_manager_conf }}"
            marker: "<!-- {mark} ANSIBLE MANAGED BLOCK (wazuh-manager-apply.yml siem forward) -->"
            block: ""
            state: absent

        - name: "ROLLBACK — remove the /etc/hosts pin"
          ansible.builtin.lineinfile:
            path: /etc/hosts
            regexp: '\s{{ siem_forward_alias }}$'
            state: absent

        - name: "ROLLBACK — surface the original failure"
          ansible.builtin.fail:
            msg: >-
              wazuh-manager apply FAILED (see task output above); the
              /etc/hosts pin and <syslog_output> block were reverted.
              Containers (if created) are left in place for inspection via
              `docker logs single-node-wazuh.manager-1` /
              `docker logs single-node-wazuh.indexer-1` — this rescue does
              NOT tear down the compose project or the cert chain (Step
              1-5); consult docs/runbooks/wazuh-manager.md §5 before
              retrying.
