---
# Apply playbook for docs/verification/pam-oidc-sshd.md v2.0
# Aligned with real upstream: https://github.com/kha7iq/kc-ssh-pam
#
# Source: cloned on the REMOTE host at /tmp/kc-ssh-pam-src via git clone
# Build: on the REMOTE host via make build
# Install: copies from /tmp/kc-ssh-pam-src/build/ on the remote
#
# Usage (dry run / preview):
#   ./pilot vm-target run --name client-vm \
#     playbooks/apply/pam-oidc-sshd-apply.yml \
#     -e keycloak_server_url=https://192.168.100.2:8080 \
#     -e keycloak_realm=master \
#     -e keycloak_client_id=ssh-pam-client \
#     -e target_group=linux-servers \
#     --check --diff
#
# Real apply:
#   ./pilot vm-target run --name client-vm \
#     playbooks/apply/pam-oidc-sshd-apply.yml \
#     -e keycloak_server_url=https://192.168.100.2:8080 \
#     -e keycloak_realm=master \
#     -e keycloak_client_id=ssh-pam-client \
#     -e target_group=linux-servers
#
# Variables (all passed via -e):
#   keycloak_server_url    e.g. https://192.168.100.2:8080
#   keycloak_realm         e.g. master
#   keycloak_client_id     e.g. ssh-pam-client
#   keycloak_client_secret (optional, leave empty for public client)
#   backup_suffix          default: .kcsssh.bak
#   pam_d_path             default: /etc/pam.d/sshd
#   config_dir             default: /etc/keycloak-ssh
#   remote_src_dir         default: /tmp/kc-ssh-pam-src
#
# Stage gating (same convention as freeipa-server-apply.yml):
#   sandbox  default; runs immediately
#   staging  requires -e confirm_staging=true
#   prod     requires -e confirm_prod=true AND staging_attested_within_hours<=168
- name: Apply PAM OIDC for sshd (kha7iq/kc-ssh-pam)
  hosts: "{{ target_group | default('linux-servers') }}"
  become: true
  gather_facts: true
  vars:
    stage: sandbox
    confirm_staging: false
    confirm_prod: false
    staging_attested_within_hours: 168
    backup_suffix: .kcsssh.bak
    pam_d_path: /etc/pam.d/sshd
    config_dir: /etc/keycloak-ssh
    remote_src_dir: /tmp/kc-ssh-pam-src
    kc_monitor_port: "7291"
    kc_pam_module: pam_keycloak_device.so
    kc_monitor_binary: keycloak-ssh-monitor
  pre_tasks:
    - name: "Gate: staging or prod requires explicit confirm"
      ansible.builtin.assert:
        that:
          - (stage == 'sandbox') or
            (stage == 'staging' and confirm_staging | bool) or
            (stage == 'prod' and confirm_prod | bool)
        fail_msg: "stage={{ stage }} requires confirm flag. Pass -e confirm_staging=true or confirm_prod=true."
      tags: [always]

    - name: "Gate: stage must match this host's inventory environment group"
      ansible.builtin.assert:
        that:
          - not ('prod' in group_names and stage != 'prod')
          - not ('staging' in group_names and stage != 'staging')
          - not (stage in ['staging', 'prod'] and stage not in group_names)
        fail_msg: >-
          stage={{ stage }} 與 {{ inventory_hostname }} 的 inventory 環境 group 不一致
          (group_names: {{ group_names }})。inventory 的 staging/prod group 只是給
          target_group 篩選用的標籤,不會自動決定 stage——必須自己帶對的 -e stage=,
          且要跟這台機器所屬的環境 group 一致。
      tags: [always]

    - name: "Gate: prod requires recent staging attestation"
      ansible.builtin.assert:
        that:
          - (staging_attested_within_hours | int) <= 168
        fail_msg: "prod gate: staging attestation missing or older than 168h."
      when: stage == 'prod'
      tags: [always]
  tasks:
    - name: "Step 0: Assert required variables"
      ansible.builtin.assert:
        that:
          - keycloak_server_url is match('^https?://')
          - keycloak_realm | length > 0
          - keycloak_client_id | length > 0
        fail_msg: >-
          Missing required vars. Provide:
            -e keycloak_server_url=https://192.168.100.2:8080
            -e keycloak_realm=master
            -e keycloak_client_id=ssh-pam-client

    - name: "Step 1: Snapshot /etc/pam.d/sshd before any modification"
      tags: [C3]
      ansible.builtin.copy:
        src: "{{ pam_d_path }}"
        dest: "{{ pam_d_path }}{{ backup_suffix }}"
        remote_src: true
        force: false
        mode: '0644'
      register: pam_backup

    - block:
        # ── Build dependencies ───────────────────────────────────────────────
        - name: "Step 2: Install build dependencies (golang, libpam0g-dev, build-essential, git)"
          tags: [C1]
          ansible.builtin.apt:
            name:
              - golang
              - libpam0g-dev
              - build-essential
              - git
            state: present
            update_cache: true
          register: apt_deps
          until: apt_deps is succeeded
          retries: 2

        - name: "Step 3: Clone kha7iq/kc-ssh-pam source on remote"
          ansible.builtin.git:
            repo: https://github.com/omidiyanto/keycloak-ssh-pam-module.git
            dest: "{{ remote_src_dir }}"
            version: main
            force: false
          register: git_clone

        - name: "Step 3a: Build PAM module and monitor daemon on remote"
          ansible.builtin.shell:
            cmd: "cd {{ remote_src_dir }} && make build"
          register: make_build
          changed_when: "'Build complete' in make_build.stdout or 'pam_keycloak_device.so' in make_build.stdout"

        # ── Detect PAM lib directory ─────────────────────────────────────────
        - name: "Step 4: Detect PAM security library directory"
          ansible.builtin.shell:
            cmd: >-
              if [ -d /lib/x86_64-linux-gnu/security ]; then
                echo /lib/x86_64-linux-gnu/security;
              elif [ -d /lib64/security ]; then
                echo /lib64/security;
              else
                echo /lib/security;
              fi
          register: pam_lib_detected
          changed_when: false

        # ── Install PAM module ───────────────────────────────────────────────
        - name: "Step 4a: Install {{ kc_pam_module }} to {{ pam_lib_detected.stdout }}"
          tags: [C2]
          ansible.builtin.copy:
            src: "{{ remote_src_dir }}/build/{{ kc_pam_module }}"
            dest: "{{ pam_lib_detected.stdout }}/{{ kc_pam_module }}"
            remote_src: true
            mode: '0755'
            owner: root
            group: root

        # ── Install monitor daemon ───────────────────────────────────────────
        - name: "Step 5: Install keycloak-ssh-monitor daemon binary"
          tags: [C6]
          ansible.builtin.copy:
            src: "{{ remote_src_dir }}/build/{{ kc_monitor_binary }}"
            dest: /usr/local/bin/{{ kc_monitor_binary }}
            remote_src: true
            mode: '0755'
            owner: root
            group: root

        - name: "Step 5a: Create session directory"
          ansible.builtin.file:
            path: /var/run/keycloak-ssh/sessions
            state: directory
            owner: root
            group: root
            mode: '0700'

        - name: "Step 5b: Install systemd service unit"
          tags: [C7]
          ansible.builtin.copy:
            src: "{{ remote_src_dir }}/configs/systemd/keycloak-ssh-monitor.service"
            dest: /etc/systemd/system/keycloak-ssh-monitor.service
            remote_src: true
            mode: '0644'
          notify: systemd daemon-reload

        # ── Render config ───────────────────────────────────────────────────
        - name: "Step 6: Ensure /etc/keycloak-ssh directory exists"
          ansible.builtin.file:
            path: "{{ config_dir }}"
            state: directory
            owner: root
            group: root
            mode: '0750'

        - name: "Step 6a: Render /etc/keycloak-ssh/config.yaml"
          tags: [C8, C9]
          ansible.builtin.copy:
            dest: "{{ config_dir }}/config.yaml"
            owner: root
            group: root
            mode: '0640'
            backup: true
            content: |
              # Keycloak SSH PAM Configuration — managed by ansible
              # DO NOT EDIT BY HAND
              keycloak:
                server_url: "{{ keycloak_server_url.rstrip('/') }}"
                realm: "{{ keycloak_realm }}"
                client_id: "{{ keycloak_client_id }}"
                client_secret: "{{ keycloak_client_secret | default('') }}"
              auth:
                poll_interval_seconds: 5
                poll_timeout_seconds: 300
                scopes: "openid"
              session:
                storage_dir: "/var/run/keycloak-ssh/sessions"
              monitor:
                listen_address: "0.0.0.0:{{ kc_monitor_port }}"
              logging:
                level: "info"
                syslog: true

        # ── Wire into PAM ───────────────────────────────────────────────────
        - name: "Step 7: Wire pam_keycloak_device.so into /etc/pam.d/sshd (idempotent)"
          tags: [C4]
          ansible.builtin.lineinfile:
            path: "{{ pam_d_path }}"
            regexp: '^auth[[:space:]]+sufficient[[:space:]]+pam_keycloak_device\.so'
            line: "auth sufficient pam_keycloak_device.so"
            insertbefore: BOF
            state: present

        - name: "Step 7a: Add session tracking line to /etc/pam.d/sshd"
          ansible.builtin.lineinfile:
            path: "{{ pam_d_path }}"
            regexp: '^session[[:space:]]+required[[:space:]]+pam_keycloak_device\.so'
            line: "session required pam_keycloak_device.so"
            insertafter: '^session.*required.*pam_unix.so'
            state: present

        # ── Sanity checks ───────────────────────────────────────────────────
        - name: "Step 8: C5 — sshd -T parseable"
          tags: [C5]
          ansible.builtin.shell:
            cmd: "sshd -T -f /etc/ssh/sshd_config >/dev/null 2>&1 && echo 0 || echo 1"
          register: c5_result
          changed_when: false
          failed_when: false

        - name: "Step 8a: C8 — server_url uses https in config"
          tags: [C8]
          ansible.builtin.shell:
            cmd: "grep -qE '^[[:space:]]*server_url:[[:space:]]*https?://' {{ config_dir }}/config.yaml && echo 0 || echo 1"
          register: c8_result
          changed_when: false
          failed_when: false

        - name: "Step 8b: C9 — realm non-empty in config"
          tags: [C9]
          ansible.builtin.shell:
            cmd: "grep -qE '^[[:space:]]*realm:[[:space:]]+[^[:space:]]' {{ config_dir }}/config.yaml && echo 0 || echo 1"
          register: c9_result
          changed_when: false
          failed_when: false

      rescue:
        - name: "ROLLBACK — restore /etc/pam.d/sshd from backup"
          ansible.builtin.copy:
            src: "{{ pam_d_path }}{{ backup_suffix }}"
            dest: "{{ pam_d_path }}"
            remote_src: true
            force: true
            mode: '0644'
          when:
            - pam_backup is defined
            - pam_backup is succeeded

        - name: "ROLLBACK — surface the original failure"
          ansible.builtin.fail:
            msg: >-
              pam-oidc-sshd apply failed and /etc/pam.d/sshd was restored
              from backup. Fix the failing task and re-run.

  handlers:
    - name: systemd daemon-reload
      ansible.builtin.systemd_service:
        daemon_reload: true
