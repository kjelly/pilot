# Apply playbook for docs/verification/alertmanager.md v1.0
#
# Central role: runs Alertmanager as a Docker container, joining the same
# pilot-metrics docker network as docs/verification/thanos-query.md so
# per-site Prometheus containers can reach it through the
# alertmanager-backend /etc/hosts alias (or, on the same host, the
# `pilot-alertmanager` container name over the shared network).
#
# Co-location with thanos-query is RECOMMENDED but not required — both
# apply playbooks default to the `pilot-metrics` docker network and the
# `alertmanager_target_host` variable on each per-site prometheus host
# can be set to whichever physical machine runs this role. The simplest
# production layout is one host in BOTH the `thanos-query` and
# `alertmanager` inventory groups.
#
# Pre-flight: docs/verification/docker.md PASS (docker.io + docker.service).
#
# Usage:
#
#   go run ./cmd/pilot vm-target run --name alert \
#       playbooks/apply/alertmanager-apply.yml \
#       -e target_group=alertmanager
#
# For real receivers (slack, email, etc.) pass a full alertmanager.yml
# via vault, e.g.
#
#   -e @~/.vault/alertmanager-config.yaml
#   with alertmanager_config: |
#     route:
#       receiver: 'slack'
#       ...
#
# Variables: see docs/verification/alertmanager.md §1.5.
#
# Stage gating (same convention as freeipa-server-apply.yml):
#   sandbox  default; runs immediately
#   staging  requires -e confirm_staging=true
#   prod     requires -e confirm_prod=true AND staging_attested_within_hours<=168
- name: Apply alertmanager (central Alertmanager)
  hosts: "{{ target_group | default('alertmanager') }}"
  become: true
  gather_facts: true
  vars:
    stage: sandbox
    confirm_staging: false
    confirm_prod: false
    staging_attested_within_hours: 168
    alertmanager_version: "v0.27.0"
    alertmanager_host_data_dir: /var/lib/pilot/alertmanager
    alertmanager_config_dir: /etc/pilot/alertmanager
    docker_network_name: pilot-metrics
    alertmanager_config: |
      route:
        receiver: 'null'
        group_by: ['alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
      receivers:
        - name: 'null'

  pre_tasks:
    - name: "Gate: staging or prod requires explicit confirm"
      ansible.builtin.assert:
        that:
          - (stage == 'sandbox') or
            (stage == 'staging' and confirm_staging | bool) or
            (stage == 'prod' and confirm_prod | bool)
        fail_msg: "stage={{ stage }} requires confirm flag. Pass -e confirm_staging=true or confirm_prod=true."
      tags: [always]

    - name: "Gate: stage must match this host's inventory environment group"
      ansible.builtin.assert:
        that:
          - not ('prod' in group_names and stage != 'prod')
          - not ('staging' in group_names and stage != 'staging')
          - not (stage in ['staging', 'prod'] and stage not in group_names)
        fail_msg: >-
          stage={{ stage }} 與 {{ inventory_hostname }} 的 inventory 環境 group 不一致
          (group_names: {{ group_names }})。inventory 的 staging/prod group 只是給
          target_group 篩選用的標籤,不會自動決定 stage——必須自己帶對的 -e stage=,
          且要跟這台機器所屬的環境 group 一致。
      tags: [always]

    - name: "Gate: prod requires recent staging attestation"
      ansible.builtin.assert:
        that:
          - (staging_attested_within_hours | int) <= 168
        fail_msg: "prod gate: staging attestation missing or older than 168h."
      when: stage == 'prod'
      tags: [always]

    - name: "Gate: alertmanager_config non-empty"
      ansible.builtin.assert:
        that:
          - alertmanager_config is defined and alertmanager_config | length > 0
        fail_msg: >-
          alertmanager_config is required (provide a full alertmanager.yml
          string, e.g. via -e @~/.vault/alertmanager-config.yaml).

  tasks:
    # docker_container needs a live daemon to compute its diff even under
    # --check; on a from-scratch host where core-infra-provider-apply.yml's
    # docker install itself was deferred to the real apply, the daemon
    # doesn't exist yet, so this whole block (config render through
    # container run + readiness wait) is deferred too — same convention as
    # wazuh-manager-apply.yml's docker-dependent build block.
    - when: not ansible_check_mode
      block:
        - name: "Ensure config + data dirs exist"
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "65534"
            group: "65534"
            mode: "0755"
          loop:
            - "{{ alertmanager_config_dir }}"
            - "{{ alertmanager_host_data_dir }}"

        # Docker auto-creates a directory at a bind-mount source path that
        # doesn't exist when the container is (re)created; the rescue block
        # below only deletes this file (not the container) after a failed
        # apply, so a later container recreate can leave a directory here
        # instead of a file, permanently breaking `copy` on retry. `stat`
        # (not the `directory` Jinja test, which checks the control host)
        # runs on the managed node, where this path actually lives.
        - name: "Guard: check for stray directory left at alertmanager.yml path"
          ansible.builtin.stat:
            path: "{{ alertmanager_config_dir }}/alertmanager.yml"
          register: alertmanager_yml_stat

        - name: "Guard: clear stray directory left at alertmanager.yml path"
          ansible.builtin.file:
            path: "{{ alertmanager_config_dir }}/alertmanager.yml"
            state: absent
          when: alertmanager_yml_stat.stat.exists and alertmanager_yml_stat.stat.isdir

        - name: "Render alertmanager.yml"
          tags: [C4, C5]
          ansible.builtin.copy:
            dest: "{{ alertmanager_config_dir }}/alertmanager.yml"
            mode: "0644"
            content: "{{ alertmanager_config }}"
          register: alertmanager_yml_result

        - name: "Ensure docker network {{ docker_network_name }} exists"
          community.docker.docker_network:
            name: "{{ docker_network_name }}"
            state: present

        # Spec: docs/verification/alertmanager.md C1, C2, C3, C6, C7
        - name: "Alertmanager — run pilot-alertmanager container"
          tags: [C1, C2, C3, C6, C7]
          community.docker.docker_container:
            name: pilot-alertmanager
            image: "prom/alertmanager:{{ alertmanager_version }}"
            state: started
            restart_policy: unless-stopped
            restart: "{{ alertmanager_yml_result is changed }}"
            user: "65534:65534"
            networks:
              - name: "{{ docker_network_name }}"
            command:
              - "--config.file=/etc/alertmanager/alertmanager.yml"
              - "--storage.path=/alertmanager"
              - "--web.listen-address=:9093"
            volumes:
              - "{{ alertmanager_config_dir }}/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro"
              - "{{ alertmanager_host_data_dir }}:/alertmanager"
            ports:
              - "9093:9093"

        - name: "Wait for Alertmanager to become ready"
          ansible.builtin.uri:
            url: "http://127.0.0.1:9093/-/ready"
            status_code: 200
          register: am_ready
          until: am_ready.status == 200
          retries: 30
          delay: 2

      rescue:
        - name: "ROLLBACK — remove alertmanager config file"
          ansible.builtin.file:
            path: "{{ alertmanager_config_dir }}/alertmanager.yml"
            state: absent

        - name: "ROLLBACK — surface the original failure"
          ansible.builtin.fail:
            msg: >-
              alertmanager apply FAILED (see task output above); the
              config file was removed. Container (if created) is left in
              place for inspection via `docker logs pilot-alertmanager`.
